<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>guardaí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
  
  :root {
    --bg: #0a0a0a;
    --bg-card: #141414;
    --bg-elev: #1c1c1c;
    --bg-input: #181818;
    --border: #252525;
    --border-strong: #353535;
    --brand: #00d97e;
    --brand-hover: #00ba6b;
    --brand-soft: rgba(0, 217, 126, 0.1);
    --danger: #ff4757;
    --danger-soft: rgba(255, 71, 87, 0.1);
    --warning: #ffb800;
    --warning-soft: rgba(255, 184, 0, 0.1);
    --info: #38bdf8;
    --info-soft: rgba(56, 189, 248, 0.1);
    --ia: #a855f7;
    --ia-hover: #9333ea;
    --ia-soft: rgba(168, 85, 247, 0.1);
    --text: #ffffff;
    --text-mute: #a3a3a3;
    --text-faint: #525252;
  }
  
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  body { padding-bottom: 30px; }
  
  input, textarea, select {
    color: #fff !important;
    -webkit-text-fill-color: #fff !important;
    caret-color: var(--brand);
  }
  input:-webkit-autofill {
    -webkit-box-shadow: 0 0 0 1000px var(--bg-input) inset !important;
    -webkit-text-fill-color: #fff !important;
  }
  
  .topbar {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 50;
    border-bottom: 1px solid var(--border);
  }
  
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--brand);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
  }
  
  .logo-mark::before {
    content: '';
    width: 12px; height: 12px;
    border: 2px solid var(--bg);
    border-radius: 4px;
    border-top: none; border-right: none;
  }
  
  .logo-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  
  .topbar-actions { display: flex; gap: 8px; }
  
  .chat-btn {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: var(--ia-soft);
    border: 1px solid rgba(168, 85, 247, 0.3);
    color: var(--ia);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px;
    position: relative;
  }
  
  .chat-btn:active { background: rgba(168, 85, 247, 0.2); }
  
  .chat-btn::after {
    content: '';
    position: absolute;
    top: 4px; right: 4px;
    width: 8px; height: 8px;
    background: var(--brand);
    border: 2px solid var(--bg);
    border-radius: 50%;
  }
  
  .menu-btn {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 20px;
  }
  
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px;
  }
  
  .saudacao { padding: 20px 0 14px; }
  
  .saudacao-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  
  .saudacao-sub {
    font-size: 13px;
    color: var(--text-mute);
  }
  
  .nivel-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  
  .nivel-card::before {
    content: '';
    position: absolute;
    top: -40%;
    right: -20%;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, var(--brand-soft) 0%, transparent 70%);
    pointer-events: none;
  }
  
  .nivel-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
    position: relative;
  }
  
  .nivel-emoji-titulo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  
  .nivel-emoji { font-size: 32px; }
  
  .nivel-num {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }
  
  .nivel-nome {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  
  .nivel-xp-badge {
    background: var(--brand-soft);
    color: var(--brand);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 100px;
    flex-shrink: 0;
  }
  
  .nivel-progresso-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-mute);
    margin-bottom: 6px;
    position: relative;
  }
  
  .nivel-progresso-bar {
    background: var(--bg-elev);
    height: 8px;
    border-radius: 100px;
    overflow: hidden;
    position: relative;
  }
  
  .nivel-progresso-fill {
    height: 100%;
    background: var(--brand);
    border-radius: 100px;
    transition: width 0.8s cubic-bezier(0.4, 0.0, 0.2, 1);
  }
  
  .tatu-card {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  
  .tatu-card:active { transform: scale(0.99); border-color: var(--ia); }
  
  .tatu-emoji { font-size: 28px; flex-shrink: 0; }
  
  .tatu-texto {
    flex: 1;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-mute);
  }
  
  .tatu-texto strong { color: var(--text); }
  
  .tatu-chat-cta {
    background: var(--ia);
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 100px;
    margin-top: 6px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  
  .insights-card {
    background: linear-gradient(135deg, var(--ia-soft) 0%, var(--bg-card) 100%);
    border: 1px solid rgba(168, 85, 247, 0.3);
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  
  .insights-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 10px;
  }
  
  .insights-titulo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--ia);
  }
  
  .insights-refresh-btn {
    background: rgba(168, 85, 247, 0.15);
    border: 1px solid rgba(168, 85, 247, 0.3);
    color: var(--ia);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 11px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  
  .insights-refresh-btn:active { background: rgba(168, 85, 247, 0.25); }
  .insights-refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  
  .insights-conteudo {
    font-size: 13px;
    line-height: 1.6;
  }
  
  .insights-conteudo h1, .insights-conteudo h2, .insights-conteudo h3 {
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text);
    font-weight: 700;
    margin: 14px 0 6px;
  }
  
  .insights-conteudo h2 {
    font-size: 13px;
    color: var(--ia);
  }
  
  .insights-conteudo h2:first-child { margin-top: 0; }
  
  .insights-conteudo p { margin-bottom: 8px; }
  .insights-conteudo strong { color: var(--text); font-weight: 600; }
  .insights-conteudo ul { margin: 6px 0 8px 20px; }
  .insights-conteudo li { margin-bottom: 4px; line-height: 1.5; }
  
  .insights-loading {
    text-align: center;
    padding: 24px 12px;
  }
  
  .insights-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--ia-soft);
    border-top-color: var(--ia);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }
  
  .insights-loading-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    color: var(--ia);
    font-size: 13px;
    margin-bottom: 2px;
  }
  
  .insights-loading-sub {
    font-size: 11px;
    color: var(--text-mute);
  }
  
  .insights-vazio {
    text-align: center;
    padding: 20px 12px;
  }
  
  .insights-vazio-emoji { font-size: 32px; margin-bottom: 8px; }
  
  .insights-vazio-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    color: var(--ia);
    font-size: 14px;
    margin-bottom: 4px;
  }
  
  .insights-vazio-sub {
    font-size: 12px;
    color: var(--text-mute);
    line-height: 1.5;
    margin-bottom: 12px;
    max-width: 280px;
    margin-left: auto;
    margin-right: auto;
  }
  
  .insights-cta {
    background: var(--ia);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  
  .insights-cta:active { background: var(--ia-hover); transform: scale(0.97); }
  
  .insights-footer {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(168, 85, 247, 0.2);
    font-size: 10px;
    color: var(--text-faint);
    text-align: center;
  }
  
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  
  .stat-card:active { transform: scale(0.98); }
  
  .stat-label {
    font-size: 11px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  
  .stat-valor {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  
  .stat-valor.brand { color: var(--brand); }
  .stat-valor.danger { color: var(--danger); }
  .stat-valor.warning { color: var(--warning); }
  
  .stat-sub {
    font-size: 11px;
    color: var(--text-mute);
    margin-top: 2px;
  }
  
  .acao-principal {
    width: 100%;
    background: var(--brand);
    color: #001a0e;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 14px;
    box-shadow: 0 8px 24px rgba(0, 217, 126, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  
  .acao-principal:active {
    background: var(--brand-hover);
    transform: scale(0.985);
  }
  
  .acao-chat {
    width: 100%;
    background: var(--ia);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 14px;
    box-shadow: 0 8px 24px rgba(168, 85, 247, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  
  .acao-chat:active {
    background: var(--ia-hover);
    transform: scale(0.985);
  }
  
  .menu-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 18px 0 10px;
    padding: 0 4px;
  }
  
  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  
  .menu-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    color: var(--text);
    text-decoration: none;
    display: block;
  }
  
  .menu-card:active { transform: scale(0.98); }
  
  .menu-card-emoji { font-size: 26px; margin-bottom: 8px; }
  
  .menu-card-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  
  .menu-card-sub {
    font-size: 11px;
    color: var(--text-mute);
    line-height: 1.3;
  }
  
  .missao-card {
    background: var(--bg-card);
    border: 1px solid var(--warning-soft);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 14px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  
  .missao-icone {
    width: 44px; height: 44px;
    background: var(--warning-soft);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  
  .missao-info { flex: 1; }
  
  .missao-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  
  .missao-sub {
    font-size: 11px;
    color: var(--text-mute);
    line-height: 1.4;
  }
  
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: none;
    backdrop-filter: blur(4px);
  }
  
  .drawer-overlay.show { display: block; }
  
  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 80%;
    max-width: 320px;
    background: var(--bg-card);
    border-left: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s ease;
  }
  
  .drawer-overlay.show .drawer {
    transform: translateX(0);
  }
  
  .drawer-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  
  .drawer-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }
  
  .drawer-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    text-decoration: none;
  }
  
  .drawer-item:active { opacity: 0.6; }
  
  .drawer-item-emoji { font-size: 20px; }
  .drawer-item-label { font-size: 14px; font-weight: 500; }
  .drawer-item.danger { color: var(--danger); }
  
  .levelup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(8px);
  }
  
  .levelup-overlay.show { display: flex; }
  
  .levelup-modal {
    width: 100%;
    max-width: 400px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 24px;
    text-align: center;
    animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  
  @keyframes bounceIn {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  
  .levelup-emoji {
    font-size: 80px;
    margin-bottom: 14px;
    animation: bounce-emoji 1.5s ease-in-out infinite;
  }
  
  @keyframes bounce-emoji {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  
  .levelup-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    color: var(--warning);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }
  
  .levelup-nivel {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  
  .levelup-nome {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    color: var(--brand);
    margin-bottom: 18px;
  }
  
  .levelup-desc {
    color: var(--text-mute);
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 24px;
  }
  
  .btn-continuar {
    width: 100%;
    background: var(--brand);
    color: #001a0e;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  
  .btn-continuar:active { background: var(--brand-hover); transform: scale(0.97); }
  
  .confete {
    position: absolute;
    width: 8px;
    height: 8px;
    pointer-events: none;
    animation: confeteFall 2.5s linear forwards;
  }
  
  @keyframes confeteFall {
    0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  
  .loader-circle {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-radius: 50%;
    border-top-color: var(--brand);
    animation: spin 0.8s linear infinite;
    margin: 60px auto;
  }
  
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark"></div>
    <div class="logo-text">guardaí</div>
  </div>
  <div class="topbar-actions">
    <button class="chat-btn" onclick="window.location.href='chat.html?v=1'" title="Chat com Tatu">💬</button>
    <button class="menu-btn" onclick="abrirDrawer()">☰</button>
  </div>
</div>

<div class="container">

  <div class="saudacao">
    <div class="saudacao-titulo" id="saudacao-titulo">Olá!</div>
    <div class="saudacao-sub" id="saudacao-sub">Bem-vindo de volta ao GuardaAí</div>
  </div>
  
  <div id="conteudo">
    <div class="loader-circle"></div>
  </div>

</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="fecharDrawer(event)">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-header">
      <div class="drawer-titulo">Menu</div>
      <button class="menu-btn" onclick="fecharDrawer()">✕</button>
    </div>
    <a href="home.html?v=1" class="drawer-item">
      <div class="drawer-item-emoji">🏠</div>
      <div class="drawer-item-label">Início</div>
    </a>
    <a href="chat.html?v=1" class="drawer-item">
      <div class="drawer-item-emoji">💬</div>
      <div class="drawer-item-label">Chat com Tatu</div>
    </a>
    <a href="dashboard.html?v=1" class="drawer-item">
      <div class="drawer-item-emoji">📊</div>
      <div class="drawer-item-label">Dashboard</div>
    </a>
    <a href="transacoes.html?v=1" class="drawer-item">
      <div class="drawer-item-emoji">💸</div>
      <div class="drawer-item-label">Transações</div>
    </a>
    <a href="contas.html?v=1" class="drawer-item">
      <div class="drawer-item-emoji">🏦</div>
      <div class="drawer-item-label">Contas e Bancos</div>
    </a>

  async function carregarInsights() {
    if (transacoes.length < 3) return;
    
    const cacheKey = `insights_${usuario.id}_${mesAtual.getFullYear()}_${mesAtual.getMonth()}`;
    const cached = localStorage.getItem(cacheKey);
    
    if (cached) {
      try {
        const parsed = JSON.parse(cached);
        const idade = (Date.now() - parsed.timestamp) / (1000 * 60 * 60);
        if (idade < 24) return;
      } catch (e) {}
    }
    
    await gerarInsightsIA();
  }
  
  async function gerarInsightsIA() {
    if (transacoes.length < 3) return;
    
    const entrada = transacoes.filter(t => t.tipo === 'entrada').reduce((a, t) => a + Number(t.valor), 0);
    const saida = transacoes.filter(t => t.tipo === 'saida').reduce((a, t) => a + Number(t.valor), 0);
    const saldo = entrada - saida;
    
    const porCategoria = {};
    transacoes.filter(t => t.tipo === 'saida').forEach(t => {
      const cat = t.categorias?.nome || 'Outros';
      if (!porCategoria[cat]) porCategoria[cat] = 0;
      porCategoria[cat] += Number(t.valor);
    });
    
    const topCategorias = Object.entries(porCategoria)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 5)
      .map(([nome, valor]) => `${nome}: R$ ${formatarMoeda(valor)}`)
      .join(', ');
    
    const inicioMesAnt = new Date(mesAtual.getFullYear(), mesAtual.getMonth() - 1, 1).toISOString().split('T')[0];
    const fimMesAnt = new Date(mesAtual.getFullYear(), mesAtual.getMonth(), 0).toISOString().split('T')[0];
    
    const { data: transAnt } = await supabase
      .from('transacoes')
      .select('valor, tipo, categorias(nome)')
      .eq('user_id', usuario.id)
      .gte('data', inicioMesAnt)
      .lte('data', fimMesAnt);
    
    let contextoAnterior = '';
    if (transAnt && transAnt.length > 0) {
      const entradaAnt = transAnt.filter(t => t.tipo === 'entrada').reduce((a, t) => a + Number(t.valor), 0);
      const saidaAnt = transAnt.filter(t => t.tipo === 'saida').reduce((a, t) => a + Number(t.valor), 0);
      contextoAnterior = `\nMês anterior: entrou R$ ${formatarMoeda(entradaAnt)}, saiu R$ ${formatarMoeda(saidaAnt)}`;
    }
    
    const nomeMes = mesAtual.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    const ativas = dividas.filter(d => d.status !== 'quitada').length;
    
    const contexto = `Mês: ${nomeMes}
Total de transações: ${transacoes.length}
Entradas: R$ ${formatarMoeda(entrada)}
Saídas: R$ ${formatarMoeda(saida)}
Saldo: R$ ${formatarMoeda(saldo)}
Top categorias de gasto: ${topCategorias}
Dívidas ativas: ${ativas}
Nível na jornada: ${perfil?.nivel_jornada || 1}${contextoAnterior}`;
    
    try {
      const resp = await fetch(IA_FUNCTION_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY
        },
        body: JSON.stringify({
          tipo: 'insights',
          mensagem: 'Analisa esses dados e me dá insights sobre meu mês.',
          contexto,
          max_tokens: 800
        })
      });
      
      const data = await resp.json();
      
      if (data.resposta) {
        const cacheKey = `insights_${usuario.id}_${mesAtual.getFullYear()}_${mesAtual.getMonth()}`;
        localStorage.setItem(cacheKey, JSON.stringify({
          texto: data.resposta,
          timestamp: Date.now()
        }));
        
        mostrarInsights(data.resposta, false);
        
        const xpKey = `insights_xp_${usuario.id}_${mesAtual.getFullYear()}_${mesAtual.getMonth()}`;
        if (!localStorage.getItem(xpKey)) {
          localStorage.setItem(xpKey, 'true');
          await darXP(15, 'insights_lido', 'Insights do mês lidos');
        }
      } else {
        const area = document.getElementById('insights-area');
        if (area) area.innerHTML = '';
      }
    } catch (err) {
      console.error('Erro insights:', err);
      const area = document.getElementById('insights-area');
      if (area) area.innerHTML = '';
    }
  }
  
  window.forcarNovoInsight = async function() {
    const btn = document.getElementById('btn-refresh-insights');
    if (btn) {
      btn.disabled = true;
      btn.textContent = '⏳ Gerando...';
    }
    
    const cacheKey = `insights_${usuario.id}_${mesAtual.getFullYear()}_${mesAtual.getMonth()}`;
    localStorage.removeItem(cacheKey);
    
    const area = document.getElementById('insights-area');
    if (area) {
      area.innerHTML = `
        <div class="insights-card">
          <div class="insights-header">
            <div class="insights-titulo">✨ Insights da IA</div>
          </div>
          <div class="insights-loading">
            <div class="insights-spinner"></div>
            <div class="insights-loading-text">🤖 Atualizando análise...</div>
          </div>
        </div>
      `;
    }
    
    await gerarInsightsIA();
  };
  
  function markdownToHtml(md) {
    if (!md) return '';
    let html = md;
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => '<ul>' + match + '</ul>');
    html = html.split('\n\n').map(p => {
      p = p.trim();
      if (!p) return '';
      if (p.startsWith('<h') || p.startsWith('<ul') || p.startsWith('<ol')) return p;
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('\n');
    return html;
  }
  
  function checarLevelUp() {
    const ultimo = localStorage.getItem(`lastNivel_${usuario.id}`);
    const atual = perfil?.nivel_jornada || 1;
    
    if (ultimo && parseInt(ultimo) < atual) {
      mostrarLevelUp(atual);
    }
    
    localStorage.setItem(`lastNivel_${usuario.id}`, atual.toString());
  }
  
  function mostrarLevelUp(nivel) {
    const info = niveisInfo[nivel];
    document.getElementById('levelup-emoji').textContent = info.emoji;
    document.getElementById('levelup-nivel').textContent = 'Nível ' + nivel;
    document.getElementById('levelup-nome').textContent = info.nome;
    document.getElementById('levelup-desc').textContent = info.desc;
    document.getElementById('levelup-overlay').classList.add('show');
    setTimeout(criarConfete, 200);
  }
  
  window.fecharLevelUp = function() {
    document.getElementById('levelup-overlay').classList.remove('show');
    document.querySelectorAll('.confete').forEach(c => c.remove());
  };
  
  function criarConfete() {
    const cores = ['#00d97e', '#ffb800', '#38bdf8', '#a855f7', '#ec4899'];
    const overlay = document.getElementById('levelup-overlay');
    
    for (let i = 0; i < 50; i++) {
      const c = document.createElement('div');
      c.className = 'confete';
      c.style.left = Math.random() * 100 + '%';
      c.style.top = '-20px';
      c.style.background = cores[Math.floor(Math.random() * cores.length)];
      c.style.animationDelay = (Math.random() * 0.5) + 's';
      c.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
      overlay.appendChild(c);
      setTimeout(() => c.remove(), 3500);
    }
  }
  
  window.abrirDrawer = function() {
    document.getElementById('drawer-overlay').classList.add('show');
  };
  
  window.fecharDrawer = function(e) {
    if (e && e.target.closest('.drawer')) return;
    document.getElementById('drawer-overlay').classList.remove('show');
  };
  
  window.sair = async function() {
    if (!confirm('Sair da conta?')) return;
    await supabase.auth.signOut();
    window.location.href = 'index.html?v=1';
  };
  
  function formatarMoeda(v) {
    return (Number(v) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  
  async function darXP(xp, acao, descricao) {
    await supabase.from('historico_xp').insert({
      user_id: usuario.id, acao, xp_ganho: xp, descricao
    });
    const { data: g } = await supabase.from('gamificacao').select('xp_total').eq('user_id', usuario.id).single();
    await supabase.from('gamificacao').update({
      xp_total: (g?.xp_total || 0) + xp,
      ultima_atividade: new Date().toISOString().split('T')[0]
    }).eq('user_id', usuario.id);
  }
</script>
