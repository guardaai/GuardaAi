<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>guardaí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
  
  :root {
    --bg: #0a0a0a;
    --bg-card: #141414;
    --bg-elev: #1c1c1c;
    --bg-input: #181818;
    --border: #252525;
    --border-strong: #353535;
    --brand: #00d97e;
    --brand-hover: #00ba6b;
    --brand-soft: rgba(0, 217, 126, 0.1);
    --danger: #ff4757;
    --danger-soft: rgba(255, 71, 87, 0.1);
    --warning: #ffb800;
    --warning-soft: rgba(255, 184, 0, 0.1);
    --info: #38bdf8;
    --info-soft: rgba(56, 189, 248, 0.1);
    --ia: #a855f7;
    --ia-soft: rgba(168, 85, 247, 0.1);
    --text: #ffffff;
    --text-mute: #a3a3a3;
    --text-faint: #525252;
  }
  
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  body { padding-bottom: 30px; }
  
  input, textarea, select {
    color: #fff !important;
    -webkit-text-fill-color: #fff !important;
  }
  
  .header {
    padding: 16px 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .brand-mark {
    width: 36px; height: 36px;
    background: var(--brand);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  
  .brand-mark::before {
    content: '';
    width: 14px; height: 14px;
    border: 3px solid var(--bg);
    border-radius: 4px;
    border-top: none; border-right: none;
  }
  
  .brand-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.02em;
    flex: 1;
  }
  
  .header-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px;
    position: relative;
  }
  
  .header-btn .badge {
    position: absolute;
    top: -4px; right: -4px;
    width: 10px; height: 10px;
    background: var(--brand);
    border: 2px solid var(--bg);
    border-radius: 50%;
  }
  
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px;
  }
  
  .saudacao { margin-bottom: 16px; }
  
  .saudacao-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 2px;
  }
  
  .saudacao-sub { font-size: 13px; color: var(--text-mute); }
  
  .level-card {
    background: linear-gradient(135deg, var(--brand) 0%, #00a85f 100%);
    border-radius: 20px;
    padding: 18px;
    color: #001a0e;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  
  .level-card::before {
    content: '';
    position: absolute;
    top: -20%; right: -10%;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
  }
  
  .level-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
    position: relative;
  }
  
  .level-info-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    opacity: 0.7;
  }
  
  .level-info-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-top: 2px;
  }
  
  .level-xp-info { text-align: right; }
  
  .level-xp-num {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }
  
  .level-xp-sub {
    font-size: 10px;
    opacity: 0.7;
    font-weight: 600;
  }
  
  .level-progress {
    background: rgba(0, 0, 0, 0.2);
    height: 8px;
    border-radius: 100px;
    overflow: hidden;
    margin-bottom: 8px;
    position: relative;
  }
  
  .level-progress-fill {
    height: 100%;
    background: #001a0e;
    border-radius: 100px;
  }
  
  .level-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 600;
    position: relative;
  }
  
  .resumo-mes {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 14px;
  }
  
  .resumo-mes-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .resumo-mes-mes {
    font-size: 11px;
    color: var(--text-faint);
    text-transform: capitalize;
    font-weight: 500;
    letter-spacing: 0;
  }
  
  .resumo-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  
  .resumo-item {
    padding: 10px;
    background: var(--bg-input);
    border-radius: 12px;
  }
  
  .resumo-item-label {
    font-size: 10px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
    font-weight: 600;
  }
  
  .resumo-item-valor {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  
  .resumo-item-valor.brand { color: var(--brand); }
  .resumo-item-valor.danger { color: var(--danger); }
  .resumo-item-valor.warning { color: var(--warning); }
  
  .resumo-saldo-row {
    padding: 12px;
    background: var(--bg-input);
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  
  .resumo-saldo-realizado { font-size: 11px; color: var(--text-mute); }
  
  .resumo-saldo-realizado strong {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    color: var(--text);
    display: block;
    margin-top: 2px;
  }
  
  .resumo-saldo-realizado strong.positivo { color: var(--brand); }
  .resumo-saldo-realizado strong.negativo { color: var(--danger); }
  
  .secao-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    color: var(--text-mute);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 18px 4px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .ver-todas {
    font-size: 11px;
    color: var(--brand);
    font-weight: 600;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }
  
  .alerta-vencidas {
    background: var(--danger-soft);
    border: 1px solid rgba(255, 71, 87, 0.3);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    display: flex;
    gap: 12px;
    align-items: center;
    cursor: pointer;
  }
  
  .alerta-vencidas-emoji { font-size: 28px; flex-shrink: 0; }
  
  .alerta-vencidas-info { flex: 1; }
  
  .alerta-vencidas-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--danger);
    margin-bottom: 2px;
  }
  
  .alerta-vencidas-sub { font-size: 12px; color: var(--text-mute); }
  
  .vencimento-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    border-left: 3px solid var(--warning);
  }
  
  .vencimento-card.hoje {
    border-left-color: var(--brand);
    background: linear-gradient(135deg, var(--brand-soft) 0%, var(--bg-card) 100%);
  }
  
  .vencimento-card.proximo { border-left-color: var(--warning); }
  .vencimento-card.longe { border-left-color: var(--info); }
  
  .vencimento-emoji {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: var(--bg-input);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  
  .vencimento-info { flex: 1; min-width: 0; }
  
  .vencimento-desc {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .vencimento-data {
    font-size: 11px;
    color: var(--text-mute);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .vencimento-badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  .vencimento-badge.hoje { background: var(--brand); color: #001a0e; }
  .vencimento-badge.proximo { background: var(--warning-soft); color: var(--warning); }
  .vencimento-badge.longe { background: var(--info-soft); color: var(--info); }
  
  .vencimento-valor {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--danger);
    white-space: nowrap;
    flex-shrink: 0;
  }
  
  .insight-card {
    background: linear-gradient(135deg, var(--ia-soft) 0%, var(--bg-card) 100%);
    border: 1px solid rgba(168, 85, 247, 0.3);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
    cursor: pointer;
  }
  
  .insight-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  
  .insight-emoji { font-size: 22px; }
  
  .insight-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--ia);
  }
  
  .insight-texto {
    font-size: 12px;
    color: var(--text-mute);
    line-height: 1.5;
  }
  
  .insight-texto strong { color: var(--text); }
  
  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  
  .menu-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    min-height: 100px;
    position: relative;
    overflow: hidden;
  }
  
  .menu-item:active { transform: scale(0.97); }
  
  .menu-item-icon { font-size: 28px; margin-bottom: 2px; }
  
  .menu-item-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.2;
  }
  
  .menu-item-sub {
    font-size: 11px;
    color: var(--text-mute);
    line-height: 1.3;
  }
  
  .menu-item-stat {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    margin-top: auto;
  }
  
  .menu-item-stat.danger { color: var(--danger); }
  .menu-item-stat.warning { color: var(--warning); }
  .menu-item-stat.brand { color: var(--brand); }
  
  .menu-item.dividas { border-color: rgba(255, 71, 87, 0.2); }
  .menu-item.dividas .menu-item-icon { color: var(--danger); }
  .menu-item.contas { border-color: rgba(0, 217, 126, 0.2); }
  .menu-item.transacoes { border-color: rgba(168, 85, 247, 0.2); }
  
  .fab-chat {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 56px; height: 56px;
    background: var(--ia);
    color: white;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(168, 85, 247, 0.4);
    z-index: 90;
  }
  
  .fab-chat:active { background: #9333ea; transform: scale(0.95); }
  
  .loader-circle {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-radius: 50%;
    border-top-color: var(--brand);
    animation: spin 0.8s linear infinite;
    margin: 30px auto;
  }
  
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .error-box {
    background: var(--danger-soft);
    border: 1px solid rgba(255, 71, 87, 0.3);
    border-radius: 14px;
    padding: 16px;
    margin: 20px 0;
    color: var(--danger);
    font-size: 13px;
    text-align: center;
  }
  
  .error-box .err-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  
  .error-box button {
    margin-top: 12px;
    background: var(--danger);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <div class="brand-mark"></div>
  <div class="brand-text">guardaí</div>
  <button class="header-btn" onclick="window.location.href='chat.html?v=1'">
    💬
    <div class="badge"></div>
  </button>
  <button class="header-btn" onclick="window.location.href='configuracoes.html?v=1'">☰</button>
</div>

<div class="container">

  <div class="saudacao">
    <div class="saudacao-titulo" id="saudacao-titulo">Olá!</div>
    <div class="saudacao-sub" id="saudacao-sub">Carregando...</div>
  </div>

  <div id="conteudo">
    <div class="loader-circle"></div>
  </div>

</div>

<button class="fab-chat" onclick="window.location.href='chat.html?v=1'">💬</button>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  
  const SUPABASE_URL = 'https://gmbsxrxqrxpbgyyvifcd.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_NSOgcu93sTiSreGYi-Ha3g_bqYsAK22';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
  
  const niveis = [
    { num: 1, nome: 'Diagnóstico', xpInicio: 0, xpFim: 100 },
    { num: 2, nome: 'Resgate de Dívidas', xpInicio: 100, xpFim: 400 },
    { num: 3, nome: 'Estabilização', xpInicio: 400, xpFim: 900 },
    { num: 4, nome: 'Construção', xpInicio: 900, xpFim: 1800 },
    { num: 5, nome: 'Liberdade Financeira', xpInicio: 1800, xpFim: 9999 }
  ];
  
  let usuario, perfil, gamificacao;
  let stats = {};
  
  (async () => {
    try {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = 'index.html?v=1';
        return;
      }
      usuario = session.user;
      
      await carregarDados();
      render();
    } catch (e) {
      console.error('Erro fatal home:', e);
      mostrarErro(e.message);
    }
  })();
  
  function mostrarErro(msg) {
    document.getElementById('conteudo').innerHTML = `
      <div class="error-box">
        <div class="err-titulo">⚠️ Algo deu errado</div>
        <div>${msg || 'Erro desconhecido'}</div>
        <button onclick="location.reload()">Tentar de novo</button>
      </div>
    `;
  }
  
  async function carregarDados() {
    // CORREÇÃO: perfis usa .id (não user_id)
    const [perfilRes, gameRes] = await Promise.all([
      supabase.from('perfis').select('*').eq('id', usuario.id).maybeSingle(),
      supabase.from('gamificacao').select('*').eq('user_id', usuario.id).maybeSingle()
    ]);
    
    perfil = perfilRes.data;
    gamificacao = gameRes.data;
    
    // CORREÇÃO: NÃO redireciona automaticamente em loop.
    // Se faltar dado, cria valor padrão pra não quebrar.
    if (!perfil) {
      perfil = { nome: 'Aí', email: usuario.email, nivel_jornada: 1 };
    }
    if (!gamificacao) {
      gamificacao = { xp_total: 0, streak_atual: 0, nivel_personagem: 1 };
    }
    
    // Dados do mês atual
    const hoje = new Date();
    const hojeStr = hoje.toISOString().split('T')[0];
    const inicio = new Date(hoje.getFullYear(), hoje.getMonth(), 1).toISOString().split('T')[0];
    const fim = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0).toISOString().split('T')[0];
    const proximos30 = new Date(hoje);
    proximos30.setDate(proximos30.getDate() + 30);
    const proximos30Str = proximos30.toISOString().split('T')[0];
    
    // OTIMIZAÇÃO: 1 query única pra tudo
    const [transMes, previstasProx30, dividasAtivas, contasAtivas, comprsAtivos, transContas] = await Promise.all([
      supabase.from('transacoes')
        .select('valor, tipo, status, data')
        .eq('user_id', usuario.id)
        .gte('data', inicio)
        .lte('data', fim),
      supabase.from('transacoes')
        .select('id, valor, descricao, data, categorias(nome, icone)')
        .eq('user_id', usuario.id)
        .eq('status', 'prevista')
        .lte('data', proximos30Str)
        .order('data', { ascending: true })
        .limit(10),
      supabase.from('dividas')
        .select('valor_atual')
        .eq('user_id', usuario.id)
        .eq('status', 'ativa'),
      supabase.from('contas')
        .select('id, tipo, saldo_inicial, limite')
        .eq('user_id', usuario.id)
        .eq('ativa', true),
      supabase.from('compromissos')
        .select('id')
        .eq('user_id', usuario.id)
        .eq('ativo', true),
      // 1 query única pra todas transações realizadas vinculadas a contas
      supabase.from('transacoes')
        .select('valor, tipo, conta_id')
        .eq('user_id', usuario.id)
        .eq('status', 'realizada')
        .not('conta_id', 'is', null)
    ]);
    
    const trans = transMes.data || [];
    const realizadas = trans.filter(t => (t.status || 'realizada') === 'realizada');
    const previstasMes = trans.filter(t => t.status === 'prevista');
    
    stats.entradaRealizada = realizadas.filter(t => t.tipo === 'entrada').reduce((a, t) => a + Number(t.valor), 0);
    stats.saidaRealizada = realizadas.filter(t => t.tipo === 'saida').reduce((a, t) => a + Number(t.valor), 0);
    stats.saldoRealizado = stats.entradaRealizada - stats.saidaRealizada;
    
    stats.previstasMes = previstasMes.reduce((a, t) => a + (t.tipo === 'saida' ? Number(t.valor) : -Number(t.valor)), 0);
    stats.saldoPrevisto = stats.saldoRealizado - stats.previstasMes;
    
    stats.proximasContas = (previstasProx30.data || []).slice(0, 5);
    stats.vencidasHoje = (previstasProx30.data || []).filter(t => t.data < hojeStr);
    stats.totalVencidas = stats.vencidasHoje.reduce((a, t) => a + Number(t.valor), 0);
    
    stats.totalDividas = (dividasAtivas.data || []).reduce((a, d) => a + Number(d.valor_atual), 0);
    stats.qtdDividas = (dividasAtivas.data || []).length;
    
    stats.contas = contasAtivas.data || [];
    stats.qtdContas = stats.contas.filter(c => c.tipo !== 'cartao_credito').length;
    stats.qtdCartoes = stats.contas.filter(c => c.tipo === 'cartao_credito').length;
    
    // OTIMIZAÇÃO: calcula patrimônio em memória (sem 1 query por conta)
    const contasReais = stats.contas.filter(c => c.tipo !== 'cartao_credito');
    let patrimonio = 0;
    for (const c of contasReais) {
      let s = Number(c.saldo_inicial || 0);
      (transContas.data || [])
        .filter(t => t.conta_id === c.id)
        .forEach(t => { s += t.tipo === 'entrada' ? Number(t.valor) : -Number(t.valor); });
      patrimonio += s;
    }
    stats.patrimonio = patrimonio;
    
    stats.qtdCompromissos = (comprsAtivos.data || []).length;
  }
  
  function nivelAtual() {
    const xp = gamificacao.xp_total || 0;
    for (const n of niveis) {
      if (xp >= n.xpInicio && xp < n.xpFim) return n;
    }
    return niveis[niveis.length - 1];
  }
  
  function render() {
    const nome = perfil.nome ? perfil.nome.split(' ')[0] : 'Aí';
    const hora = new Date().getHours();
    let saudacao;
    if (hora < 12) saudacao = 'Bom dia';
    else if (hora < 18) saudacao = 'Boa tarde';
    else saudacao = 'Boa noite';
    
    document.getElementById('saudacao-titulo').textContent = `${saudacao}, ${nome}!`;
    document.getElementById('saudacao-sub').textContent = `${stats.qtdContas} contas + ${stats.qtdCartoes} cartões • ${stats.qtdDividas} dívida${stats.qtdDividas === 1 ? '' : 's'} ativa${stats.qtdDividas === 1 ? '' : 's'}`;
    
    const n = nivelAtual();
    const xp = gamificacao.xp_total || 0;
    const xpNivel = xp - n.xpInicio;
    const xpTotal = n.xpFim - n.xpInicio;
    const pct = Math.min(100, (xpNivel / xpTotal) * 100);
    
    const hojeStr = new Date().toISOString().split('T')[0];
    const mesAtual = new Date().toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    
    // CORREÇÃO: usa streak_atual (não streak_dias)
    let html = `
      <div class="level-card" onclick="window.location.href='educacao.html?v=1'">
        <div class="level-top">
          <div>
            <div class="level-info-label">Nível ${n.num}</div>
            <div class="level-info-titulo">${n.nome}</div>
          </div>
          <div class="level-xp-info">
            <div class="level-xp-num">${xp}</div>
            <div class="level-xp-sub">XP TOTAL</div>
          </div>
        </div>
        <div class="level-progress">
          <div class="level-progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="level-meta">
          <span>${xpNivel} / ${xpTotal} XP</span>
          <span>🔥 ${gamificacao.streak_atual || 0} dias</span>
        </div>
      </div>
    `;
    
    html += `
      <div class="resumo-mes">
        <div class="resumo-mes-titulo">
          <span>📊 Resumo do mês</span>
          <span class="resumo-mes-mes">${mesAtual}</span>
        </div>
        <div class="resumo-row">
          <div class="resumo-item">
            <div class="resumo-item-label">↓ Entradas</div>
            <div class="resumo-item-valor brand">R$ ${formatarMoeda(stats.entradaRealizada)}</div>
          </div>
          <div class="resumo-item">
            <div class="resumo-item-label">↑ Saídas</div>
            <div class="resumo-item-valor danger">R$ ${formatarMoeda(stats.saidaRealizada)}</div>
          </div>
        </div>
        <div class="resumo-saldo-row">
          <div class="resumo-saldo-realizado">
            Saldo realizado
            <strong class="${stats.saldoRealizado >= 0 ? 'positivo' : 'negativo'}">R$ ${formatarMoeda(stats.saldoRealizado)}</strong>
          </div>
          ${stats.previstasMes !== 0 ? `
          <div class="resumo-saldo-realizado" style="text-align:right;">
            📅 Previsto fim do mês
            <strong class="${stats.saldoPrevisto >= 0 ? 'positivo' : 'negativo'}">R$ ${formatarMoeda(stats.saldoPrevisto)}</strong>
          </div>
          ` : ''}
        </div>
      </div>
    `;
    
    if (stats.vencidasHoje.length > 0) {
      html += `
        <div class="alerta-vencidas" onclick="window.location.href='transacoes.html?v=3'">
          <div class="alerta-vencidas-emoji">⚠️</div>
          <div class="alerta-vencidas-info">
            <div class="alerta-vencidas-titulo">${stats.vencidasHoje.length} conta${stats.vencidasHoje.length === 1 ? '' : 's'} vencida${stats.vencidasHoje.length === 1 ? '' : 's'}!</div>
            <div class="alerta-vencidas-sub">Total: R$ ${formatarMoeda(stats.totalVencidas)} • Toque pra ver</div>
          </div>
        </div>
      `;
    }
    
    if (stats.proximasContas.length > 0) {
      html += `
        <div class="secao-titulo">
          <span>📅 Próximas contas</span>
          <span class="ver-todas" onclick="window.location.href='transacoes.html?v=3'">Ver todas →</span>
        </div>
      `;
      
      stats.proximasContas.forEach(t => {
        const cat = t.categorias;
        const dataObj = new Date(t.data + 'T12:00:00');
        const dataFormatada = dataObj.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
        const dias = Math.ceil((dataObj - new Date(hojeStr + 'T00:00:00')) / (1000*60*60*24));
        
        let classe, badge, badgeClass;
        if (t.data < hojeStr) {
          classe = 'vencida';
          badge = '⚠️ VENCIDA';
          badgeClass = 'hoje';
        } else if (t.data === hojeStr) {
          classe = 'hoje';
          badge = 'HOJE';
          badgeClass = 'hoje';
        } else if (dias <= 7) {
          classe = 'proximo';
          badge = `EM ${dias}D`;
          badgeClass = 'proximo';
        } else {
          classe = 'longe';
          badge = `EM ${dias}D`;
          badgeClass = 'longe';
        }
        
        html += `
          <div class="vencimento-card ${classe}" onclick="window.location.href='transacoes.html?v=3'">
            <div class="vencimento-emoji">${cat?.icone || '📅'}</div>
            <div class="vencimento-info">
              <div class="vencimento-desc">${t.descricao}</div>
              <div class="vencimento-data">
                ${dataFormatada}
                <span class="vencimento-badge ${badgeClass}">${badge}</span>
              </div>
            </div>
            <div class="vencimento-valor">R$ ${formatarMoeda(t.valor)}</div>
          </div>
        `;
      });
    }
    
    const totalTrans = stats.entradaRealizada + stats.saidaRealizada;
    if (totalTrans > 0 && (stats.qtdDividas > 0 || stats.proximasContas.length > 0)) {
      let insightTexto;
      if (stats.totalVencidas > 0) {
        insightTexto = `Você tem <strong>R$ ${formatarMoeda(stats.totalVencidas)}</strong> em contas vencidas. Resolver isso primeiro libera espaço mental e evita juros. Eu te ajudo a negociar! 🦔`;
      } else if (stats.totalDividas > stats.entradaRealizada * 0.3 && stats.entradaRealizada > 0) {
        insightTexto = `Suas dívidas (<strong>R$ ${formatarMoeda(stats.totalDividas)}</strong>) representam mais de 30% da sua renda mensal. Toca em "Dívidas" e usa o Negociador IA — descontos de 30-70% são comuns! 🦔`;
      } else if (stats.saldoPrevisto < 0) {
        insightTexto = `Cuidado! Com as contas previstas, você vai fechar o mês negativo em <strong>R$ ${formatarMoeda(Math.abs(stats.saldoPrevisto))}</strong>. Tem como negociar alguma despesa ou aumentar entrada? 🦔`;
      } else {
        insightTexto = `Você está organizado! Saldo previsto fim do mês: <strong>R$ ${formatarMoeda(stats.saldoPrevisto)}</strong>. Continue assim e suba de nível. 🦔`;
      }
      
      html += `
        <div class="insight-card" onclick="window.location.href='chat.html?v=1'">
          <div class="insight-top">
            <div class="insight-emoji">🦔</div>
            <div class="insight-titulo">Tatu observou...</div>
          </div>
          <div class="insight-texto">${insightTexto}</div>
        </div>
      `;
    }
    
    html += `
      <div class="secao-titulo" style="margin-top:20px;">Atalhos</div>
      <div class="menu-grid">
        <div class="menu-item contas" onclick="window.location.href='contas.html?v=2'">
          <div class="menu-item-icon">🏦</div>
          <div class="menu-item-titulo">Vida Financeira</div>
          <div class="menu-item-sub">Contas, cartões, fixas</div>
          <div class="menu-item-stat brand">R$ ${formatarMoeda(stats.patrimonio)}</div>
        </div>
        <div class="menu-item transacoes" onclick="window.location.href='transacoes.html?v=3'">
          <div class="menu-item-icon">💸</div>
          <div class="menu-item-titulo">Transações</div>
          <div class="menu-item-sub">Entradas e saídas</div>
          <div class="menu-item-stat ${stats.saldoRealizado >= 0 ? 'brand' : 'danger'}">${stats.saldoRealizado >= 0 ? '+' : ''}R$ ${formatarMoeda(Math.abs(stats.saldoRealizado))}</div>
        </div>
        <div class="menu-item dividas" onclick="window.location.href='dividas.html?v=2'">
          <div class="menu-item-icon">💳</div>
          <div class="menu-item-titulo">Dívidas</div>
          <div class="menu-item-sub">Negociador IA</div>
          <div class="menu-item-stat ${stats.totalDividas > 0 ? 'danger' : 'brand'}">${stats.totalDividas > 0 ? 'R$ ' + formatarMoeda(stats.totalDividas) : '✓ Quitado'}</div>
        </div>
        <div class="menu-item" onclick="window.location.href='metas.html?v=1'">
          <div class="menu-item-icon">🎯</div>
          <div class="menu-item-titulo">Metas</div>
          <div class="menu-item-sub">Reserva e objetivos</div>
          <div class="menu-item-stat"></div>
        </div>
        <div class="menu-item" onclick="window.location.href='dashboard.html?v=1'">
          <div class="menu-item-icon">📊</div>
          <div class="menu-item-titulo">Dashboard</div>
          <div class="menu-item-sub">Gráficos detalhados</div>
          <div class="menu-item-stat"></div>
        </div>
        <div class="menu-item" onclick="window.location.href='educacao.html?v=1'">
          <div class="menu-item-icon">🎓</div>
          <div class="menu-item-titulo">Educação</div>
          <div class="menu-item-sub">Trilha do Tatu</div>
          <div class="menu-item-stat brand">Nível ${n.num}</div>
        </div>
      </div>
    `;
    
    document.getElementById('conteudo').innerHTML = html;
  }
  
  function formatarMoeda(v) {
    return (Number(v) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
</script>

</body>
</html>
