<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>Dívidas • guardaí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{--bg:#0a0a0a;--bg-card:#141414;--bg-elev:#1c1c1c;--bg-input:#181818;--border:#252525;--border-strong:#353535;--brand:#00d97e;--brand-hover:#00ba6b;--brand-soft:rgba(0,217,126,0.1);--danger:#ff4757;--danger-soft:rgba(255,71,87,0.1);--warning:#ffb800;--warning-soft:rgba(255,184,0,0.1);--info:#0891b2;--info-soft:rgba(56,189,248,0.1);--ia:#a855f7;--ia-soft:rgba(168,85,247,0.1);--text:#fff;--text-mute:#a3a3a3;--text-faint:#525252}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
body{padding-bottom:100px}
input,textarea,select{color:#fff!important;-webkit-text-fill-color:#fff!important;caret-color:var(--brand)}
input:-webkit-autofill,textarea:-webkit-autofill{-webkit-box-shadow:0 0 0 1000px var(--bg-input) inset!important;-webkit-text-fill-color:#fff!important}
.header{padding:16px 20px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px}
.header-back{width:36px;height:36px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.header-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;flex:1}
.container{max-width:480px;margin:0 auto;padding:16px 20px}
.tot-duplo{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.tot-box{border-radius:18px;padding:16px}
.tot-box.real{background:linear-gradient(135deg,var(--danger-soft) 0%,var(--bg-card) 100%);border:1px solid rgba(255,71,87,0.3)}
.tot-box.fatura{background:linear-gradient(135deg,var(--info-soft) 0%,var(--bg-card) 100%);border:1px solid rgba(56,189,248,0.3)}
.tot-label{font-family:'Space Grotesk',sans-serif;font-size:10px;color:var(--text-mute);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;font-weight:700}
.tot-valor{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px;word-break:break-word}
.tot-box.real .tot-valor{color:var(--danger)}
.tot-box.fatura .tot-valor{color:var(--info)}
.tot-sub{font-size:11px;color:var(--text-mute);line-height:1.4}
.tatu-nota{background:var(--ia-soft);border:1px solid rgba(168,85,247,0.3);border-radius:14px;padding:12px 14px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
.tatu-nota-emoji{font-size:20px;flex-shrink:0}
.tatu-nota-txt{font-size:12px;line-height:1.5;color:var(--text)}
.tatu-nota-txt strong{color:var(--ia)}
.alerta-agiota{background:linear-gradient(135deg,var(--danger-soft) 0%,var(--bg-card) 100%);border:1px solid rgba(255,71,87,0.4);border-radius:14px;padding:12px 14px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
.alerta-agiota-emoji{font-size:20px;flex-shrink:0}
.alerta-agiota-txt{font-size:12px;line-height:1.5;color:var(--text)}
.alerta-agiota-txt strong{color:var(--danger)}
.alerta-vencido{background:linear-gradient(135deg,var(--warning-soft) 0%,var(--bg-card) 100%);border:1px solid rgba(255,184,0,0.5);border-radius:14px;padding:14px;margin-bottom:16px}
.alerta-vencido-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.alerta-vencido-emoji{font-size:22px;flex-shrink:0}
.alerta-vencido-txt{font-size:12px;line-height:1.5;color:var(--text)}
.alerta-vencido-txt strong{color:var(--warning)}
.alerta-vencido-btn{width:100%;padding:11px;border-radius:10px;background:var(--warning);color:#1a1300;border:none;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.alerta-vencido-btn:active{transform:scale(0.98)}
.filtros{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filtros::-webkit-scrollbar{display:none}
.filtro-pill{background:var(--bg-card);border:1px solid var(--border);border-radius:100px;padding:8px 14px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;color:var(--text-mute);white-space:nowrap}
.filtro-pill.active{background:var(--brand-soft);border-color:var(--brand);color:var(--brand)}
.secao-label{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.1em;font-weight:700;margin:18px 0 10px 2px}
.divida-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all 0.3s}
.divida-card.atrasada{border-left:3px solid var(--danger)}
.divida-card.urgente{border-left:3px solid var(--warning)}
.divida-card.fatura{border-left:3px solid var(--info)}
.divida-card.juros{border-left:3px solid var(--danger);background:linear-gradient(135deg,rgba(255,71,87,0.06) 0%,var(--bg-card) 60%)}
.divida-card.paga{opacity:0.65;border-left:3px solid var(--brand)}
.divida-card:active{transform:scale(0.99)}
.divida-card.novo{animation:piscaItem 3.5s ease-out;background:var(--brand-soft);border-color:var(--brand);box-shadow:0 0 24px rgba(0,217,126,0.3);opacity:1!important}
@keyframes piscaItem{0%{transform:scale(0.95);opacity:0;background:var(--brand);border-color:var(--brand)}10%{transform:scale(1.02);opacity:1}30%{background:var(--brand-soft);transform:scale(1)}70%{background:var(--brand-soft);box-shadow:0 0 30px rgba(0,217,126,0.5)}100%{background:var(--bg-card);box-shadow:none}}
.div-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.div-icone{width:44px;height:44px;border-radius:12px;background:var(--danger-soft);color:var(--danger);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.div-icone.fatura{background:var(--info-soft);color:var(--info)}
.div-icone.juros{background:var(--danger);color:#fff}
.div-icone.paga{background:var(--brand-soft);color:var(--brand)}
.div-info{flex:1;min-width:0}
.div-credor{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:2px}
.div-tipo{font-size:11px;color:var(--text-mute)}
.div-valor-wrapper{text-align:right;flex-shrink:0}
.div-valor{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--danger)}
.div-valor.fatura{color:var(--info)}
.div-valor.paga{color:var(--brand)}
.div-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;text-transform:uppercase;display:inline-block;margin-top:4px}
.div-badge.atrasada{background:var(--danger-soft);color:var(--danger)}
.div-badge.urgente{background:var(--warning-soft);color:var(--warning)}
.div-badge.normal{background:var(--info-soft);color:var(--info)}
.div-badge.juros{background:var(--danger);color:#fff}
.div-badge.paga{background:var(--brand-soft);color:var(--brand)}
.div-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.div-meta-item{background:var(--bg-elev);padding:4px 10px;border-radius:100px;font-size:11px;color:var(--text-mute);font-family:'Space Grotesk',sans-serif;font-weight:600}
.div-meta-item.pago{background:var(--brand-soft);color:var(--brand)}
.div-meta-item.abatido{background:var(--info-soft);color:var(--info)}
.div-meta-item.juros{background:var(--danger-soft);color:var(--danger)}
.div-juros-aviso{background:var(--danger-soft);border:1px solid rgba(255,71,87,0.3);border-radius:10px;padding:8px 10px;margin-bottom:10px;font-size:11px;line-height:1.45;color:var(--text)}
.div-juros-aviso strong{color:var(--danger)}
.div-vencido-box{background:var(--warning-soft);border:1px solid rgba(255,184,0,0.45);border-radius:10px;padding:10px;margin-bottom:10px}
.div-vencido-txt{font-size:11px;line-height:1.45;color:var(--text);margin-bottom:8px}
.div-vencido-txt strong{color:var(--warning)}
.div-vencido-btn{width:100%;padding:9px;border-radius:9px;background:var(--warning);color:#1a1300;border:none;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.div-vencido-btn:active{transform:scale(0.98)}
.div-progresso{height:6px;background:var(--bg-elev);border-radius:100px;overflow:hidden;margin-bottom:10px}
.div-progresso-fill{height:100%;background:linear-gradient(90deg,var(--brand) 0%,var(--brand-hover) 100%);border-radius:100px;transition:width 0.5s}
.div-acao-btn{width:100%;padding:10px;border-radius:10px;background:linear-gradient(135deg,var(--ia-soft) 0%,var(--bg-elev) 100%);border:1px solid rgba(168,85,247,0.3);color:var(--ia);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.div-acao-btn:active{transform:scale(0.98)}
.empty-state{background:var(--bg-card);border:1px dashed var(--border-strong);border-radius:16px;padding:50px 20px;text-align:center;margin-top:30px}
.empty-emoji{font-size:56px;margin-bottom:14px}
.empty-titulo{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px;color:var(--brand)}
.empty-sub{font-size:13px;color:var(--text-mute);line-height:1.5}
.loader-circle{width:32px;height:32px;border:3px solid var(--border);border-radius:50%;border-top-color:var(--brand);animation:spin 0.8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--brand);color:#001a0e;font-size:28px;font-weight:700;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(0,217,126,0.4);display:flex;align-items:center;justify-content:center;z-index:50}
.fab:active{transform:scale(0.95)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);border-top:1px solid var(--border);border-radius:24px 24px 0 0;padding:20px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-titulo{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{width:32px;height:32px;border-radius:10px;background:var(--bg-elev);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text-mute);margin-bottom:6px;font-weight:500}
.field input,.field select{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--text);font-size:16px;font-family:'Inter',sans-serif;min-height:48px}
.field input:focus,.field select:focus{outline:none;border-color:var(--brand)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.valor-input-wrapper{display:flex;align-items:center;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;padding:14px}
.valor-input-wrapper:focus-within{border-color:var(--brand)}
.valor-prefix{color:var(--text-mute);font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;margin-right:6px}
.valor-input-wrapper input{background:transparent;border:none;flex:1;text-align:right;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;padding:0;min-height:0;color:#fff!important;-webkit-text-fill-color:#fff!important}
.juros-toggle{display:flex;align-items:center;justify-content:space-between;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;cursor:pointer}
.juros-toggle.on{border-color:var(--danger);background:linear-gradient(135deg,var(--danger-soft) 0%,var(--bg-input) 100%)}
.juros-toggle-txt{flex:1;padding-right:12px}
.juros-toggle-titulo{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;margin-bottom:2px}
.juros-toggle-sub{font-size:11px;color:var(--text-mute);line-height:1.4}
.switch{width:48px;height:28px;border-radius:100px;background:var(--border-strong);position:relative;flex-shrink:0;transition:background 0.2s}
.switch.on{background:var(--danger)}
.switch::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform 0.2s}
.switch.on::after{transform:translateX(20px)}
.juros-campos{display:none}
.juros-campos.show{display:block}
.juros-box{background:linear-gradient(135deg,var(--danger-soft) 0%,var(--bg-input) 100%);border:1px solid rgba(255,71,87,0.4);border-radius:12px;padding:14px;margin-bottom:14px;display:none}
.juros-box.show{display:block}
.juros-box-titulo{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:var(--danger);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.juros-box-valor{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--danger);margin-bottom:6px}
.juros-box-sub{font-size:11px;color:var(--text);line-height:1.5}
.juros-box-sub strong{color:var(--danger)}
.pag-resumo{background:var(--bg-input);border-radius:12px;padding:12px;margin-bottom:14px}
.pag-resumo-linha{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.pag-resumo-linha.total{border-top:1px solid var(--border);margin-top:4px;padding-top:8px;font-family:'Space Grotesk',sans-serif;font-weight:700}
.pag-resumo-label{color:var(--text-mute)}
.pag-resumo-val{font-family:'Space Grotesk',sans-serif;font-weight:700}
.pag-resumo-val.brand{color:var(--brand)}
.pag-resumo-val.danger{color:var(--danger)}
.pag-atalhos{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.pag-atalho{flex:1;min-width:70px;background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--text-mute)}
.pag-atalho:active{background:var(--brand-soft);border-color:var(--brand);color:var(--brand)}
.opc-foto{background:linear-gradient(135deg,var(--ia-soft) 0%,var(--bg-card) 100%);border:1px solid rgba(168,85,247,0.3);border-radius:12px;padding:14px;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.opc-foto:active{transform:scale(0.98)}
.opc-foto-icon{font-size:28px}
.opc-foto-content{flex:1}
.opc-foto-titulo{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--ia);margin-bottom:2px}
.opc-foto-sub{font-size:11px;color:var(--text-mute)}
.revisao-card{background:linear-gradient(135deg,var(--ia-soft) 0%,var(--bg-card) 100%);border:1px solid var(--ia);border-radius:14px;padding:14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.revisao-emoji{font-size:24px}
.revisao-texto{font-size:13px;line-height:1.5;color:var(--text)}
.revisao-texto strong{color:var(--ia)}
.btn{padding:14px;border-radius:12px;border:none;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;min-height:50px}
.btn-primary{background:var(--brand);color:#001a0e;width:100%}
.btn-primary:active{background:var(--brand-hover)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-secondary{background:var(--bg-elev);color:var(--text);border:1px solid var(--border)}
.btn-warning{background:var(--warning);color:#1a1300;width:100%}
.btn-warning:active{filter:brightness(0.92)}
.acoes-modal{background:var(--bg-card);border-top:1px solid var(--border);border-radius:24px 24px 0 0;padding:20px;max-width:480px;width:100%}
.acao-btn{display:flex;align-items:center;gap:14px;padding:14px;border-radius:12px;cursor:pointer}
.acao-btn:active{background:var(--bg-elev)}
.acao-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.acao-icon.brand{background:var(--brand-soft);color:var(--brand)}
.acao-icon.info{background:var(--info-soft);color:var(--info)}
.acao-icon.ia{background:var(--ia-soft);color:var(--ia)}
.acao-icon.warning{background:var(--warning-soft);color:var(--warning)}
.acao-icon.danger{background:var(--danger-soft);color:var(--danger)}
.acao-info-titulo{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600}
.acao-info-sub{font-size:11px;color:var(--text-mute)}
.negociador-modal{background:var(--bg-card);border-top:1px solid var(--border);border-radius:24px 24px 0 0;padding:20px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.neg-content{background:var(--bg-input);border-radius:14px;padding:14px;font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;margin-bottom:14px}
.neg-content strong{color:var(--brand);font-weight:700}
.neg-tatu{background:var(--ia-soft);border:1px solid rgba(168,85,247,0.3);border-radius:14px;padding:14px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start}
.ia-spinner{width:50px;height:50px;border:4px solid var(--ia-soft);border-top-color:var(--ia);border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto 20px}
.ia-titulo{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--ia);text-align:center;margin-bottom:6px}
.ia-sub{font-size:13px;color:var(--text-mute);text-align:center}
.upload-hidden{display:none}
.venc-item{background:var(--bg-input);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
.venc-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.venc-item-cred{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700}
.venc-item-val{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--warning)}
.venc-item-data{font-size:11px;color:var(--text-mute);margin-bottom:10px}
.venc-item-acoes{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.venc-btn{padding:10px;border-radius:9px;border:none;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.venc-btn.paguei{background:var(--brand);color:#001a0e}
.venc-btn.nao{background:var(--danger-soft);color:var(--danger);border:1px solid rgba(255,71,87,0.4)}
.venc-btn:active{transform:scale(0.98)}
.xp-toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--brand);color:#001a0e;padding:14px 24px;border-radius:100px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;z-index:9999;box-shadow:0 8px 32px rgba(0,217,126,0.4);display:none;max-width:90%;text-align:center;animation:toastIn 0.3s ease}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</head>
<body>
<div class="header">
<button class="header-back" onclick="window.location.href='home.html?v=' + Date.now()">‹</button>
<div class="header-title">Dívidas</div>
</div>
<div class="container" id="container"><div class="loader-circle"></div></div>
<button class="fab" onclick="abrirAdd()" title="Adicionar dívida">+</button>
<input type="file" id="input-foto" class="upload-hidden" accept="image/*" onchange="processarFoto(event)">
<input type="file" id="input-negoc" class="upload-hidden" accept="image/*" onchange="processarNegoc(event)">
<div class="modal-overlay" id="modal-add" onclick="if(event.target===this)fecharModal('modal-add')">
<div class="modal" onclick="event.stopPropagation()" id="modal-add-content"></div>
</div>
<div class="modal-overlay" id="modal-pagar" onclick="if(event.target===this)fecharModal('modal-pagar')">
<div class="modal" onclick="event.stopPropagation()" id="modal-pagar-content"></div>
</div>
<div class="modal-overlay" id="modal-vencidos" onclick="if(event.target===this)fecharModal('modal-vencidos')">
<div class="modal" onclick="event.stopPropagation()" id="vencidos-content"></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL='https://gmbsxrxqrxpbgyyvifcd.supabase.co';
const SUPABASE_KEY='sb_publishable_NSOgcu93sTiSreGYi-Ha3g_bqYsAK22';
const IA_URL='https://gmbsxrxqrxpbgyyvifcd.supabase.co/functions/v1/claude-chat';
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);

const TIPOS_DIV={cartao:{e:'💳',n:'Cartão'},emprestimo:{e:'💸',n:'Empréstimo'},pessoal:{e:'👨‍👩‍👧',n:'Empréstimo pessoal/amigo'},financiamento:{e:'🏦',n:'Financiamento'},financ_imovel:{e:'🏦',n:'Financ. imóvel'},financ_veiculo:{e:'🚗',n:'Financ. veículo'},cheque_especial:{e:'🆘',n:'Cheque Especial'},loja:{e:'🛍️',n:'Loja'},carne:{e:'📋',n:'Carnê'},medica:{e:'🏥',n:'Médica'},estudantil:{e:'🎓',n:'Estudantil'},consignado:{e:'💼',n:'Consignado'},mercado:{e:'🛒',n:'Mercado'},outro:{e:'📌',n:'Outro'}};

const MESES=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const JUROS_MESES_GERAR=12;
const MARCA_JUROS='[JUROS_MENSAL]';

function ehFatura(d){return d.tipo==='cartao'}
function ehJuros(d){return d.juros_rola===true}

let usuario;
let dividas=[];
let contas=[];
let jurosVencidos=[];
let filtroAtual='real';
let dividaIdNegoc=null;
let ultimoItemNovoId=null;
let salvando=false;
let pagandoParcial=false;
let jurosLigado=false;
let resolvendoVencido=false;

(async()=>{
  const{data:{session}}=await supabase.auth.getSession();
  if(!session){window.location.href='index.html?v='+Date.now();return}
  usuario=session.user;
  await carregarContas();
  await carregar();
})();

async function carregarContas(){
  const{data}=await supabase.from('contas').select('id,nome,icone,tipo').eq('user_id',usuario.id).eq('ativa',true);
  contas=(data||[]).filter(c=>c.tipo!=='cartao_credito');
}

async function carregar(){
  const{data}=await supabase.from('dividas').select('*').eq('user_id',usuario.id).order('prioridade',{ascending:true}).order('data_vencimento',{ascending:true});
  dividas=data||[];
  await reporJanelasJuros();
  await detectarJurosVencidos();
  render();
}

function jurosDoMes(d){
  if(!ehJuros(d)||!d.juros_mensal)return 0;
  return Number(d.valor_atual)*Number(d.juros_mensal)/100;
}

function diaCobranca(d){
  return Number(d.dia_cobranca_juros)|| (d.data_vencimento?new Date(d.data_vencimento+'T12:00:00').getDate():10);
}

async function apagarJurosFuturos(dividaId){
  const hoje=new Date().toISOString().split('T')[0];
  const{error}=await supabase.from('transacoes').delete()
    .eq('user_id',usuario.id)
    .eq('divida_id',dividaId)
    .eq('recorrente',true)
    .eq('status','prevista')
    .gte('data',hoje);
  if(error)console.error('apagarJurosFuturos',error);
}

async function gerarJurosFuturos(divida){
  const saldo=Number(divida.valor_atual);
  const taxa=Number(divida.juros_mensal);
  if(!saldo||saldo<=0||!taxa||taxa<=0)return {error:{message:'saldo ou taxa zerados'}};
  const valorJuros=Math.round((saldo*taxa/100)*100)/100;
  const dia=Math.min(28,diaCobranca(divida));
  const hoje=new Date();
  hoje.setHours(12,0,0,0);

  let d=new Date(hoje.getFullYear(),hoje.getMonth(),dia,12,0,0);
  if(d<hoje)d.setMonth(d.getMonth()+1);

  const linhas=[];
  for(let i=0;i<JUROS_MESES_GERAR;i++){
    const dt=new Date(d.getFullYear(),d.getMonth()+i,dia,12,0,0);
    linhas.push({
      user_id:usuario.id,
      valor:valorJuros,
      descricao:`Juros ${divida.credor} (${taxa}% s/ saldo) ${MARCA_JUROS}`,
      tipo:'saida',
      categoria:'outro',
      data:dt.toISOString().split('T')[0],
      status:'prevista',
      recorrente:true,
      divida_id:divida.id
    });
  }
  const{error}=await supabase.from('transacoes').insert(linhas);
  return {error};
}

async function regenerarJuros(divida){
  await apagarJurosFuturos(divida.id);
  if(divida.status==='ativa'&&Number(divida.valor_atual)>0){
    const{error}=await gerarJurosFuturos(divida);
    if(error)console.error('regenerarJuros',error);
  }
}

// 🆕 PENDÊNCIA 1: repõe a janela de 12 meses de juros futuros quando encolhe
async function reporJanelasJuros(){
  const hoje=new Date();hoje.setHours(12,0,0,0);
  const hojeStr=hoje.toISOString().split('T')[0];
  const ativasJuros=dividas.filter(d=>ehJuros(d)&&d.status==='ativa'&&Number(d.valor_atual)>0&&Number(d.juros_mensal)>0);
  if(ativasJuros.length===0)return;

  for(const d of ativasJuros){
    // pega os juros futuros que já existem dessa dívida
    const{data:futuros}=await supabase.from('transacoes').select('data')
      .eq('user_id',usuario.id).eq('divida_id',d.id)
      .eq('recorrente',true).eq('status','prevista')
      .gte('data',hojeStr).order('data',{ascending:true});
    const qtd=(futuros||[]).length;
    if(qtd>=JUROS_MESES_GERAR)continue; // janela cheia, nada a fazer

    // descobre o último mês já lançado pra continuar a partir dele (sem duplicar)
    const dia=Math.min(28,diaCobranca(d));
    const valorJuros=Math.round((Number(d.valor_atual)*Number(d.juros_mensal)/100)*100)/100;
    const datasExistentes=new Set((futuros||[]).map(f=>f.data));

    let ultimaData;
    if(qtd>0){
      ultimaData=new Date((futuros[futuros.length-1].data)+'T12:00:00');
    }else{
      // nenhuma futura: começa do próximo vencimento
      ultimaData=new Date(hoje.getFullYear(),hoje.getMonth(),dia,12,0,0);
      if(ultimaData<hoje)ultimaData.setMonth(ultimaData.getMonth()+1);
      ultimaData.setMonth(ultimaData.getMonth()-1); // ajusta pro loop somar +1 e cair no mês certo
    }

    const faltam=JUROS_MESES_GERAR-qtd;
    const linhas=[];
    let base=new Date(ultimaData.getFullYear(),ultimaData.getMonth(),dia,12,0,0);
    for(let i=0;i<faltam;i++){
      base=new Date(base.getFullYear(),base.getMonth()+1,dia,12,0,0);
      const ds=base.toISOString().split('T')[0];
      if(datasExistentes.has(ds))continue;
      linhas.push({
        user_id:usuario.id,
        valor:valorJuros,
        descricao:`Juros ${d.credor} (${d.juros_mensal}% s/ saldo) ${MARCA_JUROS}`,
        tipo:'saida',
        categoria:'outro',
        data:ds,
        status:'prevista',
        recorrente:true,
        divida_id:d.id
      });
    }
    if(linhas.length>0){
      const{error}=await supabase.from('transacoes').insert(linhas);
      if(error)console.error('reporJanelasJuros',error);
    }
  }
}

// 🆕 PENDÊNCIA 2: detecta juros vencidos não-pagos (prevista + data<hoje + marca)
async function detectarJurosVencidos(){
  jurosVencidos=[];
  const hojeStr=new Date().toISOString().split('T')[0];
  const ativasJuros=dividas.filter(d=>ehJuros(d)&&d.status==='ativa');
  if(ativasJuros.length===0)return;
  const ids=ativasJuros.map(d=>d.id);
  const{data}=await supabase.from('transacoes').select('id,divida_id,valor,data,descricao')
    .eq('user_id',usuario.id).in('divida_id',ids)
    .eq('recorrente',true).eq('status','prevista')
    .lt('data',hojeStr).order('data',{ascending:true});
  const linhas=(data||[]).filter(t=>(t.descricao||'').includes(MARCA_JUROS));
  // agrupa por dívida
  for(const l of linhas){
    const d=ativasJuros.find(x=>x.id===l.divida_id);
    if(!d)continue;
    jurosVencidos.push({...l,credor:d.credor,divida:d});
  }
}

function render(){
  const hoje=new Date().toISOString().split('T')[0];
  const ativas=dividas.filter(d=>d.status==='ativa');

  const faturas=ativas.filter(d=>ehFatura(d)&&d.data_vencimento>=hoje);
  const emprestimos=ativas.filter(d=>!ehFatura(d));
  const faturasVencidas=ativas.filter(d=>ehFatura(d)&&d.data_vencimento<hoje);
  const dividaReal=[...emprestimos,...faturasVencidas];

  const atrasadas=ativas.filter(d=>d.data_vencimento<hoje&&!ehJuros(d));
  const totalReal=dividaReal.reduce((a,d)=>a+Number(d.valor_atual),0);
  const totalFatura=faturas.reduce((a,d)=>a+Number(d.valor_atual),0);

  const dividasJuros=ativas.filter(d=>ehJuros(d));
  const totalJurosMes=dividasJuros.reduce((a,d)=>a+jurosDoMes(d),0);

  const totalVencidos=jurosVencidos.reduce((a,j)=>a+Number(j.valor),0);

  let lista=[];
  let modoSecoes=false;
  if(filtroAtual==='real')lista=dividaReal;
  else if(filtroAtual==='faturas')lista=faturas;
  else if(filtroAtual==='atrasadas')lista=atrasadas;
  else if(filtroAtual==='pagas')lista=dividas.filter(d=>d.status==='paga');
  else if(filtroAtual==='todas'){lista=dividas;modoSecoes=true}

  document.getElementById('container').innerHTML=`
    ${ativas.length>0?`
      <div class="tot-duplo">
        <div class="tot-box real">
          <div class="tot-label">💸 Dívida real</div>
          <div class="tot-valor">R$ ${fm(totalReal)}</div>
          <div class="tot-sub">${dividaReal.length} item${dividaReal.length===1?'':'s'}${faturasVencidas.length>0?` • inclui ${faturasVencidas.length} fatura venc.`:''}</div>
        </div>
        <div class="tot-box fatura">
          <div class="tot-label">💳 Faturas do mês</div>
          <div class="tot-valor">R$ ${fm(totalFatura)}</div>
          <div class="tot-sub">${faturas.length} fatura${faturas.length===1?'':'s'} • some quando paga</div>
        </div>
      </div>
    `:''}
    ${jurosVencidos.length>0?`
      <div class="alerta-vencido">
        <div class="alerta-vencido-top">
          <div class="alerta-vencido-emoji">⚠️</div>
          <div class="alerta-vencido-txt"><strong>Tatu:</strong> você tem <strong>${jurosVencidos.length} cobrança${jurosVencidos.length===1?'':'s'} de juros vencida${jurosVencidos.length===1?'':'s'}</strong> (R$ ${fm(totalVencidos)}) que não foram marcadas como pagas. Se não pagou, o juros <strong>vira saldo</strong> e a dívida cresce. Bora resolver?</div>
        </div>
        <button class="alerta-vencido-btn" onclick="abrirVencidos()">Resolver juros vencidos →</button>
      </div>
    `:''}
    ${totalJurosMes>0?`
      <div class="alerta-agiota">
        <div class="alerta-agiota-emoji">🔴</div>
        <div class="alerta-agiota-txt"><strong>Tatu (atenção máxima):</strong> Suas dívidas de juros te custam <strong>R$ ${fm(totalJurosMes)} por mês</strong> só de juros. Isso é dinheiro que evapora todo mês sem abater nada. <strong>Prioridade nº1: quitar essas.</strong></div>
      </div>
    `:''}
    ${ativas.length>0?`
      <div class="tatu-nota">
        <div class="tatu-nota-emoji">🦔</div>
        <div class="tatu-nota-txt"><strong>Tatu:</strong> Fatura de cartão é gasto do mês, some quando você paga. <strong>Dívida real</strong> é o que eu vou te ajudar a eliminar de verdade.</div>
      </div>
    `:''}
    <div class="filtros">
      <div class="filtro-pill ${filtroAtual==='real'?'active':''}" onclick="setFiltro('real')">💸 Dívida real (${dividaReal.length})</div>
      <div class="filtro-pill ${filtroAtual==='faturas'?'active':''}" onclick="setFiltro('faturas')">💳 Faturas (${faturas.length})</div>
      ${atrasadas.length>0?`<div class="filtro-pill ${filtroAtual==='atrasadas'?'active':''}" onclick="setFiltro('atrasadas')" style="color:var(--danger);">⚠️ Atrasadas (${atrasadas.length})</div>`:''}
      <div class="filtro-pill ${filtroAtual==='pagas'?'active':''}" onclick="setFiltro('pagas')">Pagas</div>
      <div class="filtro-pill ${filtroAtual==='todas'?'active':''}" onclick="setFiltro('todas')">Todas</div>
    </div>
    ${modoSecoes?renderSecoes(dividaReal,faturas,hoje):(lista.length===0?renderEmpty():lista.map(d=>renderDivida(d,hoje)).join(''))}
  `;

  if(ultimoItemNovoId){
    setTimeout(()=>{
      const el=document.querySelector(`[data-item-id="${ultimoItemNovoId}"]`);
      if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
      setTimeout(()=>{ultimoItemNovoId=null},3800);
    },200);
  }
}

function renderSecoes(real,faturas,hoje){
  let html='';
  if(real.length>0){
    html+=`<div class="secao-label">💸 Dívida real</div>`;
    html+=real.map(d=>renderDivida(d,hoje)).join('');
  }
  if(faturas.length>0){
    html+=`<div class="secao-label">💳 Faturas do mês</div>`;
    html+=faturas.map(d=>renderDivida(d,hoje)).join('');
  }
  const pagas=dividas.filter(d=>d.status==='paga');
  if(pagas.length>0){
    html+=`<div class="secao-label">✓ Pagas</div>`;
    html+=pagas.map(d=>renderDivida(d,hoje)).join('');
  }
  if(real.length===0&&faturas.length===0&&pagas.length===0)html=renderEmpty();
  return html;
}

function renderEmpty(){
  if(filtroAtual==='real'){
    return `<div class="empty-state"><div class="empty-emoji">🎉</div><div class="empty-titulo">Sem dívida real!</div><div class="empty-sub">Você não tem empréstimos nem faturas vencidas. Mandou bem!</div></div>`;
  }
  if(filtroAtual==='faturas'){
    return `<div class="empty-state"><div class="empty-emoji">💳</div><div class="empty-titulo">Nenhuma fatura aberta</div><div class="empty-sub">Suas faturas do mês aparecem aqui</div></div>`;
  }
  if(filtroAtual==='pagas'){
    return `<div class="empty-state"><div class="empty-emoji">📋</div><div class="empty-titulo">Nada pago ainda</div><div class="empty-sub">As dívidas que você quitar aparecem aqui</div></div>`;
  }
  return `<div class="empty-state"><div class="empty-emoji">📋</div><div class="empty-titulo">Nada por aqui</div><div class="empty-sub">Nenhuma dívida nesse filtro</div></div>`;
}

function renderDivida(d,hoje){
  const tipo=TIPOS_DIV[d.tipo]||TIPOS_DIV.outro;
  const ePaga=d.status==='paga';
  const eFatura=ehFatura(d);
  const eJuros=ehJuros(d);
  const eAtr=!ePaga&&!eJuros&&d.data_vencimento<hoje;
  const dias=Math.ceil((new Date(d.data_vencimento)-new Date(hoje))/86400000);
  const eUrg=!ePaga&&!eAtr&&!eJuros&&dias<=7&&dias>=0;
  const ehNovo=d.id===ultimoItemNovoId;

  let cClass='';
  let bdg='';
  if(ePaga){cClass='paga';bdg=`<div class="div-badge paga">✓ PAGA</div>`}
  else if(eJuros){cClass='juros';bdg=`<div class="div-badge juros">🔴 ${d.juros_mensal}%/MÊS</div>`}
  else if(eAtr){cClass='atrasada';bdg=`<div class="div-badge atrasada">${eFatura?'FATURA VENCIDA':'ATRASADA'}</div>`}
  else if(eUrg){cClass='urgente';bdg=`<div class="div-badge urgente">EM ${dias}D</div>`}
  else{cClass=eFatura?'fatura':'';bdg=`<div class="div-badge normal">VENCE EM ${dias}D</div>`}

  if(ehNovo)cClass+=' novo';

  const dataPagaFmt=ePaga&&d.atualizado_em?new Date(d.atualizado_em).toLocaleDateString('pt-BR'):null;

  const orig=Number(d.valor_original||d.valor_atual);
  const atual=Number(d.valor_atual);
  const abatido=orig-atual;
  const temAbatimento=!ePaga&&abatido>0.01&&orig>0;
  const pctPago=temAbatimento?Math.min(100,Math.round((abatido/orig)*100)):0;

  const jm=eJuros&&!ePaga?jurosDoMes(d):0;

  // 🆕 juros vencidos dessa dívida
  const vencidosDessa=eJuros&&!ePaga?jurosVencidos.filter(j=>j.divida_id===d.id):[];
  const totalVencDessa=vencidosDessa.reduce((a,j)=>a+Number(j.valor),0);

  return `
    <div class="divida-card ${cClass}" data-item-id="${d.id}" onclick="abrirAcoes('${d.id}')">
      <div class="div-top">
        <div class="div-icone ${ePaga?'paga':(eJuros?'juros':(eFatura&&!eAtr?'fatura':''))}">${ePaga?'✓':(eJuros?'🔴':tipo.e)}</div>
        <div class="div-info">
          <div class="div-credor">${d.credor}</div>
          <div class="div-tipo">${tipo.n}${eJuros?' • juros rola no saldo':''}${d.descricao&&d.descricao!==`Dívida ${d.credor}`?' • '+d.descricao:''}</div>
        </div>
        <div class="div-valor-wrapper">
          <div class="div-valor ${ePaga?'paga':(eFatura&&!eAtr?'fatura':'')}">R$ ${fm(d.valor_atual)}</div>
          ${bdg}
        </div>
      </div>
      ${eJuros&&!ePaga?`<div class="div-juros-aviso">🔴 Te custa <strong>R$ ${fm(jm)}/mês</strong> de juros (${d.juros_mensal}% sobre R$ ${fm(atual)}). O juros entra todo mês nas suas transações. Pagar só o juros <strong>não diminui</strong> o saldo — pra abater, use "Pagar um valor" aqui.</div>`:''}
      ${vencidosDessa.length>0?`<div class="div-vencido-box"><div class="div-vencido-txt">⚠️ <strong>${vencidosDessa.length} juros vencido${vencidosDessa.length===1?'':'s'}</strong> (R$ ${fm(totalVencDessa)}) sem marcar. Se não pagou, vira saldo.</div><button class="div-vencido-btn" onclick="event.stopPropagation();abrirVencidos('${d.id}')">Resolver agora</button></div>`:''}
      ${temAbatimento?`<div class="div-progresso"><div class="div-progresso-fill" style="width:${pctPago}%;"></div></div>`:''}
      <div class="div-meta">
        ${ePaga&&dataPagaFmt?`<div class="div-meta-item pago">✓ PAGO em ${dataPagaFmt}</div>`:`<div class="div-meta-item">📅 ${eJuros?'Juros todo dia '+diaCobranca(d):new Date(d.data_vencimento+'T12:00:00').toLocaleDateString('pt-BR')}</div>`}
        ${eJuros&&!ePaga?`<div class="div-meta-item juros">🔴 R$ ${fm(jm)}/mês de juros</div>`:''}
        ${temAbatimento?`<div class="div-meta-item abatido">✓ já abateu R$ ${fm(abatido)} (${pctPago}%)</div>`:''}
        ${!eJuros&&d.juros_mensal?`<div class="div-meta-item">📈 ${d.juros_mensal}%/mês</div>`:''}
      </div>
      ${!ePaga?`<button class="div-acao-btn" onclick="event.stopPropagation();abrirNegociador('${d.id}')">🦔 Negociar com Tatu</button>`:''}
    </div>
  `;
}

window.setFiltro=function(f){filtroAtual=f;render()};

// 🆕 MODAL RESOLVER JUROS VENCIDOS (pagou / não paguei → bola de neve)
window.abrirVencidos=function(soDividaId){
  fecharModal('modal-acoes');
  setTimeout(()=>{
    let lista=jurosVencidos;
    if(soDividaId)lista=jurosVencidos.filter(j=>j.divida_id===soDividaId);
    if(lista.length===0){toast('Nenhum juros vencido por aqui');return}

    const itensHTML=lista.map(j=>{
      const dataFmt=new Date(j.data+'T12:00:00').toLocaleDateString('pt-BR');
      return `
        <div class="venc-item" id="venc-${j.id}">
          <div class="venc-item-top">
            <div class="venc-item-cred">${j.credor}</div>
            <div class="venc-item-val">R$ ${fm(j.valor)}</div>
          </div>
          <div class="venc-item-data">Juros que venceu em ${dataFmt}</div>
          <div class="venc-item-acoes">
            <button class="venc-btn paguei" onclick="resolverVencido('${j.id}','paguei')">✓ Eu paguei</button>
            <button class="venc-btn nao" onclick="resolverVencido('${j.id}','nao')">Não paguei → rolar</button>
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('vencidos-content').innerHTML=`
      <div class="modal-titulo">
        <span>⚠️ Juros vencidos</span>
        <button class="modal-close" onclick="fecharModal('modal-vencidos')">✕</button>

window.resolverVencido=async function(transacaoId,acao){
  if(resolvendoVencido)return;
  const j=jurosVencidos.find(x=>x.id===transacaoId);
  if(!j)return;
  const d=j.divida;
  resolvendoVencido=true;

  const itemEl=document.getElementById('venc-'+transacaoId);
  if(itemEl)itemEl.style.opacity='0.5';

  try{
    if(acao==='paguei'){
      // marca a cobrança como realizada — saldo NÃO muda
      const{error}=await supabase.from('transacoes').update({status:'realizada'}).eq('id',transacaoId);
      if(error)throw error;
      await darXP(5,'juros_pago','Juros mensal pago: '+d.credor);
      toast(`✓ Juros de ${d.credor} marcado como pago`);
    }else{
      // NÃO pagou → bola de neve: o juros incorpora ao saldo
      const novoSaldo=Math.round((Number(d.valor_atual)+Number(j.valor))*100)/100;
      // 1) marca a cobrança vencida como realizada (ela foi "resolvida", virou saldo)
      const{error:e1}=await supabase.from('transacoes').update({status:'realizada',descricao:`Juros ${d.credor} NÃO PAGO → virou saldo ${MARCA_JUROS}`}).eq('id',transacaoId);
      if(e1)throw e1;
      // 2) aumenta o saldo da dívida
      const novoMin=novoSaldo*Number(d.juros_mensal)/100;
      const{error:e2}=await supabase.from('dividas').update({valor_atual:novoSaldo,valor_minimo_mensal:novoMin,atualizado_em:new Date().toISOString()}).eq('id',d.id);
      if(e2)throw e2;
      // 3) atualiza local e regenera os juros futuros sobre o saldo NOVO (maior)
      d.valor_atual=novoSaldo;
      await regenerarJuros({...d,status:'ativa'});
      ultimoItemNovoId=d.id;
      toast(`🔴 ${d.credor} • juros virou saldo • agora R$ ${fm(novoSaldo)}`);
    }

    // remove da lista local e recarrega
    jurosVencidos=jurosVencidos.filter(x=>x.id!==transacaoId);
    const aindaTem=jurosVencidos.length>0;
    fecharModal('modal-vencidos');
    await carregar();
    // reabre se ainda houver vencidos (fluxo de resolver vários)
    if(aindaTem)setTimeout(()=>abrirVencidos(),400);
  }catch(e){
    alert('Erro ao resolver: '+e.message);
    if(itemEl)itemEl.style.opacity='1';
  }finally{
    resolvendoVencido=false;
  }
};

window.salvar=async function(editandoId){
  if(salvando)return;
  const cred=document.getElementById('d-cred').value.trim();
  const tipo=document.getElementById('d-tipo').value;
  const desc=document.getElementById('d-desc').value.trim();
  const val=valorParaNum(document.getElementById('d-val').value);
  const eJuros=jurosLigado;

  let venc, juros, diaCob=null;
  if(eJuros){
    juros=parseFloat(document.getElementById('d-juros').value)||null;
    diaCob=parseInt(document.getElementById('d-dia').value)||10;
    if(diaCob<1)diaCob=1; if(diaCob>31)diaCob=31;
    const hoje=new Date();hoje.setHours(12,0,0,0);
    let dv=new Date(hoje.getFullYear(),hoje.getMonth(),Math.min(28,diaCob),12,0,0);
    if(dv<hoje)dv.setMonth(dv.getMonth()+1);
    venc=dv.toISOString().split('T')[0];
  }else{
    venc=document.getElementById('d-venc').value;
    juros=parseFloat(document.getElementById('d-juros-normal')?.value)||null;
  }

  if(!cred){alert('Digite o credor');return}
  if(!val||val<=0){alert('Informe o valor');return}
  if(eJuros&&(!juros||juros<=0)){alert('🦔 Pra dívida de juros, informe a taxa % ao mês (ex: 5)');return}

  salvando=true;
  const btn=document.getElementById('btn-salvar');
  if(btn){btn.disabled=true;btn.textContent='Salvando...'}

  try{
    const jm=eJuros?(val*juros/100):null;
    const dados={
      credor:cred,tipo,descricao:desc||`Dívida ${cred}`,
      valor_atual:val,data_vencimento:venc,juros_mensal:juros,
      juros_rola:eJuros,
      dia_cobranca_juros:eJuros?diaCob:null,
      valor_minimo_mensal:eJuros?jm:null
    };

    if(editandoId){
      const{error}=await supabase.from('dividas').update(dados).eq('id',editandoId);
      if(error)throw error;
      const dAtualizada={...dividas.find(x=>x.id===editandoId),...dados,id:editandoId,status:'ativa'};
      await regenerarJuros(dAtualizada);
      ultimoItemNovoId=editandoId;
      toast(`✏️ ${cred} atualizada!`);
    }else{
      const prioridade=eJuros?1:(venc<new Date().toISOString().split('T')[0]?1:2);
      const{data,error}=await supabase.from('dividas').insert({...dados,user_id:usuario.id,valor_original:val,data_inicio:new Date().toISOString().split('T')[0],status:'ativa',prioridade}).select().single();
      if(error)throw error;
      ultimoItemNovoId=data.id;
      filtroAtual=tipo==='cartao'?'faturas':'real';
      if(eJuros){
        const{error:errJuros}=await gerarJurosFuturos(data);
        if(errJuros){
          alert('🦔 A dívida foi salva, mas os juros mensais NÃO entraram nas transações.\n\nErro: '+errJuros.message+'\n\nManda esse erro pro Claude.');
        }
      }
      await darXP(15,'divida_add','Dívida adicionada');
      if(eJuros){
        toast(`🔴 ${cred} • R$ ${fm(jm)}/mês de juros lançados`);
      }else{
        toast(`✅ ${cred} • R$ ${fm(val)}`);
      }
    }

    fecharModal('modal-add');
    await carregar();
  }catch(e){
    alert('Erro: '+e.message);
  }finally{
    salvando=false;
    if(btn){btn.disabled=false}
  }
};

window.confirmarPagar=async function(id,atual){
  if(pagandoParcial)return;
  const d=dividas.find(x=>x.id===id);
  if(!d)return;
  const eJuros=ehJuros(d);
  const pago=valorParaNum(document.getElementById('p-val').value);
  const contaId=document.getElementById('p-conta')?document.getElementById('p-conta').value:'';
  const dataPag=document.getElementById('p-data').value||new Date().toISOString().split('T')[0];

  if(!pago||pago<=0){alert('Informe o valor');return}
  if(pago>atual+0.01){
    if(!confirm(`Você pagou R$ ${fm(pago)}, mais que o saldo de R$ ${fm(atual)}. Quer quitar a dívida mesmo assim?`))return;
  }

  pagandoParcial=true;
  const btn=document.getElementById('btn-pagar');
  if(btn){btn.disabled=true;btn.textContent='Salvando...'}

  const novoSaldo=Math.max(0,atual-pago);
  const vaiQuitar=novoSaldo<=0.009;

  try{
    await supabase.from('transacoes').insert({
      user_id:usuario.id,
      valor:pago,
      descricao:`Abateu saldo ${d.credor}${vaiQuitar?' (quitação)':''}`,
      tipo:'saida',
      categoria:'outro',
      data:dataPag,
      conta_id:contaId||null,
      divida_id:id,
      status:'realizada'
    });

    const update=vaiQuitar
      ? {valor_atual:0,status:'paga',atualizado_em:new Date().toISOString()}
      : {valor_atual:novoSaldo,atualizado_em:new Date().toISOString()};
    if(eJuros&&!vaiQuitar)update.valor_minimo_mensal=novoSaldo*Number(d.juros_mensal)/100;
    const{error}=await supabase.from('dividas').update(update).eq('id',id);
    if(error)throw error;

    if(eJuros){
      await regenerarJuros({...d,valor_atual:novoSaldo,status:vaiQuitar?'paga':'ativa'});
    }

    ultimoItemNovoId=id;

    if(vaiQuitar){
      await darXP(50,'divida_quitada','Dívida quitada (pagamento)');
      toast(`🎉 ${d.credor} • QUITADA!`);
      filtroAtual='pagas';
    }else{
      await darXP(20,'divida_pagamento_parcial','Pagamento parcial');
      toast(`💪 ${d.credor} • abateu R$ ${fm(pago)} • falta R$ ${fm(novoSaldo)}${eJuros?` • juros caiu pra R$ ${fm(novoSaldo*Number(d.juros_mensal)/100)}/mês`:''}`);
    }

    fecharModal('modal-pagar');
    await carregar();
  }catch(e){
    alert('Erro ao registrar pagamento: '+e.message);
  }finally{
    pagandoParcial=false;
    if(btn){btn.disabled=false;btn.textContent='Confirmar'}
  }
};

window.processarFoto=async function(e){

  `;
  document.getElementById('modal-negociador').classList.add('show');

  let base64;
  try{base64=await comprimirImg(file,1600,0.85)}
  catch(err){alert('Erro processando foto');fecharModal('modal-negociador');return}

  try{
    const r=await fetch(IA_URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},body:JSON.stringify({tipo:'analisar_contrato',imagem_base64:base64,max_tokens:1500})});
    const d=await r.json();

        _daIA:true
      };
      toast('✨ IA leu o contrato! Confere os dados');
      setTimeout(()=>abrirAdd(dados),500);
    }else{
      alert('🦔 '+(d.resultado?.erro||'IA não conseguiu ler.')+'\n\nTenta manual.');
      abrirAdd();
    }
  }catch(err){
    fecharModal('modal-negociador');
    alert('Erro: '+err.message);
  }
};

    ${vencidosDessa.length>0?`
      <div class="acao-btn" onclick="abrirVencidos('${id}')">
        <div class="acao-icon warning">⚠️</div>
        <div><div class="acao-info-titulo">Resolver ${vencidosDessa.length} juros vencido${vencidosDessa.length===1?'':'s'}</div><div class="acao-info-sub">Pagou ou não? (pode virar saldo)</div></div>
      </div>
    `:''}

    ${!ePaga?`
      <div class="acao-btn" onclick="abrirPagar('${id}')">
        <div class="acao-icon brand">💰</div>
        <div><div class="acao-info-titulo">${eJuros?'Abater o saldo':'Pagar um valor'}</div><div class="acao-info-sub">${eJuros?'Diminui o saldo de verdade (o juros do mês paga nas transações)':'Abate total ou parcial do saldo'}</div></div>
      </div>
      <div class="acao-btn" onclick="abrirNegociador('${id}')">
        <div class="acao-icon ia">🦔</div>
        <div><div class="acao-info-titulo">Negociar com Tatu IA</div><div class="acao-info-sub">Script pra ligar pro credor</div></div>
      </div>
      <div class="acao-btn" onclick="document.getElementById('input-negoc').click(); dividaIdNegoc='${id}'; fecharModal('modal-acoes');">
        <div class="acao-icon ia">📸</div>
        <div><div class="acao-info-titulo">Foto do print de negociação</div><div class="acao-info-sub">IA analisa as ofertas</div></div>
      </div>
      <div class="acao-btn" onclick="marcarPaga('${id}')">
        <div class="acao-icon brand">✓</div>
        <div><div class="acao-info-titulo">Marcar como paga (quitar tudo)</div><div class="acao-info-sub">${ehFatura(d)?'Fatura quitada':'Quitada de uma vez'}</div></div>
      </div>
    `:`
      <div class="acao-btn" onclick="desmarcarPaga('${id}')">
        <div class="acao-icon">↩️</div>
        <div><div class="acao-info-titulo">Desfazer pagamento</div><div class="acao-info-sub">Voltar pra ativa</div></div>
      </div>
    `}

    <div class="acao-btn" onclick="editar('${id}')">
      <div class="acao-icon">✏️</div>
      <div><div class="acao-info-titulo">Editar</div><div class="acao-info-sub">Alterar dados</div></div>
    </div>
    <div class="acao-btn" onclick="excluir('${id}')">
      <div class="acao-icon danger">🗑️</div>
      <div><div class="acao-info-titulo" style="color:var(--danger);">Excluir</div><div class="acao-info-sub">${eJuros?'Remove a dívida e os juros futuros':'Remove a dívida'}</div></div>
    </div>

    <button class="btn btn-secondary" onclick="fecharModal('modal-acoes')" style="width:100%;margin-top:14px;">Cancelar</button>
  `;
  document.getElementById('modal-acoes').classList.add('show');
};

window.marcarPaga=async function(id){
  const d=dividas.find(x=>x.id===id);
  if(!d)return;
  if(!confirm(`Marcar "${d.credor}" como paga? Vou somar +50 XP!`))return;
  try{
    const{error}=await supabase.from('dividas').update({status:'paga',valor_atual:0,atualizado_em:new Date().toISOString()}).eq('id',id);
    if(error)throw error;
    if(ehJuros(d))await apagarJurosFuturos(id);
    ultimoItemNovoId=id;
    await darXP(50,'divida_paga','Dívida quitada!');
    toast(`🎉 ${d.credor} • QUITADA!`);
    fecharModal('modal-acoes');
    filtroAtual='pagas';
    await carregar();
  }catch(e){alert('Erro ao marcar paga: '+e.message)}
};

window.desmarcarPaga=async function(id){
  const d=dividas.find(x=>x.id===id);
  if(!d)return;
  try{
    const restaura=Number(d.valor_atual)<=0.009?Number(d.valor_original||0):Number(d.valor_atual);
    const{error}=await supabase.from('dividas').update({status:'ativa',valor_atual:restaura,atualizado_em:new Date().toISOString()}).eq('id',id);
    if(error)throw error;
    if(ehJuros(d))await regenerarJuros({...d,valor_atual:restaura,status:'ativa'});
    ultimoItemNovoId=id;
    toast(`↩️ ${d.credor} • voltou pra ativa`);
    fecharModal('modal-acoes');
    filtroAtual=ehFatura(d)?'faturas':'real';
    await carregar();
  }catch(e){alert('Erro: '+e.message)}
};

window.editar=function(id){
  const d=dividas.find(x=>x.id===id);
  if(!d)return;
  fecharModal('modal-acoes');
  setTimeout(()=>abrirAdd({...d,_editando:id}),300);
};

window.excluir=async function(id){
  const d=dividas.find(x=>x.id===id);
  if(!d)return;
  if(!confirm(`Excluir dívida "${d.credor}"?${ehJuros(d)?' Os juros futuros previstos também serão removidos.':''}`))return;
  try{
    if(ehJuros(d))await apagarJurosFuturos(id);
    const{error}=await supabase.from('dividas').delete().eq('id',id);
    if(error)throw error;
    toast(`🗑️ ${d.credor} excluída`);
    fecharModal('modal-acoes');
    await carregar();
  }catch(e){alert('Erro: '+e.message)}
};

window.abrirNegociador=async function(id){
  fecharModal('modal-acoes');
  const d=dividas.find(x=>x.id===id);
  if(!d)return;

  document.getElementById('negociador-content').innerHTML=`
    <div class="ia-spinner"></div>
    <div class="ia-titulo">🦔 Tatu preparando...</div>
    <div class="ia-sub">Gerando script de negociação personalizado</div>
  `;
  document.getElementById('modal-negociador').classList.add('show');

  try{
    const r=await fetch(IA_URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},body:JSON.stringify({tipo:'negociar_divida',divida:{credor:d.credor,tipo:d.tipo,valor_atual:d.valor_atual,juros_mensal:d.juros_mensal,atrasada:d.data_vencimento<new Date().toISOString().split('T')[0]},max_tokens:1500})});
    const data=await r.json();

    const script=(data.resultado||'Não consegui gerar agora. Tenta de novo!').toString();

    document.getElementById('negociador-content').innerHTML=`
      <div class="modal-titulo">
        <span>🦔 Negociador Tatu</span>
        <button class="modal-close" onclick="fecharModal('modal-negociador')">✕</button>
      </div>
      <div class="neg-tatu">
        <div style="font-size:28px;">🦔</div>
        <div style="flex:1;">
          <div style="font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--ia);margin-bottom:4px;">Script personalizado</div>
          <div style="font-size:12px;color:var(--text-mute);line-height:1.5;">Pra negociar com <strong>${d.credor}</strong> (R$ ${fm(d.valor_atual)})</div>
        </div>
      </div>
      <div class="neg-content">${formatarScriptMarkdown(script)}</div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-secondary" onclick="fecharModal('modal-negociador')" style="flex:1;">Fechar</button>
        <button class="btn btn-primary" onclick="copiar()" style="flex:1;">📋 Copiar</button>
      </div>
    `;
    window._scriptNeg=script;
  }catch(e){
    document.getElementById('negociador-content').innerHTML=`
      <div class="modal-titulo">
        <span>🦔 Tatu</span>
        <button class="modal-close" onclick="fecharModal('modal-negociador')">✕</button>
      </div>
      <div style="text-align:center;padding:20px;">
        <div style="font-size:48px;margin-bottom:10px;">😔</div>
        <div>Não consegui agora. Tenta de novo em alguns segundos.</div>
      </div>
    `;
  }
};

window.copiar=function(){
  try{
    const tx=document.createElement('textarea');
    tx.value=window._scriptNeg||'';
    document.body.appendChild(tx);
    tx.select();
    document.execCommand('copy');
    document.body.removeChild(tx);
    toast('📋 Copiado!');
  }catch(e){alert('Erro copiando')}
};

function formatarScriptMarkdown(t){
  return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/^(\d+)\. /gm,'<strong>$1.</strong> ');
}

window.processarNegoc=async function(e){
  const file=e.target.files[0];
  if(!file)return;
  e.target.value='';

  document.getElementById('negociador-content').innerHTML=`
    <div class="ia-spinner"></div>
    <div class="ia-titulo">📸 Analisando ofertas...</div>
    <div class="ia-sub">IA Claude lendo o print de negociação</div>
  `;
  document.getElementById('modal-negociador').classList.add('show');

  let base64;
  try{base64=await comprimirImg(file,1600,0.85)}
  catch(err){alert('Erro');fecharModal('modal-negociador');return}

  try{
    const r=await fetch(IA_URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},body:JSON.stringify({tipo:'analisar_negociacao',imagem_base64:base64,max_tokens:1500})});
    const d=await r.json();

    if(d.resultado&&!d.resultado.erro){
      const res=d.resultado;
      const ofertasHTML=res.ofertas_negociacao&&res.ofertas_negociacao.length>0?res.ofertas_negociacao.map((o,i)=>`<div style="background:var(--bg-elev);border-radius:10px;padding:10px;margin-bottom:8px;font-size:13px;"><strong>Opção ${i+1}:</strong> ${o}</div>`).join(''):'<div style="color:var(--text-mute);font-size:13px;">Nenhuma oferta detectada</div>';

      document.getElementById('negociador-content').innerHTML=`
        <div class="modal-titulo">
          <span>📸 Análise IA</span>
          <button class="modal-close" onclick="fecharModal('modal-negociador')">✕</button>
        </div>
        <div class="neg-tatu">
          <div style="font-size:28px;">🦔</div>
          <div style="flex:1;">
            <div style="font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--ia);margin-bottom:4px;">Tatu analisou</div>
            <div style="font-size:12px;color:var(--text-mute);">Credor: <strong>${res.credor||'N/A'}</strong> • R$ ${fm(res.valor_total||0)}</div>
          </div>
        </div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--text-mute);font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">📋 Ofertas detectadas</div>
        ${ofertasHTML}
        ${res.recomendacao?`<div style="background:var(--brand-soft);border:1px solid var(--brand);border-radius:12px;padding:14px;margin-top:14px;"><div style="font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--brand);font-weight:700;margin-bottom:6px;">🎯 Recomendação Tatu</div><div style="font-size:13px;line-height:1.5;">${res.recomendacao}</div></div>`:''}
        <button class="btn btn-primary" onclick="fecharModal('modal-negociador')" style="margin-top:16px;">Entendi</button>
      `;
      await darXP(20,'analise_negociacao','Análise IA negociação');
    }else{
      alert('🦔 '+(d.resultado?.erro||'IA não conseguiu ler.'));
      fecharModal('modal-negociador');
    }
  }catch(err){
    alert('Erro: '+err.message);
    fecharModal('modal-negociador');
  }
};

async function comprimirImg(file,maxW=1600,q=0.85){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxW){h=Math.round((h*maxW)/w);w=maxW}
        const c=document.createElement('canvas');
        c.width=w;c.height=h;
        const ctx=c.getContext('2d');
        ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
        ctx.drawImage(img,0,0,w,h);
        let b64=c.toDataURL('image/jpeg',q);
        const kb=Math.round((b64.length*0.75)/1024);
        if(kb>4000&&q>0.5)b64=c.toDataURL('image/jpeg',0.7);
        res(b64);
      };
      img.onerror=()=>rej(new Error('Erro'));
      img.src=e.target.result;
    };
    r.onerror=()=>rej(new Error('Erro'));
    r.readAsDataURL(file);
  });
}

window.fecharModal=function(id){document.getElementById(id).classList.remove('show')};

window.formatarValor=function(input){
  let v=input.value.replace(/\D/g,'');
  if(!v){input.value='';return}
  v=(parseInt(v)/100).toFixed(2);
  input.value=Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2});
};

function valorParaNum(s){
  if(!s)return 0;
  return Number(s.replace(/\./g,'').replace(',','.'))||0;
}

function fm(v){return(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}

async function darXP(xp,acao,desc){
  try{
    await supabase.from('historico_xp').insert({user_id:usuario.id,acao,xp_ganho:xp,descricao:desc});
    const{data:g}=await supabase.from('gamificacao').select('xp_total').eq('user_id',usuario.id).maybeSingle();
    await supabase.from('gamificacao').update({xp_total:(g?.xp_total||0)+xp,ultima_atividade:new Date().toISOString().split('T')[0]}).eq('user_id',usuario.id);
  }catch(e){console.error(e)}
}

function toast(t){
  const e=document.getElementById('xp-toast');
  e.textContent=t;
  e.style.display='block';
  setTimeout(()=>{e.style.display='none'},3500);
}
</script>
