<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>dívidas • guardaí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
  
  :root {
    --bg: #0a0a0a;
    --bg-card: #141414;
    --bg-elev: #1c1c1c;
    --bg-input: #181818;
    --border: #252525;
    --border-strong: #353535;
    --brand: #00d97e;
    --brand-hover: #00ba6b;
    --brand-soft: rgba(0, 217, 126, 0.1);
    --danger: #ff4757;
    --danger-soft: rgba(255, 71, 87, 0.1);
    --warning: #ffb800;
    --warning-soft: rgba(255, 184, 0, 0.1);
    --text: #ffffff;
    --text-mute: #a3a3a3;
    --text-faint: #525252;
  }
  
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  body { padding-bottom: 100px; }
  
  /* ===== HEADER ===== */
  .header {
    padding: 16px 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .back-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
  }
  
  .header-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    flex: 1;
  }
  
  .header-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  
  .brand-mark-mini {
    width: 28px;
    height: 28px;
    background: var(--brand);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .brand-mark-mini::before {
    content: '';
    width: 10px;
    height: 10px;
    border: 2px solid var(--bg);
    border-radius: 3px;
    border-top: none;
    border-right: none;
  }
  
  /* ===== CONTAINER ===== */
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px;
  }
  
  /* ===== TOTAL CARD ===== */
  .total-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  
  .total-card::before {
    content: '';
    position: absolute;
    top: -40%;
    right: -10%;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, var(--danger-soft) 0%, transparent 70%);
    pointer-events: none;
  }
  
  .total-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
  }
  
  .total-label::before {
    content: '';
    width: 8px;
    height: 8px;
    background: var(--danger);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  
  .total-valor {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--danger);
    letter-spacing: -0.03em;
    margin-bottom: 6px;
    position: relative;
  }
  
  .total-valor span {
    font-size: 18px;
    color: var(--text-mute);
    font-weight: 500;
  }
  
  .total-meta {
    color: var(--text-mute);
    font-size: 13px;
    position: relative;
  }
  
  /* ===== TABS ===== */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 16px;
  }
  
  .tab {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    background: transparent;
    border: none;
    color: var(--text-mute);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .tab.active {
    background: var(--bg-elev);
    color: var(--text);
  }
  
  /* ===== DIVIDA CARD ===== */
  .divida {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  
  .divida:active { transform: scale(0.99); }
  
  .divida-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
    gap: 12px;
  }
  
  .divida-info {
    flex: 1;
    min-width: 0;
  }
  
  .divida-tipo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .divida-credor {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .divida-valor {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--danger);
    letter-spacing: -0.01em;
    white-space: nowrap;
    text-align: right;
  }
  
  .divida-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  
  .divida-vencimento {
    font-size: 12px;
    color: var(--text-mute);
  }
  
  .divida-status {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  .status-em_aberto {
    background: var(--danger-soft);
    color: var(--danger);
  }
  
  .status-negociando {
    background: var(--warning-soft);
    color: var(--warning);
  }
  
  .status-acordo_fechado {
    background: var(--brand-soft);
    color: var(--brand);
  }
  
  .status-quitada {
    background: var(--bg-elev);
    color: var(--text-mute);
  }
  
  .divida-atraso {
    color: var(--danger);
    font-weight: 600;
  }
  
  /* ===== EMPTY ===== */
  .empty {
    background: var(--bg-card);
    border: 1px dashed var(--border-strong);
    border-radius: 16px;
    padding: 36px 20px;
    text-align: center;
  }
  
  .empty-emoji { font-size: 44px; margin-bottom: 10px; }
  
  .empty-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  
  .empty-desc {
    font-size: 13px;
    color: var(--text-mute);
    line-height: 1.5;
    max-width: 280px;
    margin: 0 auto;
  }
  
  /* ===== FAB ===== */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 50%;
    transform: translateX(50%);
    z-index: 90;
    width: calc(100% - 40px);
    max-width: 440px;
    background: var(--brand);
    color: #001a0e;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(0, 217, 126, 0.3);
  }
  
  .fab:active {
    transform: translateX(50%) scale(0.97);
    background: var(--brand-hover);
  }
  
  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 100;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(4px);
  }
  
  .modal-overlay.show { display: flex; }
  
  .modal {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
  }
  
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  
  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border-strong);
    border-radius: 100px;
    margin: 12px auto;
  }
  
  .modal-header {
    padding: 8px 24px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .modal-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  
  .modal-close {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
  }
  
  .modal-body {
    padding: 0 24px 24px;
  }
  
  .field {
    margin-bottom: 14px;
  }
  
  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-mute);
    margin-bottom: 6px;
    font-weight: 500;
  }
  
  .field label .opt {
    color: var(--text-faint);
    font-weight: 400;
  }
  
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    color: var(--text);
    font-size: 16px;
    font-family: 'Inter', sans-serif;
    transition: border 0.2s;
  }
  
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--brand);
  }
  
  .field input::placeholder, .field textarea::placeholder {
    color: var(--text-faint);
  }
  
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  
  .valor-input-wrapper {
    display: flex;
    align-items: center;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0 14px;
    transition: border 0.2s;
  }
  
  .valor-input-wrapper:focus-within {
    border-color: var(--brand);
  }
  
  .valor-prefix {
    color: var(--text-mute);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 500;
  }
  
  .valor-input-wrapper input {
    background: transparent;
    border: none;
    flex: 1;
    text-align: right;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    padding: 14px 0;
  }
  
  .valor-input-wrapper input:focus { border: none; }
  
  /* TIPO GRID */
  .tipo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 4px;
  }
  
  .tipo-opt {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 6px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  
  .tipo-opt.selected {
    background: var(--brand-soft);
    border-color: var(--brand);
  }
  
  .tipo-opt-icon {
    font-size: 22px;
    margin-bottom: 4px;
  }
  
  .tipo-opt-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-mute);
    line-height: 1.2;
  }
  
  .tipo-opt.selected .tipo-opt-label {
    color: var(--text);
  }
  
  /* BTN */
  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    margin-top: 8px;
  }
  
  .btn-primary { background: var(--brand); color: #001a0e; }
  .btn-primary:active { background: var(--brand-hover); transform: scale(0.985); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  
  .btn-secondary {
    background: var(--bg-elev);
    color: var(--text);
    border: 1px solid var(--border);
  }
  
  .btn-danger {
    background: var(--danger-soft);
    color: var(--danger);
    border: 1px solid rgba(255, 71, 87, 0.3);
  }
  
  .btn-success {
    background: var(--brand-soft);
    color: var(--brand);
    border: 1px solid rgba(0, 217, 126, 0.3);
  }
  
  /* DETALHES */
  .detalhe-grid {
    background: var(--bg-input);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  
  .detalhe-linha {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  
  .detalhe-linha:last-child { border-bottom: none; }
  
  .detalhe-label {
    font-size: 13px;
    color: var(--text-mute);
  }
  
  .detalhe-valor {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    text-align: right;
  }
  
  /* MSG */
  .msg {
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
    font-weight: 500;
  }
  
  .msg.show { display: block; }
  
  .msg-error {
    background: var(--danger-soft);
    border: 1px solid rgba(255, 71, 87, 0.3);
    color: #ff6b78;
  }
  
  .msg-success {
    background: var(--brand-soft);
    border: 1px solid rgba(0, 217, 126, 0.3);
    color: var(--brand);
  }
  
  /* XP TOAST */
  .xp-toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--brand);
    color: #001a0e;
    padding: 12px 20px;
    border-radius: 100px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    z-index: 200;
    box-shadow: 0 8px 32px rgba(0, 217, 126, 0.4);
    display: none;
    animation: toastIn 0.4s cubic-bezier(0.34, 1.5, 0.64, 1);
  }
  
  @keyframes toastIn {
    0% { transform: translateX(-50%) translateY(-20px); opacity: 0; }
    100% { transform: translateX(-50%) translateY(0); opacity: 1; }
  }
  
  /* LOADER */
  .loader-circle {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-radius: 50%;
    border-top-color: var(--brand);
    animation: spin 0.8s linear infinite;
    margin: 40px auto;
  }
  
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="window.location.href='home.html?v=1'">‹</button>
  <div class="header-title">Dívidas</div>
  <div class="header-brand" onclick="window.location.href='home.html?v=1'">
    <div class="brand-mark-mini"></div>
  </div>
</div>

<div class="container">

  <!-- TOTAL -->
  <div class="total-card">
    <div class="total-label">Total devendo</div>
    <div class="total-valor">R$ <span id="total-valor">0,00</span></div>
    <div class="total-meta"><span id="total-qtd">0</span> dívidas em aberto</div>
  </div>
  
  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-filtro="abertas" onclick="trocarFiltro('abertas')">Em aberto</button>
    <button class="tab" data-filtro="negociando" onclick="trocarFiltro('negociando')">Negociando</button>
    <button class="tab" data-filtro="quitadas" onclick="trocarFiltro('quitadas')">Quitadas</button>
  </div>
  
  <!-- LISTA -->
  <div id="lista-dividas">
    <div class="loader-circle"></div>
  </div>

</div>

<!-- FAB -->
<button class="fab" onclick="abrirModalNova()">+ Cadastrar dívida</button>

<!-- MODAL NOVA / EDITAR -->
<div class="modal-overlay" id="modal-form">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-form-titulo">Nova dívida</div>
      <button class="modal-close" onclick="fecharModal('modal-form')">✕</button>
    </div>
    <div class="modal-body">
      <div class="msg" id="msg-form"></div>
      
      <div class="field">
        <label>Tipo de dívida</label>
        <div class="tipo-grid" id="tipo-grid">
          <div class="tipo-opt" data-tipo="cartao"><div class="tipo-opt-icon">💳</div><div class="tipo-opt-label">Cartão</div></div>
          <div class="tipo-opt" data-tipo="emprestimo"><div class="tipo-opt-icon">🏦</div><div class="tipo-opt-label">Empréstimo</div></div>
          <div class="tipo-opt" data-tipo="financiamento"><div class="tipo-opt-icon">🏠</div><div class="tipo-opt-label">Financ.</div></div>
          <div class="tipo-opt" data-tipo="conta_atrasada"><div class="tipo-opt-icon">📋</div><div class="tipo-opt-label">Conta</div></div>
          <div class="tipo-opt" data-tipo="pensao_alimenticia"><div class="tipo-opt-icon">👨‍👧</div><div class="tipo-opt-label">Pensão</div></div>
          <div class="tipo-opt" data-tipo="imposto"><div class="tipo-opt-icon">📑</div><div class="tipo-opt-label">Imposto</div></div>
          <div class="tipo-opt" data-tipo="boleto"><div class="tipo-opt-icon">🧾</div><div class="tipo-opt-label">Boleto</div></div>
          <div class="tipo-opt" data-tipo="cheque_especial"><div class="tipo-opt-icon">💸</div><div class="tipo-opt-label">Ch. Esp.</div></div>
          <div class="tipo-opt" data-tipo="outro"><div class="tipo-opt-icon">❓</div><div class="tipo-opt-label">Outro</div></div>
        </div>
      </div>
      
      <div class="field">
        <label>Quem você deve? <span class="opt">(credor)</span></label>
        <input type="text" id="f-credor" placeholder="Ex: Banco Bradesco, Itaú Cartão...">
      </div>
      
      <div class="field">
        <label>Valor atual da dívida</label>
        <div class="valor-input-wrapper">
          <span class="valor-prefix">R$</span>
          <input type="text" inputmode="decimal" id="f-valor" placeholder="0,00" oninput="formatarValor(this)">
        </div>
      </div>
      
      <div class="field-row">
        <div class="field">
          <label>Vencimento <span class="opt">(opcional)</span></label>
          <input type="date" id="f-vencimento">
        </div>
        <div class="field">
          <label>Juros ao mês % <span class="opt">(opcional)</span></label>
          <input type="text" inputmode="decimal" id="f-juros" placeholder="0,00">
        </div>
      </div>
      
      <div class="field">
        <label>Telefone do credor <span class="opt">(pra negociar depois)</span></label>
        <input type="tel" id="f-telefone" placeholder="(00) 00000-0000">
      </div>
      
      <div class="field">
        <label>Observações <span class="opt">(opcional)</span></label>
        <textarea id="f-obs" rows="2" placeholder="Detalhes que você lembrar..."></textarea>
      </div>
      
      <button class="btn btn-primary" id="btn-salvar" onclick="salvarDivida()">Cadastrar dívida</button>
    </div>
  </div>
</div>

<!-- MODAL DETALHE -->
<div class="modal-overlay" id="modal-detalhe">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="detalhe-titulo">Dívida</div>
      <button class="modal-close" onclick="fecharModal('modal-detalhe')">✕</button>
    </div>
    <div class="modal-body">
      
      <div class="total-card" style="margin-bottom: 16px;">
        <div class="total-label" id="detalhe-tipo-label">CARTÃO DE CRÉDITO</div>
        <div class="total-valor">R$ <span id="detalhe-valor">0,00</span></div>
        <div class="total-meta" id="detalhe-credor">—</div>
      </div>
      
      <div class="detalhe-grid">
        <div class="detalhe-linha">
          <div class="detalhe-label">Status</div>
          <div class="detalhe-valor"><span class="divida-status" id="detalhe-status">Em aberto</span></div>
        </div>
        <div class="detalhe-linha" id="linha-vencimento">
          <div class="detalhe-label">Vencimento</div>
          <div class="detalhe-valor" id="detalhe-vencimento">—</div>
        </div>
        <div class="detalhe-linha" id="linha-juros">
          <div class="detalhe-label">Juros mensal</div>
          <div class="detalhe-valor" id="detalhe-juros">—</div>
        </div>
        <div class="detalhe-linha" id="linha-telefone">
          <div class="detalhe-label">Contato</div>
          <div class="detalhe-valor" id="detalhe-telefone">—</div>
        </div>
        <div class="detalhe-linha" id="linha-obs" style="flex-direction:column;align-items:flex-start;gap:4px;">
          <div class="detalhe-label">Observações</div>
          <div class="detalhe-valor" id="detalhe-obs" style="text-align:left;font-weight:400;color:var(--text-mute);">—</div>
        </div>
      </div>
      
      <button class="btn btn-success" id="btn-quitar" onclick="marcarQuitada()">✓ Marcar como quitada</button>
      <button class="btn btn-secondary" onclick="editarDivida()">Editar dívida</button>
      <button class="btn btn-danger" onclick="excluirDivida()">Excluir</button>
      
    </div>
  </div>
</div>

<!-- XP TOAST -->
<div class="xp-toast" id="xp-toast">+50 XP 🎉</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  
  const SUPABASE_URL = 'https://gmbsxrxqrxpbgyyvifcd.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_NSOgcu93sTiSreGYi-Ha3g_bqYsAK22';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
  window.supabase = supabase;
  
  const tiposLabels = {
    cartao: 'Cartão de crédito',
    emprestimo: 'Empréstimo',
    financiamento: 'Financiamento',
    conta_atrasada: 'Conta atrasada',
    pensao_alimenticia: 'Pensão alimentícia',
    imposto: 'Imposto',
    boleto: 'Boleto',
    cheque_especial: 'Cheque especial',
    outro: 'Outro'
  };
  
  const tiposIcones = {
    cartao: '💳', emprestimo: '🏦', financiamento: '🏠',
    conta_atrasada: '📋', pensao_alimenticia: '👨‍👧',
    imposto: '📑', boleto: '🧾', cheque_especial: '💸', outro: '❓'
  };
  
  let usuario;
  let tipoSelecionado = null;
  let dividaEditando = null;
  let dividaDetalheAtual = null;
  let filtroAtual = 'abertas';
  let todasDividas = [];
  
  // INIT
  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = 'index.html?v=1';
      return;
    }
    usuario = session.user;
    await carregarDividas();
    setupTipoGrid();
  })();
  
  function setupTipoGrid() {
    document.querySelectorAll('.tipo-opt').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.tipo-opt').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        tipoSelecionado = opt.dataset.tipo;
        validarForm();
      });
    });
  }
  
  function formatarMoeda(v) {
    return (Number(v) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  
  function formatarData(d) {
    if (!d) return '—';
    return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR');
  }
  
  function diasAtraso(d) {
    if (!d) return null;
    const venc = new Date(d + 'T00:00:00');
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const diff = Math.floor((hoje - venc) / (1000 * 60 * 60 * 24));
    return diff;
  }
  
  window.formatarValor = function(input) {
    let v = input.value.replace(/\D/g, '');
    if (!v) { input.value = ''; validarForm(); return; }
    v = (parseInt(v) / 100).toFixed(2);
    input.value = Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
    validarForm();
  };
  
  function valorParaNumero(str) {
    if (!str) return 0;
    return Number(str.replace(/\./g, '').replace(',', '.')) || 0;
  }
  
  function validarForm() {
    const credor = document.getElementById('f-credor').value.trim();
    const valor = valorParaNumero(document.getElementById('f-valor').value);
    const btn = document.getElementById('btn-salvar');
    btn.disabled = !tipoSelecionado || !credor || valor <= 0;
  }
  
  document.getElementById('f-credor').addEventListener('input', validarForm);
  
  // CARREGAR
  async function carregarDividas() {
    const { data, error } = await supabase
      .from('dividas')
      .select('*')
      .eq('user_id', usuario.id)
      .order('criado_em', { ascending: false });
    
    if (error) {
      console.error(error);
      document.getElementById('lista-dividas').innerHTML = '<div class="empty"><div class="empty-emoji">⚠️</div><div class="empty-title">Erro ao carregar</div></div>';
      return;
    }
    
    todasDividas = data || [];
    renderizar();
  }
  
  function renderizar() {
    // Total devendo (em aberto + negociando + acordo)
    const emAberto = todasDividas.filter(d => d.status !== 'quitada');
    const total = emAberto.reduce((acc, d) => acc + Number(d.valor_atual), 0);
    document.getElementById('total-valor').textContent = formatarMoeda(total);
    document.getElementById('total-qtd').textContent = emAberto.length;
    
    // Filtro
    let filtradas;
    if (filtroAtual === 'abertas') {
      filtradas = todasDividas.filter(d => d.status === 'em_aberto' || d.status === 'atrasada' || d.status === 'acordo_fechado');
    } else if (filtroAtual === 'negociando') {
      filtradas = todasDividas.filter(d => d.status === 'negociando');
    } else {
      filtradas = todasDividas.filter(d => d.status === 'quitada');
    }
    
    const lista = document.getElementById('lista-dividas');
    
    if (filtradas.length === 0) {
      const msgs = {
        abertas: { e: '📋', t: 'Nada em aberto', d: 'Toque em + Cadastrar dívida pra começar a mapear tudo que você deve.' },
        negociando: { e: '🤝', t: 'Nenhuma em negociação', d: 'Quando você começar a negociar uma dívida, ela aparece aqui.' },
        quitadas: { e: '🎉', t: 'Nenhuma quitada ainda', d: 'Suas conquistas vão aparecer aqui. Bora começar!' }
      };
      const m = msgs[filtroAtual];
      lista.innerHTML = `<div class="empty"><div class="empty-emoji">${m.e}</div><div class="empty-title">${m.t}</div><div class="empty-desc">${m.d}</div></div>`;
      return;
    }
    
    lista.innerHTML = filtradas.map(d => {
      const atraso = diasAtraso(d.data_vencimento);
      const venc = d.data_vencimento ? formatarData(d.data_vencimento) : 'Sem vencimento';
      let vencTexto = venc;
      if (atraso !== null && atraso > 0 && d.status !== 'quitada') {
        vencTexto = `<span class="divida-atraso">Atrasada ${atraso} ${atraso === 1 ? 'dia' : 'dias'}</span>`;
      }
      
      const statusLabel = {
        em_aberto: 'Em aberto',
        atrasada: 'Atrasada',
        negociando: 'Negociando',
        acordo_fechado: 'Acordo',
        quitada: 'Quitada'
      }[d.status] || d.status;
      
      return `
        <div class="divida" onclick="abrirDetalhe('${d.id}')">
          <div class="divida-top">
            <div class="divida-info">
              <div class="divida-tipo">${tiposIcones[d.tipo] || '❓'} ${tiposLabels[d.tipo] || d.tipo}</div>
              <div class="divida-credor">${d.credor}</div>
            </div>
            <div class="divida-valor">R$ ${formatarMoeda(d.valor_atual)}</div>
          </div>
          <div class="divida-bottom">
            <div class="divida-vencimento">${vencTexto}</div>
            <div class="divida-status status-${d.status}">${statusLabel}</div>
          </div>
        </div>
      `;
    }).join('');
  }
  
  window.trocarFiltro = function(f) {
    filtroAtual = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.filtro === f));
    renderizar();
  };
  
  // MODAL
  window.abrirModalNova = function() {
    dividaEditando = null;
    tipoSelecionado = null;
    document.getElementById('modal-form-titulo').textContent = 'Nova dívida';
    document.getElementById('btn-salvar').textContent = 'Cadastrar dívida';
    document.getElementById('f-credor').value = '';
    document.getElementById('f-valor').value = '';
    document.getElementById('f-vencimento').value = '';
    document.getElementById('f-juros').value = '';
    document.getElementById('f-telefone').value = '';
    document.getElementById('f-obs').value = '';
    document.querySelectorAll('.tipo-opt').forEach(o => o.classList.remove('selected'));
    document.getElementById('msg-form').className = 'msg';
    validarForm();
    document.getElementById('modal-form').classList.add('show');
  };
  
  window.fecharModal = function(id) {
    document.getElementById(id).classList.remove('show');
  };
  
  // SALVAR
  window.salvarDivida = async function() {
    const credor = document.getElementById('f-credor').value.trim();
    const valor = valorParaNumero(document.getElementById('f-valor').value);
    const vencimento = document.getElementById('f-vencimento').value || null;
    const juros = valorParaNumero(document.getElementById('f-juros').value) || null;
    const telefone = document.getElementById('f-telefone').value.trim() || null;
    const obs = document.getElementById('f-obs').value.trim() || null;
    
    if (!tipoSelecionado || !credor || valor <= 0) return;
    
    const btn = document.getElementById('btn-salvar');
    btn.disabled = true;
    btn.textContent = 'Salvando...';
    
    let status = 'em_aberto';
    if (vencimento && diasAtraso(vencimento) > 0) status = 'atrasada';
    
    const payload = {
      user_id: usuario.id,
      tipo: tipoSelecionado,
      credor,
      valor_original: valor,
      valor_atual: valor,
      juros_mensal: juros,
      data_vencimento: vencimento,
      telefone_credor: telefone,
      observacoes: obs,
      status
    };
    
    let result;
    if (dividaEditando) {
      result = await supabase.from('dividas').update(payload).eq('id', dividaEditando);
    } else {
      result = await supabase.from('dividas').insert(payload);
    }
    
    if (result.error) {
      document.getElementById('msg-form').className = 'msg show msg-error';
      document.getElementById('msg-form').textContent = 'Erro: ' + result.error.message;
      btn.disabled = false;
      btn.textContent = dividaEditando ? 'Salvar alterações' : 'Cadastrar dívida';
      return;
    }
    
    // XP por cadastrar (não por editar)
    if (!dividaEditando) {
      await darXP(50, 'divida_cadastrada', 'Dívida cadastrada');
      mostrarToast('+50 XP 🎯');
    }
    
    fecharModal('modal-form');
    await carregarDividas();
  };
  
  // XP
  async function darXP(xp, acao, descricao) {
    await supabase.from('historico_xp').insert({
      user_id: usuario.id,
      acao,
      xp_ganho: xp,
      descricao
    });
    
    // Busca XP atual
    const { data: g } = await supabase.from('gamificacao').select('xp_total').eq('user_id', usuario.id).single();
    const novoXp = (g?.xp_total || 0) + xp;
    
    await supabase.from('gamificacao')
      .update({ 
        xp_total: novoXp,
        ultima_atividade: new Date().toISOString().split('T')[0]
      })
      .eq('user_id', usuario.id);
  }
  
  function mostrarToast(texto) {
    const t = document.getElementById('xp-toast');
    t.textContent = texto;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 2500);
  }
  
  // DETALHE
  window.abrirDetalhe = function(id) {
    const d = todasDividas.find(x => x.id === id);
    if (!d) return;
    
    dividaDetalheAtual = d;
    
    document.getElementById('detalhe-titulo').textContent = d.credor;
    document.getElementById('detalhe-tipo-label').textContent = (tiposIcones[d.tipo] || '❓') + ' ' + (tiposLabels[d.tipo] || d.tipo).toUpperCase();
    document.getElementById('detalhe-valor').textContent = formatarMoeda(d.valor_atual);
    document.getElementById('detalhe-credor').textContent = d.credor;
    
    const statusLabel = {
      em_aberto: 'Em aberto', atrasada: 'Atrasada', negociando: 'Negociando',
      acordo_fechado: 'Acordo fechado', quitada: 'Quitada'
    }[d.status] || d.status;
    const statusEl = document.getElementById('detalhe-status');
    statusEl.textContent = statusLabel;
    statusEl.className = 'divida-status status-' + d.status;
    
    document.getElementById('detalhe-vencimento').textContent = d.data_vencimento ? formatarData(d.data_vencimento) : '—';
    document.getElementById('detalhe-juros').textContent = d.juros_mensal ? d.juros_mensal + '% ao mês' : '—';
    document.getElementById('detalhe-telefone').textContent = d.telefone_credor || '—';
    document.getElementById('detalhe-obs').textContent = d.observacoes || '—';
    
    // Esconde botão quitar se já tá quitada
    document.getElementById('btn-quitar').style.display = d.status === 'quitada' ? 'none' : 'block';
    
    document.getElementById('modal-detalhe').classList.add('show');
  };
  
  window.marcarQuitada = async function() {
    if (!dividaDetalheAtual) return;
    if (!confirm(`Marcar a dívida de ${dividaDetalheAtual.credor} como quitada? 🎉`)) return;
    
    const { error } = await supabase.from('dividas')
      .update({ status: 'quitada', atualizado_em: new Date().toISOString() })
      .eq('id', dividaDetalheAtual.id);
    
    if (error) {
      alert('Erro: ' + error.message);
      return;
    }
    
    // Registra pagamento
    await supabase.from('pagamentos_divida').insert({
      divida_id: dividaDetalheAtual.id,
      user_id: usuario.id,
      data_pagamento: new Date().toISOString().split('T')[0],
      valor_pago: dividaDetalheAtual.valor_atual
    });
    
    // Atualiza estatística
    const { data: g } = await supabase.from('gamificacao').select('total_dividas_quitadas').eq('user_id', usuario.id).single();
    await supabase.from('gamificacao')
      .update({ total_dividas_quitadas: (g?.total_dividas_quitadas || 0) + 1 })
      .eq('user_id', usuario.id);
    
    await darXP(500, 'divida_quitada', `Quitou dívida: ${dividaDetalheAtual.credor}`);
    mostrarToast('🎉 +500 XP — Dívida quitada!');
    
    fecharModal('modal-detalhe');
    await carregarDividas();
  };
  
  window.editarDivida = function() {
    if (!dividaDetalheAtual) return;
    const d = dividaDetalheAtual;
    
    dividaEditando = d.id;
    tipoSelecionado = d.tipo;
    
    document.getElementById('modal-form-titulo').textContent = 'Editar dívida';
    document.getElementById('btn-salvar').textContent = 'Salvar alterações';
    document.getElementById('f-credor').value = d.credor;
    document.getElementById('f-valor').value = formatarMoeda(d.valor_atual);
    document.getElementById('f-vencimento').value = d.data_vencimento || '';
    document.getElementById('f-juros').value = d.juros_mensal || '';
    document.getElementById('f-telefone').value = d.telefone_credor || '';
    document.getElementById('f-obs').value = d.observacoes || '';
    
    document.querySelectorAll('.tipo-opt').forEach(o => {
      o.classList.toggle('selected', o.dataset.tipo === d.tipo);
    });
    
    validarForm();
    fecharModal('modal-detalhe');
    document.getElementById('modal-form').classList.add('show');
  };
  
  window.excluirDivida = async function() {
    if (!dividaDetalheAtual) return;
    if (!confirm(`Excluir a dívida de ${dividaDetalheAtual.credor}? Essa ação não pode ser desfeita.`)) return;
    
    const { error } = await supabase.from('dividas').delete().eq('id', dividaDetalheAtual.id);
    
    if (error) {
      alert('Erro: ' + error.message);
      return;
    }
    
    fecharModal('modal-detalhe');
    await carregarDividas();
  };
</script>

</body>
</html>
