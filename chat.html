<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>chat • guardaí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
  
  :root {
    --bg: #0a0a0a;
    --bg-card: #141414;
    --bg-elev: #1c1c1c;
    --bg-input: #181818;
    --border: #252525;
    --border-strong: #353535;
    --brand: #00d97e;
    --brand-hover: #00ba6b;
    --brand-soft: rgba(0, 217, 126, 0.1);
    --danger: #ff4757;
    --warning: #ffb800;
    --info: #38bdf8;
    --ia: #a855f7;
    --ia-hover: #9333ea;
    --ia-soft: rgba(168, 85, 247, 0.1);
    --text: #ffffff;
    --text-mute: #a3a3a3;
    --text-faint: #525252;
  }
  
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    height: 100vh;
    overflow: hidden;
  }
  
  input, textarea {
    color: #fff !important;
    -webkit-text-fill-color: #fff !important;
    caret-color: var(--brand);
  }
  input:-webkit-autofill, textarea:-webkit-autofill {
    -webkit-box-shadow: 0 0 0 1000px var(--bg-input) inset !important;
    -webkit-text-fill-color: #fff !important;
  }
  
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }
  
  .header {
    padding: 12px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  
  .back-btn {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 20px;
    flex-shrink: 0;
  }
  
  .header-avatar {
    width: 40px; height: 40px;
    background: var(--ia-soft);
    border: 1px solid rgba(168, 85, 247, 0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    position: relative;
  }
  
  .header-avatar::after {
    content: '';
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 10px; height: 10px;
    background: var(--brand);
    border: 2px solid var(--bg);
    border-radius: 50%;
  }
  
  .header-info { flex: 1; min-width: 0; }
  
  .header-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.1;
  }
  
  .header-sub {
    font-size: 11px;
    color: var(--brand);
    line-height: 1.3;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  
  .header-sub::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--brand);
    border-radius: 50%;
    display: inline-block;
  }
  
  .header-menu {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px;
  }
  
  .mensagens-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  
  .data-divisor {
    text-align: center;
    margin: 12px 0;
    font-size: 11px;
    color: var(--text-faint);
    font-family: 'Space Grotesk', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  
  .msg {
    max-width: 85%;
    padding: 12px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
    animation: msgIn 0.3s ease;
  }
  
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .msg.user {
    background: var(--brand);
    color: #001a0e;
    align-self: flex-end;
    border-bottom-right-radius: 6px;
    font-weight: 500;
  }
  
  .msg.assistant {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    align-self: flex-start;
    border-bottom-left-radius: 6px;
  }
  
  .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 {
    font-family: 'Space Grotesk', sans-serif;
    color: var(--ia);
    font-weight: 700;
    margin: 8px 0 4px;
  }
  
  .msg.assistant h1 { font-size: 15px; }
  .msg.assistant h2 { font-size: 14px; }
  .msg.assistant h3 { font-size: 13px; color: var(--text); }
  
  .msg.assistant p { margin-bottom: 6px; }
  .msg.assistant p:last-child { margin-bottom: 0; }
  
  .msg.assistant strong { color: var(--brand); font-weight: 600; }
  
  .msg.assistant ul, .msg.assistant ol {
    margin: 6px 0 6px 20px;
  }
  
  .msg.assistant li { margin-bottom: 2px; }
  
  .msg.assistant code {
    background: var(--bg-elev);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    font-family: monospace;
  }
  
  .msg-tempo {
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 4px;
  }
  
  .msg.user .msg-tempo { color: rgba(0,26,14,0.6); text-align: right; }
  
  .welcome {
    background: linear-gradient(135deg, var(--ia-soft) 0%, var(--bg-card) 100%);
    border: 1px solid rgba(168, 85, 247, 0.3);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 12px;
  }
  
  .welcome-tatu {
    font-size: 40px;
    text-align: center;
    margin-bottom: 8px;
  }
  
  .welcome-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 6px;
  }
  
  .welcome-sub {
    font-size: 12px;
    color: var(--text-mute);
    text-align: center;
    line-height: 1.5;
  }
  
  .sugestoes-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 10px 0 6px;
    text-align: center;
  }
  
  .sugestoes {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  
  .sugestao {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 44px;
  }
  
  .sugestao:active {
    transform: scale(0.98);
    border-color: var(--ia);
    background: var(--ia-soft);
  }
  
  .sugestao-emoji { font-size: 16px; flex-shrink: 0; }
  
  .typing {
    align-self: flex-start;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 6px;
    padding: 14px 16px;
    display: inline-flex;
    gap: 4px;
    animation: msgIn 0.3s ease;
  }
  
  .typing-dot {
    width: 7px; height: 7px;
    background: var(--ia);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite ease-in-out;
  }
  
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  
  @keyframes typingBounce {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-4px); }
  }
  
  .input-area {
    flex-shrink: 0;
    padding: 12px 16px 20px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  
  .input-wrapper {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 6px 6px 6px 16px;
  }
  
  .input-wrapper:focus-within { border-color: var(--ia); }
  
  .input-msg {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    padding: 10px 0;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
    outline: none;
  }
  
  .input-msg::placeholder { color: var(--text-faint); }
  
  .btn-enviar {
    width: 44px; height: 44px;
    background: var(--ia);
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  
  .btn-enviar:active { background: var(--ia-hover); transform: scale(0.92); }
  
  .btn-enviar:disabled {
    background: var(--bg-elev);
    color: var(--text-faint);
    cursor: not-allowed;
  }
  
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: none;
    backdrop-filter: blur(4px);
  }
  
  .drawer-overlay.show { display: block; }
  
  .drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 20px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    animation: slideUp 0.3s ease;
  }
  
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  
  .drawer-handle {
    width: 40px;
    height: 4px;
    background: var(--border-strong);
    border-radius: 100px;
    margin: 0 auto 16px;
  }
  
  .drawer-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 4px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    min-height: 56px;
  }
  
  .drawer-item:last-child { border-bottom: none; }
  .drawer-item:active { opacity: 0.6; }
  
  .drawer-item-emoji { font-size: 20px; }
  .drawer-item-label { font-size: 14px; font-weight: 500; }
  .drawer-item.danger { color: var(--danger); }
  
  .loader-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .loader-circle {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-radius: 50%;
    border-top-color: var(--ia);
    animation: spin 0.8s linear infinite;
  }
  
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <button class="back-btn" onclick="window.location.href='home.html?v=' + Date.now()">‹</button>
    <div class="header-avatar">🦔</div>
    <div class="header-info">
      <div class="header-titulo">Tatu</div>
      <div class="header-sub">Online · IA do GuardaAí</div>
    </div>
    <button class="header-menu" onclick="abrirDrawer()">⋯</button>
  </div>
  
  <div class="mensagens-area" id="mensagens">
    <div class="loader-area"><div class="loader-circle"></div></div>
  </div>
  
  <div class="input-area">
    <div class="input-wrapper">
      <textarea 
        class="input-msg" 
        id="input-msg" 
        placeholder="Pergunte algo ao Tatu..."
        rows="1"
        oninput="ajustarAltura(this); habilitarBotao()"
      ></textarea>
      <button class="btn-enviar" id="btn-enviar" onclick="enviarMensagem()" disabled>↑</button>
    </div>
  </div>

</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="fecharDrawer(event)">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <div class="drawer-item" onclick="limparHistorico()">
      <div class="drawer-item-emoji">🗑️</div>
      <div class="drawer-item-label">Limpar histórico</div>
    </div>
    <div class="drawer-item" onclick="window.location.href='home.html?v=' + Date.now()" style="cursor:pointer;">
      <div class="drawer-item-emoji">🏠</div>
      <div class="drawer-item-label">Voltar pra home</div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  
  const SUPABASE_URL = 'https://gmbsxrxqrxpbgyyvifcd.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_NSOgcu93sTiSreGYi-Ha3g_bqYsAK22';
  const IA_FUNCTION_URL = 'https://gmbsxrxqrxpbgyyvifcd.supabase.co/functions/v1/claude-chat';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
  
  const niveisInfo = {
    0: 'Início',
    1: 'Diagnóstico',
    2: 'Resgate',
    3: 'Estabilização',
    4: 'Construção',
    5: 'Liberdade'
  };
  
  let usuario, perfil;
  let mensagens = [];
  let enviando = false;
  
  const sugestoesPorNivel = {
    0: [
      { emoji: '🎯', texto: 'Por onde começar a organizar minha vida financeira?' },
      { emoji: '💰', texto: 'Quanto devo guardar do meu salário?' },
      { emoji: '🧠', texto: 'Quais erros financeiros eu devo evitar?' }
    ],
    1: [
      { emoji: '🎯', texto: 'Como começar minha jornada financeira?' },
      { emoji: '💰', texto: 'Quanto devo guardar do salário?' },
      { emoji: '🧠', texto: 'Quais erros financeiros eu devo evitar?' }
    ],
    2: [
      { emoji: '💳', texto: 'Qual dívida devo quitar primeiro?' },
      { emoji: '🤝', texto: 'Como negociar com o banco?' },
      { emoji: '⚠️', texto: 'Vale a pena pegar empréstimo pra quitar cartão?' },
      { emoji: '📊', texto: 'Analise minhas dívidas pra mim' }
    ],
    3: [
      { emoji: '🐷', texto: 'Quanto preciso na reserva de emergência?' },
      { emoji: '🏦', texto: 'Onde guardar minha reserva?' },
      { emoji: '📈', texto: 'CDI, Tesouro Selic ou poupança?' },
      { emoji: '💸', texto: 'Como economizar mais esse mês?' }
    ],
    4: [
      { emoji: '💎', texto: 'Como começar a investir?' },
      { emoji: '📊', texto: 'Renda fixa ou variável?' },
      { emoji: '🏠', texto: 'Vale a pena financiar imóvel agora?' },
      { emoji: '🎯', texto: 'Como diversificar meu patrimônio?' }
    ],
    5: [
      { emoji: '🚀', texto: 'Como manter minha liberdade financeira?' },
      { emoji: '📊', texto: 'Otimizar carteira de investimentos' },
      { emoji: '🎯', texto: 'Próximos objetivos depois da liberdade?' }
    ]
  };
  
  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = 'index.html?v=' + Date.now();
      return;
    }
    usuario = session.user;
    
    // FIX v2: maybeSingle pra não quebrar se perfil não existir
    const { data: p } = await supabase.from('perfis').select('*').eq('id', usuario.id).maybeSingle();
    perfil = p || { nome: usuario.email?.split('@')[0] || 'amigo', nivel_jornada: 0 };
    
    await carregarHistorico();
    renderMensagens();
    scrollFim();
  })();
  
  async function carregarHistorico() {
    const { data } = await supabase
      .from('chat_mensagens')
      .select('*')
      .eq('user_id', usuario.id)
      .order('criado_em', { ascending: true })
      .limit(50);
    
    mensagens = data || [];
  }
  
  function renderMensagens() {
    const area = document.getElementById('mensagens');
    
    if (mensagens.length === 0) {
      area.innerHTML = renderBoasVindas();
      return;
    }
    
    let html = '';
    let ultimaData = '';
    
    mensagens.forEach(m => {
      const data = formatarData(m.criado_em);
      if (data !== ultimaData) {
        html += `<div class="data-divisor">${data}</div>`;
        ultimaData = data;
      }
      
      const conteudoHtml = m.role === 'assistant' ? markdownToHtml(m.conteudo) : escapeHtml(m.conteudo);
      const hora = formatarHora(m.criado_em);
      
      html += `
        <div class="msg ${m.role}">
          ${conteudoHtml}
          <div class="msg-tempo">${hora}</div>
        </div>
      `;
    });
    
    area.innerHTML = html;
  }
  
  function renderBoasVindas() {
    const nivel = perfil?.nivel_jornada ?? 0;
    const sugestoes = sugestoesPorNivel[nivel] || sugestoesPorNivel[0];
    const nome = perfil?.nome?.split(' ')[0] || '';
    
    return `
      <div class="welcome">
        <div class="welcome-tatu">🦔</div>
        <div class="welcome-titulo">Olá${nome ? ', ' + nome : ''}!</div>
        <div class="welcome-sub">
          Sou o <strong style="color:var(--ia);">Tatu</strong>, seu assistente financeiro inteligente.<br>
          Conheço suas dívidas, metas, gastos e patrimônio.<br>
          Pode perguntar o que quiser!
        </div>
        <div class="sugestoes-titulo">Sugestões pra começar</div>
        <div class="sugestoes">
          ${sugestoes.map(s => `
            <div class="sugestao" onclick="usarSugestao('${escapeAttr(s.texto)}')">
              <span class="sugestao-emoji">${s.emoji}</span>
              <span>${s.texto}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  
  window.usarSugestao = function(texto) {
    document.getElementById('input-msg').value = texto;
    ajustarAltura(document.getElementById('input-msg'));
    habilitarBotao();
    enviarMensagem();
  };
  
  window.ajustarAltura = function(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  };
  
  window.habilitarBotao = function() {
    const input = document.getElementById('input-msg');
    const btn = document.getElementById('btn-enviar');
    btn.disabled = !input.value.trim() || enviando;
  };
  
  window.enviarMensagem = async function() {
    const input = document.getElementById('input-msg');
    const texto = input.value.trim();
    if (!texto || enviando) return;
    
    enviando = true;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('btn-enviar').disabled = true;
    
    const msgUser = {
      role: 'user',
      conteudo: texto,
      criado_em: new Date().toISOString()
    };
    mensagens.push(msgUser);
    
    try {
      await supabase.from('chat_mensagens').insert({
        user_id: usuario.id,
        role: 'user',
        conteudo: texto
      });
    } catch (e) {
      console.error('Erro salvando msg user:', e);
    }
    
    renderMensagens();
    scrollFim();
    
    mostrarTyping();
    
    let contexto = '';
    try {
      contexto = await montarContextoFinanceiro();
    } catch (e) {
      console.error('Erro montando contexto:', e);
      contexto = 'Usuario: ' + (perfil?.nome || 'amigo');
    }
    
    const historico = mensagens.slice(-16).map(m => `${m.role === 'user' ? 'Usuario' : 'Tatu'}: ${m.conteudo}`).join('\n\n');
    
    const mensagemCompleta = `Historico recente da conversa:
${historico}

Responda a ULTIMA pergunta do usuario usando os dados financeiros dele quando relevante.`;
    
    try {
      const resp = await fetch(IA_FUNCTION_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY
        },
        body: JSON.stringify({
          tipo: 'conversa',
          mensagem: mensagemCompleta,
          contexto,
          max_tokens: 1000
        })
      });
      
      const data = await resp.json();
      esconderTyping();
      
      // FIX v2: campo correto é data.resultado (não data.resposta)
      const respostaIA = data.resultado || data.resposta;
      
      if (respostaIA && typeof respostaIA === 'string' && respostaIA.trim().length > 0) {
        const msgAssistant = {
          role: 'assistant',
          conteudo: respostaIA,
          criado_em: new Date().toISOString()
        };
        mensagens.push(msgAssistant);
        
        try {
          await supabase.from('chat_mensagens').insert({
            user_id: usuario.id,
            role: 'assistant',
            conteudo: respostaIA
          });
        } catch (e) {
          console.error('Erro salvando msg IA:', e);
        }
        
        renderMensagens();
        scrollFim();
        
        const hojeKey = `chat_xp_${usuario.id}_${new Date().toISOString().split('T')[0]}`;
        if (!localStorage.getItem(hojeKey)) {
          localStorage.setItem(hojeKey, 'true');
          try {
            await darXP(10, 'chat_iniciado', 'Conversou com o Tatu');
          } catch (e) {
            console.error('Erro dando XP:', e);
          }
        }
      } else {
        // Se chegou erro detalhado do servidor, mostra
        const erroMsg = data.resultado?.erro || data.error || 'Tente novamente em alguns segundos';
        adicionarMsgErro(typeof erroMsg === 'string' ? erroMsg : 'Não consegui responder agora. Tenta de novo?');
        console.error('Resposta sem conteúdo:', data);
      }
    } catch (err) {
      console.error('Erro fetch:', err);
      esconderTyping();
      adicionarMsgErro('Erro de conexão. Verifica sua internet e tenta de novo.');
    } finally {
      enviando = false;
      habilitarBotao();
    }
  };
  
  async function montarContextoFinanceiro() {
    const inicioMes = new Date();
    inicioMes.setDate(1);
    inicioMes.setHours(0, 0, 0, 0);
    
    let trans = [], dividas = [], metas = [], pat = [], gam = null;
    
    try {
      const transRes = await supabase
        .from('transacoes')
        .select('valor, tipo, descricao, data, categorias(nome)')
        .eq('user_id', usuario.id)
        .gte('data', inicioMes.toISOString().split('T')[0])
        .order('data', { ascending: false })
        .limit(50);
      trans = transRes.data || [];
    } catch (e) { console.error(e); }
    
    try {
      const dividasRes = await supabase
        .from('dividas')
        .select('credor, tipo, valor_original, valor_atual, status, data_vencimento, juros_mensal')
        .eq('user_id', usuario.id);
      dividas = dividasRes.data || [];
    } catch (e) { console.error(e); }
    
    try {
      const metasRes = await supabase
        .from('metas')
        .select('nome, tipo, valor_objetivo, valor_atual, status')
        .eq('user_id', usuario.id)
        .neq('status', 'cancelada');
      metas = metasRes.data || [];
    } catch (e) { console.error(e); }
    
    try {
      const patRes = await supabase
        .from('patrimonio')
        .select('tipo, nome, valor_atual, rendimento_mensal')
        .eq('user_id', usuario.id)
        .eq('ativo', true);
      pat = patRes.data || [];
    } catch (e) { console.error(e); }
    
    try {
      const gamRes = await supabase
        .from('gamificacao')
        .select('xp_total, streak_atual')
        .eq('user_id', usuario.id)
        .maybeSingle();
      gam = gamRes.data;
    } catch (e) { console.error(e); }
    
    const entrada = trans.filter(t => t.tipo === 'entrada').reduce((a, t) => a + Number(t.valor || 0), 0);
    const saida = trans.filter(t => t.tipo === 'saida').reduce((a, t) => a + Number(t.valor || 0), 0);
    
    const porCat = {};
    trans.filter(t => t.tipo === 'saida').forEach(t => {
      const c = t.categorias?.nome || 'Outros';
      porCat[c] = (porCat[c] || 0) + Number(t.valor || 0);
    });
    const topCats = Object.entries(porCat)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 5)
      .map(([n, v]) => `${n}: R$ ${v.toFixed(2)}`)
      .join(', ');
    
    const ativas = dividas.filter(d => d.status !== 'quitada');
    const totalDivida = ativas.reduce((a, d) => a + Number(d.valor_atual || d.valor_original || 0), 0);
    const dividasList = ativas.slice(0, 10).map(d => 
      `- ${d.credor} (${d.tipo}): R$ ${Number(d.valor_atual || d.valor_original || 0).toFixed(2)}${d.juros_mensal ? ' - ' + d.juros_mensal + '% a.m.' : ''}`
    ).join('\n');
    
    const metasList = metas.map(m => 
      `- ${m.nome}: R$ ${Number(m.valor_atual || 0).toFixed(2)} / R$ ${Number(m.valor_objetivo || 0).toFixed(2)} (${Number(m.valor_objetivo) > 0 ? ((Number(m.valor_atual || 0) / Number(m.valor_objetivo)) * 100).toFixed(0) : 0}%)`
    ).join('\n');
    
    const totalPat = pat.reduce((a, p) => a + Number(p.valor_atual || 0), 0);
    const patList = pat.slice(0, 10).map(p => 
      `- ${p.tipo}: ${p.nome} - R$ ${Number(p.valor_atual || 0).toFixed(2)}`
    ).join('\n');
    
    const nome = perfil?.nome || 'Usuario';
    const nivel = perfil?.nivel_jornada ?? 0;
    const nivelNome = niveisInfo[nivel] || 'Início';
    const renda = perfil?.renda_mensal ? `R$ ${Number(perfil.renda_mensal).toFixed(2)}` : 'nao informado';
    
    return `
=== DADOS FINANCEIROS DO USUARIO ===

PERFIL:
- Nome: ${nome}
- Nivel da jornada: ${nivel} (${nivelNome})
- Renda mensal: ${renda}
- XP total: ${gam?.xp_total || 0}
- Streak: ${gam?.streak_atual || 0} dias

MES ATUAL:
- Entradas: R$ ${entrada.toFixed(2)}
- Saidas: R$ ${saida.toFixed(2)}
- Saldo: R$ ${(entrada - saida).toFixed(2)}
- Total de transacoes: ${trans.length}
- Top categorias de gasto: ${topCats || 'nenhuma'}

DIVIDAS ATIVAS (${ativas.length}):
Total devido: R$ ${totalDivida.toFixed(2)}
${dividasList || 'Nenhuma divida cadastrada'}

METAS (${metas.length}):
${metasList || 'Nenhuma meta cadastrada'}

PATRIMONIO/INVESTIMENTOS (${pat.length}):
Total investido: R$ ${totalPat.toFixed(2)}
${patList || 'Nenhum investimento cadastrado'}

=== FIM DOS DADOS ===

Use esses dados pra responder de forma personalizada. Se o usuario nao tiver dados em alguma area, sugira cadastrar.`;
  }
  
  function mostrarTyping() {
    const area = document.getElementById('mensagens');
    const div = document.createElement('div');
    div.id = 'typing';
    div.className = 'typing';
    div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    area.appendChild(div);
    scrollFim();
  }
  
  function esconderTyping() {
    document.getElementById('typing')?.remove();
  }
  
  function adicionarMsgErro(texto) {
    mensagens.push({
      role: 'assistant',
      conteudo: '⚠️ ' + texto,
      criado_em: new Date().toISOString()
    });
    renderMensagens();
    scrollFim();
  }
  
  function scrollFim() {
    setTimeout(() => {
      const area = document.getElementById('mensagens');
      area.scrollTop = area.scrollHeight;
    }, 50);
  }
  
  function formatarData(iso) {
    const d = new Date(iso);
    const hoje = new Date();
    const ontem = new Date(); ontem.setDate(ontem.getDate() - 1);
    
    if (d.toDateString() === hoje.toDateString()) return 'Hoje';
    if (d.toDateString() === ontem.toDateString()) return 'Ontem';
    
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
  }
  
  function formatarHora(iso) {
    return new Date(iso).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }
  
  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g, '<br>');
  }
  
  function escapeAttr(t) {
    return t.replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }
  
  function markdownToHtml(md) {
    if (!md) return '';
    let html = md;
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => '<ul>' + match + '</ul>');
    html = html.split('\n\n').map(p => {
      p = p.trim();
      if (!p) return '';
      if (p.startsWith('<h') || p.startsWith('<ul') || p.startsWith('<ol')) return p;
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('\n');
    return html;
  }
  
  document.getElementById('input-msg').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      enviarMensagem();
    }
  });
  
  window.abrirDrawer = function() {
    document.getElementById('drawer-overlay').classList.add('show');
  };
  
  window.fecharDrawer = function(e) {
    if (e && e.target.closest('.drawer')) return;
    document.getElementById('drawer-overlay').classList.remove('show');
  };
  
  window.limparHistorico = async function() {
    fecharDrawer();
    if (!confirm('Apagar todo o histórico de conversa com o Tatu? Não dá pra recuperar.')) return;
    
    try {
      await supabase.from('chat_mensagens').delete().eq('user_id', usuario.id);
      mensagens = [];
      renderMensagens();
    } catch (e) {
      alert('Erro: ' + e.message);
    }
  };
  
  async function darXP(xp, acao, descricao) {
    await supabase.from('historico_xp').insert({
      user_id: usuario.id, acao, xp_ganho: xp, descricao
    });
    const { data: g } = await supabase.from('gamificacao').select('xp_total').eq('user_id', usuario.id).maybeSingle();
    await supabase.from('gamificacao').update({
      xp_total: (g?.xp_total || 0) + xp,
      ultima_atividade: new Date().toISOString().split('T')[0]
    }).eq('user_id', usuario.id);
  }
