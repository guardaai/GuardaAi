<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>Tatu • guardaí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{--bg:#0a0a0a;--bg-card:#141414;--bg-elev:#1c1c1c;--bg-input:#181818;--border:#252525;--border-strong:#353535;--brand:#00d97e;--brand-hover:#00ba6b;--brand-soft:rgba(0,217,126,0.1);--danger:#ff4757;--danger-soft:rgba(255,71,87,0.1);--warning:#ffb800;--warning-soft:rgba(255,184,0,0.1);--ia:#a855f7;--ia-soft:rgba(168,85,247,0.1);--text:#fff;--text-mute:#a3a3a3;--text-faint:#525252}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;height:100%}
body{display:flex;flex-direction:column}
input,textarea{color:#fff!important;-webkit-text-fill-color:#fff!important;caret-color:var(--brand)}
input:-webkit-autofill{-webkit-box-shadow:0 0 0 1000px var(--bg-input) inset!important;-webkit-text-fill-color:#fff!important}

.header{padding:14px 20px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.header-back{width:36px;height:36px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.header-info{flex:1;display:flex;align-items:center;gap:10px}
.tatu-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--ia) 0%,#9333ea 100%);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 0 16px rgba(168,85,247,0.4)}
.header-titulo{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;line-height:1.1}
.header-sub{font-size:11px;color:var(--brand);display:flex;align-items:center;gap:5px}
.header-sub::before{content:'';width:6px;height:6px;background:var(--brand);border-radius:50%;display:inline-block;box-shadow:0 0 6px var(--brand)}
.header-btn{width:36px;height:36px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-mute);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.header-btn.ativo{background:var(--ia-soft);border-color:var(--ia);color:var(--ia)}

.messages{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:14px;padding-bottom:30px}
.messages::-webkit-scrollbar{width:6px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.msg{max-width:88%;display:flex;flex-direction:column;gap:4px;animation:msgIn 0.3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.usuario{align-self:flex-end;align-items:flex-end}
.msg.tatu{align-self:flex-start;align-items:flex-start}
.msg-bubble{padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.5;word-wrap:break-word;white-space:pre-wrap}
.msg.usuario .msg-bubble{background:var(--brand);color:#001a0e;border-bottom-right-radius:4px;font-weight:500}
.msg.tatu .msg-bubble{background:var(--bg-card);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px}
.msg.tatu .msg-bubble strong{color:var(--brand);font-weight:700}
.msg.tatu .msg-bubble em{color:var(--ia);font-style:normal;font-weight:500}
.msg-row{display:flex;align-items:center;gap:8px}
.msg-tempo{font-size:10px;color:var(--text-faint);padding:0 6px;font-family:'Space Grotesk',sans-serif}
.msg-falar{font-size:13px;color:var(--text-faint);cursor:pointer;padding:2px 4px}
.msg-falar:active{transform:scale(0.9)}
.msg-falar.falando{color:var(--ia)}

.msg.tatu-loading .msg-bubble{display:flex;align-items:center;gap:8px;color:var(--text-mute);font-style:italic;padding:14px 18px}
.tatu-dot{width:6px;height:6px;background:var(--ia);border-radius:50%;animation:dot 1.2s infinite}
.tatu-dot:nth-child(2){animation-delay:0.2s}
.tatu-dot:nth-child(3){animation-delay:0.4s}
@keyframes dot{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-4px);opacity:1}}

.sugestoes-wrap{padding:0 20px 16px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
.sugestoes-wrap::-webkit-scrollbar{display:none}
.sugestao-chip{background:var(--bg-card);border:1px solid var(--border);border-radius:100px;padding:9px 14px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;flex-shrink:0;white-space:nowrap;transition:all 0.15s}
.sugestao-chip:active{background:var(--brand-soft);border-color:var(--brand);transform:scale(0.97)}

.input-area{padding:14px 16px;padding-bottom:max(14px,env(safe-area-inset-bottom));background:var(--bg);border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end;max-width:480px;margin:0 auto}
.input-wrap{flex:1;background:var(--bg-input);border:1px solid var(--border);border-radius:24px;padding:4px;display:flex;align-items:flex-end;gap:0;min-height:48px}
.input-wrap:focus-within{border-color:var(--brand)}
.input-text{flex:1;background:transparent;border:none;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;padding:10px 14px;outline:none;resize:none;max-height:120px;line-height:1.4;min-height:32px}
.input-mic{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--ia) 0%,#9333ea 100%);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;margin:0 2px}
.input-mic:active{transform:scale(0.92)}
.input-mic.recording{background:var(--danger);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,71,87,0.6)}50%{box-shadow:0 0 0 12px rgba(255,71,87,0)}}
.input-send{width:48px;height:48px;border-radius:50%;background:var(--brand);border:none;color:#001a0e;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;font-weight:700;flex-shrink:0}
.input-send:disabled{background:var(--bg-elev);color:var(--text-faint);cursor:not-allowed}
.input-send:not(:disabled):active{transform:scale(0.95)}

.empty-state{text-align:center;padding:30px 20px;animation:msgIn 0.4s ease}
.empty-tatu{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--ia) 0%,#9333ea 100%);display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 14px;box-shadow:0 8px 32px rgba(168,85,247,0.4)}
.empty-titulo{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--text-mute);line-height:1.5;max-width:300px;margin:0 auto 16px}

.gravando-banner{background:var(--danger-soft);border:1px solid rgba(255,71,87,0.4);border-radius:12px;padding:10px 14px;margin:0 16px 8px;display:flex;align-items:center;gap:10px;font-size:13px;animation:msgIn 0.2s ease}
.gravando-dot{width:10px;height:10px;background:var(--danger);border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0.3}}
</style>
</head>
<body>

<div class="header">
  <button class="header-back" onclick="window.location.href='home.html?v='+Date.now()">‹</button>
  <div class="header-info">
    <div class="tatu-avatar">🦔</div>
    <div>
      <div class="header-titulo">Tatu</div>
      <div class="header-sub">Online • IA Claude</div>
    </div>
  </div>
  <button class="header-btn" id="btn-voz" onclick="toggleVoz()" title="Tatu ler em voz alta">🔇</button>
  <button class="header-btn" onclick="limparChat()" title="Limpar conversa">🗑</button>
</div>

<div class="messages" id="messages"></div>

<div id="sugestoes-area"></div>
<div id="gravando-banner" style="display:none;"></div>

<div class="input-area">
  <div class="input-row">
    <div class="input-wrap">
      <textarea id="input-text" class="input-text" placeholder="Pergunta pro Tatu..." rows="1" oninput="autoresize(this);atualizarBotao()"></textarea>
      <button class="input-mic" id="btn-mic" onclick="toggleRec()" title="Falar">🎤</button>
    </div>
    <button class="input-send" id="btn-send" onclick="enviar()" disabled>↑</button>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL='https://gmbsxrxqrxpbgyyvifcd.supabase.co';
const SUPABASE_KEY='sb_publishable_NSOgcu93sTiSreGYi-Ha3g_bqYsAK22';
const IA_URL='https://gmbsxrxqrxpbgyyvifcd.supabase.co/functions/v1/claude-chat';
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);

let usuario,perfil;
let mensagens=[];
let contextoUsuario='';
let recognition=null,isRecording=false;
let processando=false;
let vozLigada=false;

const SUGESTOES_INICIAIS=[
  '📊 Como tô esse mês?',
  '💸 Quanto eu devo?',
  '🎯 Cadê meu plano?',
  '💰 Quanto entra/sai?',
  '📅 Contas dessa semana',
  '💡 Onde posso economizar?'
];

(async()=>{
  const{data:{session}}=await supabase.auth.getSession();
  if(!session){window.location.href='index.html?v='+Date.now();return}
  usuario=session.user;
  
  const{data:p}=await supabase.from('perfis').select('*').eq('id',usuario.id).maybeSingle();
  perfil=p||{};
  
  await montarContexto();
  renderEmpty();
})();

async function montarContexto(){
  try{
    const hoje=new Date().toISOString().split('T')[0];
    const inicioMes=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().split('T')[0];
    const fimMes=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).toISOString().split('T')[0];
    const proxSemana=new Date();proxSemana.setDate(proxSemana.getDate()+7);
    
    const[contas,rendas,despesas,dividas,transMes,transProxSemana,gam,metas]=await Promise.all([
      supabase.from('contas').select('*').eq('user_id',usuario.id).eq('ativa',true),
      supabase.from('rendas').select('*').eq('user_id',usuario.id),
      supabase.from('compromissos').select('*').eq('user_id',usuario.id),
      supabase.from('dividas').select('*').eq('user_id',usuario.id).eq('status','ativa'),
      supabase.from('transacoes').select('*').eq('user_id',usuario.id).gte('data',inicioMes).lte('data',fimMes).order('data',{ascending:false}),
      supabase.from('transacoes').select('*').eq('user_id',usuario.id).gte('data',hoje).lte('data',proxSemana.toISOString().split('T')[0]).eq('status','prevista').eq('tipo','saida').order('data'),
      supabase.from('gamificacao').select('*').eq('user_id',usuario.id).maybeSingle(),
      supabase.from('metas').select('*').eq('user_id',usuario.id)
    ]);
    
    const nome=perfil.nome||usuario.email?.split('@')[0]||'amigo';
    const c=contas.data||[],r=rendas.data||[],d=despesas.data||[],di=dividas.data||[],tm=transMes.data||[],tps=transProxSemana.data||[];
    const g=gam.data||{};
    const me=metas.data||[];
    
    const contasNoCart=c.filter(x=>x.tipo!=='cartao_credito');
    const cartoes=c.filter(x=>x.tipo==='cartao_credito');
    const saldoContas=contasNoCart.reduce((a,x)=>a+Number(x.saldo_inicial||0),0);
    const totalRenda=r.reduce((a,x)=>a+Number(x.valor||0),0);
    const totalDespFixa=d.reduce((a,x)=>a+Number(x.valor||0),0);
    const totalDividas=di.reduce((a,x)=>a+Number(x.valor_atual||0),0);
    
    const realizadasMes=tm.filter(t=>(t.status||'realizada')==='realizada');
    const entradasMes=realizadasMes.filter(t=>t.tipo==='entrada').reduce((a,t)=>a+Number(t.valor),0);
    const saidasMes=realizadasMes.filter(t=>t.tipo==='saida').reduce((a,t)=>a+Number(t.valor),0);
    const vencidas=tm.filter(t=>t.status==='prevista'&&t.tipo==='saida'&&t.data<hoje);
    
    // gastos do mês por categoria (só saídas realizadas)
    const porCat={};
    realizadasMes.filter(t=>t.tipo==='saida').forEach(t=>{const k=t.categoria||'outro';porCat[k]=(porCat[k]||0)+Number(t.valor||0)});
    const catOrdenada=Object.entries(porCat).sort((a,b)=>b[1]-a[1]);
    
    // últimas transações detalhadas (até 25)
    const ultimas=tm.slice(0,25);
    
    // dívidas de juros (agiota)
    const agiotas=di.filter(x=>x.juros_rola===true&&Number(x.juros_mensal)>0);
    const totalJurosMes=agiotas.reduce((a,x)=>a+Number(x.valor_atual)*Number(x.juros_mensal)/100,0);
    
    const niveis=['','Diagnóstico','Resgate','Estabilização','Construção','Liberdade'];
    const objetivos={sair_dividas:'Sair das dívidas',criar_reserva:'Criar reserva de emergência',investir:'Investir',liberdade:'Liberdade financeira'};
    
    contextoUsuario=`PERFIL:
- Nome: ${nome}
- Objetivo atual: ${objetivos[perfil.objetivo_principal]||'Não definido'}
- Nível na jornada: ${perfil.nivel_jornada||0} (${niveis[perfil.nivel_jornada||0]||'Diagnóstico'})
- XP total: ${g.xp_total||0}
- Streak: ${g.streak_atual||0} dias

SITUAÇÃO ATUAL:
- Saldo total nas contas: R$ ${fm(saldoContas)}
- Renda mensal total: R$ ${fm(totalRenda)}
- Despesas fixas mensais: R$ ${fm(totalDespFixa)}
- Total em dívidas ativas: R$ ${fm(totalDividas)}
- Sobra mensal estimada: R$ ${fm(totalRenda-totalDespFixa)}

CONTAS (${contasNoCart.length}):
${contasNoCart.map(x=>`- ${x.nome} (${x.banco||x.tipo}): R$ ${fm(x.saldo_inicial)}`).join('\n')||'Nenhuma'}

CARTÕES (${cartoes.length}):
${cartoes.map(x=>`- ${x.nome}: limite R$ ${fm(x.limite||0)}, vence dia ${x.dia_vencimento||'?'}, fecha dia ${x.dia_fechamento||'?'}`).join('\n')||'Nenhum'}

RENDAS (${r.length}):
${r.map(x=>`- ${x.nome}: R$ ${fm(x.valor)}/mês (dia ${x.dia_recebimento||'?'})`).join('\n')||'Nenhuma'}

DESPESAS FIXAS (${d.length}):
${d.map(x=>`- ${x.nome} (${x.categoria}): R$ ${fm(x.valor)}/mês`).join('\n')||'Nenhuma'}

DÍVIDAS ATIVAS (${di.length}):
${di.map(x=>`- ${x.credor} (${x.tipo}): R$ ${fm(x.valor_atual)} de R$ ${fm(x.valor_original)}${x.juros_rola?` • 🔴 JUROS ${x.juros_mensal}%/mês (R$ ${fm(Number(x.valor_atual)*Number(x.juros_mensal)/100)}/mês) que rola no saldo`:''} • vence ${x.data_vencimento}`).join('\n')||'Nenhuma'}
${agiotas.length>0?`\n⚠️ ATENÇÃO: ${agiotas.length} dívida(s) de juros (agiota) custando R$ ${fm(totalJurosMes)}/mês só de juros. PRIORIDADE.`:''}

METAS (${me.length}):
${me.map(x=>{const pct=x.valor_alvo>0?Math.round((Number(x.valor_atual)/Number(x.valor_alvo))*100):0;return `- ${x.nome} (${x.tipo}): R$ ${fm(x.valor_atual)} de R$ ${fm(x.valor_alvo)} (${pct}%)`}).join('\n')||'Nenhuma'}

ESSE MÊS (${new Date().toLocaleDateString('pt-BR',{month:'long'})}):
- Entradas realizadas: R$ ${fm(entradasMes)}
- Saídas realizadas: R$ ${fm(saidasMes)}
- Saldo do mês: R$ ${fm(entradasMes-saidasMes)}
- Total transações: ${tm.length}
- Contas vencidas em aberto: ${vencidas.length} (R$ ${fm(vencidas.reduce((a,t)=>a+Number(t.valor),0))})

GASTOS DO MÊS POR CATEGORIA:
${catOrdenada.map(([cat,val])=>`- ${cat}: R$ ${fm(val)}`).join('\n')||'Nenhum gasto'}

ÚLTIMAS TRANSAÇÕES (até 25 mais recentes do mês):
${ultimas.map(t=>`- ${t.data} • ${t.tipo==='entrada'?'+':'-'}R$ ${fm(t.valor)} • ${t.descricao||t.categoria||'?'}${t.status==='prevista'?' (prevista)':''}`).join('\n')||'Nenhuma'}

CONTAS A PAGAR PRÓXIMOS 7 DIAS (${tps.length}):
${tps.slice(0,10).map(t=>`- ${t.data}: ${t.descricao} - R$ ${fm(t.valor)}`).join('\n')||'Nada agendado'}

DATA DE HOJE: ${hoje}`;
    
  }catch(e){
    console.error('Erro montando contexto:',e);
    contextoUsuario='Erro carregando dados do usuário.';
  }
}

function renderEmpty(){
  const nome=perfil.nome||usuario.email?.split('@')[0]||'amigo';
  document.getElementById('messages').innerHTML=`
    <div class="empty-state">
      <div class="empty-tatu">🦔</div>
      <div class="empty-titulo">Oi ${nome}! Tô aqui.</div>
      <div class="empty-sub">Já sei tudo sobre sua vida financeira. Pergunta o que quiser — em texto ou áudio.</div>
    </div>
  `;
  renderSugestoes();
}

function renderSugestoes(){
  document.getElementById('sugestoes-area').innerHTML=`
    <div class="sugestoes-wrap">
      ${SUGESTOES_INICIAIS.map(s=>`<div class="sugestao-chip" onclick="usarSugestao('${s.replace(/'/g,"\\'")}')">${s}</div>`).join('')}
    </div>`;
}

window.usarSugestao=function(s){
  document.getElementById('input-text').value=s.replace(/^[^\s]+\s/,'');
  atualizarBotao();
  enviar();
};

function renderMensagens(){
  if(mensagens.length===0){renderEmpty();return}
  document.getElementById('sugestoes-area').innerHTML='';
  const html=mensagens.map((m,idx)=>{
    if(m.loading){
      return`<div class="msg tatu tatu-loading"><div class="msg-bubble"><div class="tatu-dot"></div><div class="tatu-dot"></div><div class="tatu-dot"></div></div></div>`;
    }
    const tempo=new Date(m.tempo).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const falarBtn=m.role==='tatu'?`<span class="msg-falar" onclick="falarMsg(${idx})" title="Ouvir">🔊</span>`:'';
    return`<div class="msg ${m.role}"><div class="msg-bubble">${formatarTexto(m.texto)}</div><div class="msg-row"><div class="msg-tempo">${tempo}</div>${falarBtn}</div></div>`;
  }).join('');
  document.getElementById('messages').innerHTML=html;
  setTimeout(()=>{const m=document.getElementById('messages');m.scrollTop=m.scrollHeight},50);
}

window.falarMsg=function(idx){
  const m=mensagens[idx];
  if(!m||m.role!=='tatu')return;
  falar(m.texto);
};

function formatarTexto(t){
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*([^\*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(R\$\s?[\d.,]+)/g,'<em>$1</em>');
}

// ===== VOZ: Tatu lê em voz alta =====
function limparPraFala(t){
  return t.replace(/\*\*/g,'').replace(/[*_#`]/g,'').replace(/🦔|🔴|⚠️|✅|💪|🎯|💰|📊|💸|📅|💡|🎉|🚀/g,'').trim();
}
function falar(texto){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(limparPraFala(texto));
  u.lang='pt-BR';
  u.rate=1.05;
  u.pitch=1.0;
  const vozes=window.speechSynthesis.getVoices();
  const vozBR=vozes.find(v=>v.lang==='pt-BR')||vozes.find(v=>v.lang&&v.lang.startsWith('pt'));
  if(vozBR)u.voice=vozBR;
  window.speechSynthesis.speak(u);
}
window.toggleVoz=function(){
  vozLigada=!vozLigada;
  const b=document.getElementById('btn-voz');
  b.textContent=vozLigada?'🔊':'🔇';
  b.classList.toggle('ativo',vozLigada);
  if(!vozLigada&&'speechSynthesis' in window)window.speechSynthesis.cancel();
  // dispara carregamento das vozes (alguns navegadores precisam)
  if(vozLigada&&'speechSynthesis' in window)window.speechSynthesis.getVoices();
};

window.enviar=async function(){
  if(processando)return;
  const inp=document.getElementById('input-text');
  const texto=inp.value.trim();
  if(!texto)return;
  
  if(isRecording)pararRec();
  
  processando=true;
  inp.value='';
  autoresize(inp);
  atualizarBotao();
  
  mensagens.push({role:'usuario',texto,tempo:Date.now()});
  mensagens.push({role:'tatu',loading:true,tempo:Date.now()});
  renderMensagens();
  document.getElementById('sugestoes-area').innerHTML='';
  
  try{
    // histórico nativo pro Tatu (últimas trocas, sem a pergunta atual e sem loading)
    const historico=mensagens
      .filter(m=>!m.loading)
      .slice(-11,-1)
      .map(m=>({role:m.role==='usuario'?'user':'assistant',content:m.texto}));
    
    const r=await fetch(IA_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
      body:JSON.stringify({
        tipo:'conversa',
        mensagem:texto,
        contexto:contextoUsuario,
        historico:historico,
        max_tokens:1500
      })
    });
    const d=await r.json();
    
    mensagens=mensagens.filter(m=>!m.loading);
    
    let respostaTatu='';
    if(d.resultado&&typeof d.resultado==='string'){
      respostaTatu=d.resultado;
    }else if(d.resultado?.erro){
      respostaTatu='🦔 '+d.resultado.erro;
    }else{
      respostaTatu='🦔 Algo deu errado. Tenta de novo?';
    }
    mensagens.push({role:'tatu',texto:respostaTatu,tempo:Date.now()});
    renderMensagens();
    if(vozLigada)falar(respostaTatu);
  }catch(e){
    mensagens=mensagens.filter(m=>!m.loading);
    mensagens.push({role:'tatu',texto:'🦔 Erro de conexão: '+e.message,tempo:Date.now()});
    renderMensagens();
  }
  
  processando=false;
};

window.toggleRec=function(){if(isRecording)pararRec();else iniciarRec()};

function iniciarRec(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    alert('🦔 Seu navegador não suporta áudio.\n\nUse Safari (iPhone) ou Chrome.');
    return;
  }
  const SR=window.webkitSpeechRecognition||window.SpeechRecognition;
  recognition=new SR();
  recognition.lang='pt-BR';
  recognition.continuous=true;
  recognition.interimResults=true;
  
  let tF='';
  recognition.onresult=(e)=>{
    let tI='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)tF+=e.results[i][0].transcript+' ';
      else tI+=e.results[i][0].transcript;
    }
    const inp=document.getElementById('input-text');
    inp.value=(tF+tI).trim();
    autoresize(inp);
    atualizarBotao();
  };
  
  recognition.onerror=(e)=>{
    if(e.error==='no-speech')return;
    if(e.error==='not-allowed')alert('🎤 Permissão de microfone negada.');
    pararRec();
  };
  
  recognition.onend=()=>{
    if(isRecording){try{recognition.start()}catch(e){}}
  };
  
  try{
    recognition.start();
    isRecording=true;
    document.getElementById('btn-mic').classList.add('recording');
    document.getElementById('btn-mic').textContent='⏹️';
    document.getElementById('gravando-banner').style.display='flex';
    document.getElementById('gravando-banner').className='gravando-banner';
    document.getElementById('gravando-banner').innerHTML=`<div class="gravando-dot"></div><div>🔴 Gravando... toque no ⏹️ pra parar</div>`;
  }catch(e){
    alert('Erro iniciando gravação: '+e.message);
  }
}

function pararRec(){
  if(recognition){
    isRecording=false;
    try{recognition.stop()}catch(e){}
    recognition=null;
  }
  document.getElementById('btn-mic').classList.remove('recording');
  document.getElementById('btn-mic').textContent='🎤';
  document.getElementById('gravando-banner').style.display='none';
}

window.autoresize=function(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
};

window.atualizarBotao=function(){
  const txt=document.getElementById('input-text').value.trim();
  document.getElementById('btn-send').disabled=!txt||processando;
};

window.limparChat=function(){
  if(mensagens.length===0)return;
  if(!confirm('Limpar essa conversa?'))return;
  if('speechSynthesis' in window)window.speechSynthesis.cancel();
  mensagens=[];
  renderEmpty();
};

function fm(v){return(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}

document.getElementById('input-text').addEventListener('keydown',(e)=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar()}
});
</script>
