  async function salvarCartaoFinal({ valor, paga, atrasada }) {
    const { bancoId, nome, limite, fechamento, vencimento } = cartaoSalvandoTemp;
    const banco = BANCOS.find(b => b.id === bancoId);
    
    try {
      // 1. Salva o CARTÃO (conta tipo cartao_credito)
      const { data: cartao, error: errCartao } = await supabase.from('contas').insert({
        user_id: usuario.id,
        nome,
        tipo: 'cartao_credito',
        banco: banco.nome,
        cor: banco.cor,
        icone: '💳',
        limite,
        saldo_inicial: 0,
        dia_fechamento: fechamento,
        dia_vencimento: vencimento
      }).select().single();
      
      if (errCartao) throw errCartao;
      cartoesAdicionados.push(cartao);
      
      // 2. Se tem fatura COM VALOR, cria as integrações
      if (valor > 0) {
        // Calcula data de vencimento
        let dataVencStr;
        if (atrasada) {
          // Atrasada: usa data passada (vencimento mês passado)
          const dataVenc = new Date();
          dataVenc.setMonth(dataVenc.getMonth() - 1);
          if (vencimento) dataVenc.setDate(vencimento);
          dataVencStr = dataVenc.toISOString().split('T')[0];
        } else {
          // Aberta ou paga: usa vencimento próximo
          const dataVenc = new Date();
          if (vencimento) {
            dataVenc.setDate(vencimento);
            if (dataVenc < new Date()) dataVenc.setMonth(dataVenc.getMonth() + 1);
          } else {
            dataVenc.setDate(dataVenc.getDate() + 30);
          }
          dataVencStr = dataVenc.toISOString().split('T')[0];
        }
        
        // Se NÃO está paga, cria dívida + transação prevista
        if (!paga) {
          const { data: divida, error: errDiv } = await supabase.from('dividas').insert({
            user_id: usuario.id,
            credor: banco.nome,
            tipo: 'cartao',
            descricao: `Fatura do cartão ${nome}`,
            valor_original: valor,
            valor_atual: valor,
            data_vencimento: dataVencStr,
            data_inicio: new Date().toISOString().split('T')[0],
            status: 'ativa',
            prioridade: atrasada ? 1 : 2,
            conta_id: cartao.id
          }).select().single();
          
          if (!errDiv && divida) {
            dividasAdicionadas.push(divida);
            
            // Cria transação prevista
            await supabase.from('transacoes').insert({
              user_id: usuario.id,
              valor,
              descricao: `Fatura ${nome}`,
              data: dataVencStr,
              tipo: 'saida',
              conta_id: cartao.id,
              divida_id: divida.id,
              status: 'prevista'
            });
          }
        } else {
          // Se está paga, cria transação como realizada
          await supabase.from('transacoes').insert({
            user_id: usuario.id,
            valor,
            descricao: `Fatura ${nome} (paga)`,
            data: dataVencStr,
            tipo: 'saida',
            conta_id: cartao.id,
            status: 'realizada'
          });
        }
      }
      
      await darXP(25, 'cartao_setup', 'Setup cartão: ' + nome);
      mostrarToast(`+25 XP 💳 Cartão ${nome} salvo!`);
      
      // Reset estados temporários
      cartaoSalvandoTemp = null;
      statusFaturaTemp = null;
      
      // Próximo cartão ou banco
      setTimeout(() => {
        cartaoIndexAtual++;
        renderPasso4();
      }, 800);
    } catch (e) {
      alert('Erro salvando cartão: ' + e.message);
      console.error(e);
    }
  }

  // ============================================

  window.processarFoto = async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    
    document.getElementById('container').innerHTML = `
      <div class="ia-loading">
        <div class="ia-spinner"></div>
        <div class="ia-loading-titulo">📸 Preparando foto...</div>
        <div class="ia-loading-sub">Reduzindo o tamanho pra IA processar mais rápido</div>
        <div class="ia-loading-passo" id="passo-foto">Comprimindo imagem...</div>
      </div>
    `;
    
    let base64;
    try {
      base64 = await comprimirImagem(file, 1600, 0.85);
      const elPasso = document.getElementById('passo-foto');
      if (elPasso) elPasso.textContent = 'IA Claude lendo a foto...';
    } catch (err) {
      console.error('Erro comprimindo:', err);
      alert('⚠️ Não consegui processar essa foto. Tenta outra ou usa o cadastro manual.');
      if (modoFoto === 'conta') renderPasso3();
      return;
    }
    
    try {
      const tipoFn = 'analisar_conta';
      const hint = alvoFotoAtual ? 'conta_corrente' : null;
      
      const resp = await fetch(IA_FUNCTION_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY },
        body: JSON.stringify({ tipo: tipoFn, imagem_base64: base64, hint_tipo: hint, max_tokens: 1500 })
      });
      const data = await resp.json();
      
      if (data.resultado && !data.resultado.erro) {
        await processarResultadoContaIA(data.resultado);
      } else {
        const erro = data.resultado?.erro || 'Erro desconhecido';
        alert('⚠️ IA não conseguiu processar: ' + erro);
        renderPasso3();
      }
    } catch (err) {
      console.error(err);
      alert('Erro de conexão: ' + err.message);
      renderPasso3();
    }
  };
  
  async function comprimirImagem(file, maxWidth = 1600, qualidade = 0.85) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let largura = img.width;
          let altura = img.height;
          if (largura > maxWidth) { altura = Math.round((altura * maxWidth) / largura); largura = maxWidth; }
          const canvas = document.createElement('canvas');
          canvas.width = largura;
          canvas.height = altura;
          const ctx = canvas.getContext('2d');
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = 'high';
          ctx.drawImage(img, 0, 0, largura, altura);
          const base64 = canvas.toDataURL('image/jpeg', qualidade);
          const tamanhoKB = Math.round((base64.length * 0.75) / 1024);
          console.log(`📸 Imagem comprimida: ${largura}x${altura} ≈ ${tamanhoKB}KB`);
          if (tamanhoKB > 4000 && qualidade > 0.5) {
            const base64Menor = canvas.toDataURL('image/jpeg', 0.7);
            resolve(base64Menor);
          } else { resolve(base64); }
        };
        img.onerror = () => reject(new Error('Erro carregando imagem'));
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error('Erro lendo arquivo'));
      reader.readAsDataURL(file);
    });
  }
  
  async function processarResultadoContaIA(r) {
    const banco = BANCOS.find(b => b.id === alvoFotoAtual);
    const dados = {
      user_id: usuario.id,
      nome: r.nome_sugerido || banco.nome,
      tipo: r.tipo_conta || 'conta_corrente',
      banco: banco.nome, cor: banco.cor,
      icone: r.tipo_conta === 'poupanca' ? '🐷' : r.tipo_conta === 'investimento' ? '📈' : '🏦',
      saldo_inicial: r.saldo_atual || 0,
      padrao: contasAdicionadas.length === 0
    };
    try {
      const { data, error } = await supabase.from('contas').insert(dados).select().single();
      if (error) throw error;
      contasAdicionadas.push(data);
      await darXP(25, 'conta_via_ia_setup', 'Setup IA: ' + banco.nome);
      mostrarToast('+25 XP ✨ IA cadastrou!');
      setTimeout(() => {
        bancoIndexAtual++;
        if (bancoIndexAtual >= bancosSelecionados.length) { bancoIndexAtual = 0; proximoPasso(); }
        else { renderPasso3(); }
      }, 1000);
    } catch (e) { alert('Erro salvando: ' + e.message); renderPasso3(); }
  }
  
  function renderFooterPadrao(temVoltar, podeAvancar) {
    let html = '';
    if (temVoltar) html += `<button class="btn btn-back" onclick="voltarPasso()">‹</button>`;
    html += `<button class="btn btn-primary" ${podeAvancar ? '' : 'disabled'} onclick="proximoPasso()">Continuar →</button>`;
    document.getElementById('footer-content').innerHTML = html;
  }
  
  window.formatarValor = function(input) {
    let v = input.value.replace(/\D/g, '');
    if (!v) { input.value = ''; return; }
    v = (parseInt(v) / 100).toFixed(2);
    input.value = Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
  };
  
  function valorParaNumero(str) {
    if (!str) return 0;
    return Number(str.replace(/\./g, '').replace(',', '.')) || 0;
  }
  
  function formatarMoeda(v) {
    return (Number(v) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  
  async function darXP(xp, acao, descricao) {
    try {
      await supabase.from('historico_xp').insert({ user_id: usuario.id, acao, xp_ganho: xp, descricao });
      const { data: g } = await supabase.from('gamificacao').select('xp_total').eq('user_id', usuario.id).maybeSingle();
      await supabase.from('gamificacao').update({
        xp_total: (g?.xp_total || 0) + xp,
        ultima_atividade: new Date().toISOString().split('T')[0]
      }).eq('user_id', usuario.id);
    } catch (e) { console.error('XP:', e); }
  }
  
  function mostrarToast(texto) {
    const t = document.getElementById('xp-toast');
    t.textContent = texto;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 2500);
  }
</script>
