  window.confFat = function() {
    const valor = valorParaNumero(document.getElementById('f-val').value);

    if (!statusFaturaTemp) { alert('Selecione o status'); return; }
    salvarCartaoFinal({ valor, paga: statusFaturaTemp === 'paga', atrasada: statusFaturaTemp === 'atrasada' });

  async function salvarCartaoFinal({ valor, paga, atrasada }) {
    const { bancoId, nome, limite, fechamento, vencimento } = cartaoTemp;
    const banco = BANCOS.find(b => b.id === bancoId);
    try {
      const { data: cart, error: e1 } = await supabase.from('contas').insert({
        user_id: usuario.id, nome, tipo: 'cartao_credito', banco: banco.nome, cor: banco.cor,
        icone: '💳', limite, saldo_inicial: 0, dia_fechamento: fechamento, dia_vencimento: vencimento
      }).select().single();
      if (e1) throw e1;
      cartoesAdicionados.push(cart);
      
      if (valor > 0) {
        let dVenc;
        if (atrasada) {
          const d = new Date(); d.setMonth(d.getMonth() - 1);
          if (vencimento) d.setDate(vencimento);
          dVenc = d.toISOString().split('T')[0];
        } else {
          const d = new Date();
          if (vencimento) { d.setDate(vencimento); if (d < new Date()) d.setMonth(d.getMonth() + 1); }
          else d.setDate(d.getDate() + 30);
          dVenc = d.toISOString().split('T')[0];
        }
        
        if (!paga) {
          const { data: div } = await supabase.from('dividas').insert({
            user_id: usuario.id, credor: banco.nome, tipo: 'cartao',
            descricao: `Fatura ${nome}`, valor_original: valor, valor_atual: valor,
            data_vencimento: dVenc, data_inicio: new Date().toISOString().split('T')[0],
            status: 'ativa', prioridade: atrasada ? 1 : 2, conta_id: cart.id
          }).select().single();
          if (div) {
            dividasAdicionadas.push(div);
            await supabase.from('transacoes').insert({
              user_id: usuario.id, valor, descricao: `Fatura ${nome}`, data: dVenc,
              tipo: 'saida', conta_id: cart.id, divida_id: div.id, status: 'prevista'
            });
          }
        } else {
          await supabase.from('transacoes').insert({
            user_id: usuario.id, valor, descricao: `Fatura ${nome} (paga)`, data: dVenc,
            tipo: 'saida', conta_id: cart.id, status: 'realizada'
          });
        }
      }
      
      await darXP(25, 'cartao_setup', 'Setup cartão: ' + nome);
      toast(`+25 XP 💳 ${nome} salvo!`);
      cartaoTemp = null; statusFaturaTemp = null;
      setTimeout(() => { cartaoIdx++; renderP5(); }, 800);
    } catch (e) { alert('Erro: ' + e.message); console.error(e); }
  }
  
  function renderP5_Resumo() {

    document.getElementById('container').innerHTML = `

  window.excluirRenda = async function(id) {
    if (!confirm('Excluir essa renda e transações previstas?')) return;
    try {

  window.salvarRenda = async function() {
    const cat = document.getElementById('mr-cat').value;
    const nome = document.getElementById('mr-nome').value.trim();
    const val = valorParaNumero(document.getElementById('mr-val').value);
    const dia = parseInt(document.getElementById('mr-dia').value) || null;
    if (!nome) { alert('Digite o nome'); return; }
    if (!val || val <= 0) { alert('Informe o valor'); return; }
    const emojis = { 'salario_clt': '💼', 'salario': '💼', 'autonomo': '🛠️', 'comissao': '🎯', 'freelance': '💻', 'aluguel_recebido': '🏠', 'dividendos': '📈', 'bonus': '🎁', 'outro': '📌' };
    try {
      const { data, error } = await supabase.from('rendas').insert({
        user_id: usuario.id, nome, categoria: cat, valor: val, dia_recebimento: dia, cor: '#00d97e', icone: emojis[cat] || '💰'
      }).select().single();
      if (error) throw error;
      rendasAdicionadas.push(data);
      const totalRenda = rendasAdicionadas.reduce((a, r) => a + Number(r.valor || 0), 0);
      await supabase.from('perfis').update({ renda_mensal: totalRenda }).eq('id', usuario.id);
      const hoje = new Date();
      const dUsar = dia || hoje.getDate();
      let mes = hoje.getMonth();
      if (dUsar <= hoje.getDate()) mes++;
      const trans = [];
      for (let i = 0; i < 12; i++) {
        const d = new Date(hoje.getFullYear(), mes + i, dUsar);
        trans.push({ user_id: usuario.id, valor: val, descricao: nome, data: d.toISOString().split('T')[0], tipo: 'entrada', renda_id: data.id, status: 'prevista', recorrente: true });
      }
      await supabase.from('transacoes').insert(trans);
      await darXP(20, 'renda_setup', 'Setup renda: ' + nome);
      toast(`+20 XP 💰 Renda salva!`);
      setTimeout(() => renderP6(), 800);
    } catch (e) { alert('Erro: ' + e.message); }
  };

  async function comprimirImagem(file, maxW = 1600, q = 0.85) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxW) { h = Math.round((h * maxW) / w); w = maxW; }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          const ctx = c.getContext('2d');
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = 'high';
          ctx.drawImage(img, 0, 0, w, h);
          let b64 = c.toDataURL('image/jpeg', q);
          const kb = Math.round((b64.length * 0.75) / 1024);
          if (kb > 4000 && q > 0.5) b64 = c.toDataURL('image/jpeg', 0.7);
          res(b64);
        };
        img.onerror = () => rej(new Error('Erro carregando imagem'));
        img.src = e.target.result;
      };
      r.onerror = () => rej(new Error('Erro lendo arquivo'));
      r.readAsDataURL(file);
    });
  }
  
  // 🔥 v3.1 FIX: respeita banco selecionado pelo usuário
  async function checarDivergenciaConta(r) {
    const bancoSelecionado = BANCOS.find(b => b.id === alvoFoto);
    const bancoDetectado = (r.banco_detectado || '').toLowerCase();
    const nomeSelecionado = bancoSelecionado.nome.toLowerCase();
    
    // Detecta divergência (banco da IA não bate com selecionado)
    const houveDivergencia = bancoDetectado && 
      !bancoDetectado.includes(nomeSelecionado) && 
      !nomeSelecionado.includes(bancoDetectado);
    
    if (houveDivergencia) {
      // Mostra aviso pro usuário decidir
      dadosIAPendentes = r;
      document.getElementById('container').innerHTML = `
        <div class="tatu-bubble"><div class="tatu-emoji">🦔</div><div class="tatu-content"><div class="tatu-titulo">Tatu detectou algo</div><div class="tatu-texto">Você escolheu <strong>${bancoSelecionado.nome}</strong>, mas a foto parece ser <strong>${r.banco_detectado}</strong>.</div></div></div>
        
        <div class="aviso-divergencia">
          <div class="aviso-titulo">⚠️ Banco diferente detectado</div>
          <div class="aviso-texto">A IA leu a foto e identificou como <strong>${r.banco_detectado}</strong>, mas você selecionou <strong>${bancoSelecionado.nome}</strong>.<br><br>O que prefere fazer?</div>
        </div>
        
        <div class="form-card">
          <div style="display:flex;flex-direction:column;gap:10px;">
            <button class="btn btn-primary" onclick="usarBancoSelecionado()">
              ✅ Usar ${bancoSelecionado.nome} mesmo (foto pode estar errada)
            </button>
            <button class="btn" style="background:var(--warning-soft);color:var(--warning);border:1px solid var(--warning);" onclick="cancelarFoto()">
              🔄 Cancelar e mandar outra foto
            </button>
          </div>
        </div>
      `;
      document.getElementById('footer-content').innerHTML = '';
      return;
    }
    
    // Sem divergência: processa direto
    await processarContaFinal(r, bancoSelecionado);
  }
  
  window.usarBancoSelecionado = async function() {
    const bancoSelecionado = BANCOS.find(b => b.id === alvoFoto);
    await processarContaFinal(dadosIAPendentes, bancoSelecionado);
    dadosIAPendentes = null;
  };
  
  window.cancelarFoto = function() {
    dadosIAPendentes = null;
    voltarAposFoto();
  };
  
  async function processarContaFinal(r, banco) {
    // SEMPRE usa o banco selecionado pelo usuário
    const dados = {
      user_id: usuario.id,
      nome: banco.nome,
      tipo: r.tipo_conta || 'conta_corrente',
      banco: banco.nome,
      cor: banco.cor,
      icone: r.tipo_conta === 'poupanca' ? '🐷' : r.tipo_conta === 'investimento' ? '📈' : '🏦',
      saldo_inicial: r.saldo_atual || 0,
      padrao: contasAdicionadas.length === 0
    };
    try {
      const { data, error } = await supabase.from('contas').insert(dados).select().single();
      if (error) throw error;
      contasAdicionadas.push(data);
      await darXP(25, 'conta_ia', 'Setup IA: ' + banco.nome);
      toast(`+25 XP ✨ ${banco.nome} cadastrado!`);
      setTimeout(() => {
        bancoIndexAtual++;
        if (bancoIndexAtual >= bancosSelecionados.length) { bancoIndexAtual = 0; proximoPasso(); }
        else renderP4();
      }, 1000);
    } catch (e) { alert('Erro: ' + e.message); renderP4(); }
  }
  
  // 🔥 v3.1 FIX: respeita banco selecionado também no cartão

        <div class="form-card">

  window.usarBancoCartaoSelecionado = async function() {
    const bId = alvoFoto;
    const bancoSelecionado = BANCOS.find(b => b.id === bId);
    await processarFaturaFinal(dadosIAPendentes, bancoSelecionado);
    dadosIAPendentes = null;
  };
  
  async function processarFaturaFinal(r, banco) {
    const qtd = qtdPorBanco[banco.id];
    const nomeBase = qtd === 1 ? banco.nome : `${banco.nome} ${cartaoIdx + 1}`;
    const nome = r.nome_sugerido ? `${banco.nome} (${r.nome_sugerido})` : nomeBase;
    const limite = r.limite_total || 0;
    const fec = r.dia_fechamento || null;
    const ven = r.dia_vencimento || null;
    const valor = r.valor_fatura || 0;
    const atrasada = r.esta_atrasada || false;
    
    cartaoTemp = { bancoId: banco.id, nome, limite, fechamento: fec, vencimento: ven };
    
    if (valor > 0) {
      await salvarCartaoFinal({ valor, paga: false, atrasada });
    } else {
      await salvarCartaoFinal({ valor: 0, paga: true, atrasada: false });
    }
  }
  
  async function processarBoleto(r) {
    const nome = r.nome_sugerido || 'Despesa';
    const cat = r.categoria || 'outro';
    const val = r.valor || 0;
    const dia = r.dia_vencimento || null;
    
    if (val <= 0) {
      alert('⚠️ IA não conseguiu ler o valor do boleto. Tenta manual.');
      renderP7();
      return;
    }
    
    await salvarDespesaNoBanco(nome, cat, val, dia);
  }
  
  async function processarContrato(r) {
    const cred = r.credor || 'Credor';
    const tipo = r.tipo || 'outro';
    const val = r.valor_total || 0;
    
    if (val <= 0) {
      alert('⚠️ IA não conseguiu ler o valor. Tenta manual.');
      renderP8();
      return;
    }
    
    const dv = new Date();
    if (r.data_vencimento_proxima) dv.setTime(new Date(r.data_vencimento_proxima).getTime());
    else dv.setDate(dv.getDate() + 30);
    
    try {
      const { data, error } = await supabase.from('dividas').insert({
        user_id: usuario.id, credor: cred, tipo, descricao: `Dívida ${cred}`,
        valor_original: val, valor_atual: val,
        data_vencimento: dv.toISOString().split('T')[0], data_inicio: new Date().toISOString().split('T')[0],
        status: 'ativa', prioridade: r.esta_atrasada ? 1 : 2,
        juros_mensal: r.juros_mensal || null
      }).select().single();
      if (error) throw error;
      dividasAdicionadas.push(data);
      await darXP(25, 'divida_ia', 'Setup IA: ' + cred);
      toast('+25 XP ✨ Dívida lida!');
      setTimeout(() => renderP8(), 1000);
    } catch (e) { alert('Erro: ' + e.message); renderP8(); }
  }
  
  // ============ UTILS ============
  
  window.formatarValor = function(input) {
    let v = input.value.replace(/\D/g, '');
    if (!v) { input.value = ''; return; }
    v = (parseInt(v) / 100).toFixed(2);
    input.value = Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
  };
  
  window.formatarValorComSinal = function(input) {
    const ehNeg = input.value.trim().startsWith('-');
    let v = input.value.replace(/[^0-9]/g, '');
    if (!v) { input.value = ''; return; }
    v = (parseInt(v) / 100).toFixed(2);
    const formatado = Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
    input.value = (ehNeg ? '-' : '') + formatado;
  };
  
  function valorParaNumero(str) {
    if (!str) return 0;
    const ehNeg = str.trim().startsWith('-');
    const limpo = str.replace(/[^0-9,\.]/g, '').replace(/\./g, '').replace(',', '.');
    const num = Number(limpo) || 0;
    return ehNeg ? -num : num;
  }
  
  function formatarMoeda(v) {
    return (Number(v) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  
  async function darXP(xp, acao, descricao) {
    try {
      await supabase.from('historico_xp').insert({ user_id: usuario.id, acao, xp_ganho: xp, descricao });
      const { data: g } = await supabase.from('gamificacao').select('xp_total').eq('user_id', usuario.id).maybeSingle();
      await supabase.from('gamificacao').update({
        xp_total: (g?.xp_total || 0) + xp,
        ultima_atividade: new Date().toISOString().split('T')[0]
      }).eq('user_id', usuario.id);
    } catch (e) { console.error('XP:', e); }
  }
  
  function toast(texto) {
    const t = document.getElementById('xp-toast');
    t.textContent = texto;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 2500);
  }
