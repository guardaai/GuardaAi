<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>Modo Setup • guardaí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
  
  :root {
    --bg: #0a0a0a;
    --bg-card: #141414;
    --bg-elev: #1c1c1c;
    --bg-input: #181818;
    --border: #252525;
    --border-strong: #353535;
    --brand: #00d97e;
    --brand-hover: #00ba6b;
    --brand-soft: rgba(0, 217, 126, 0.1);
    --danger: #ff4757;
    --danger-soft: rgba(255, 71, 87, 0.1);
    --warning: #ffb800;
    --warning-soft: rgba(255, 184, 0, 0.1);
    --info: #38bdf8;
    --info-soft: rgba(56, 189, 248, 0.1);
    --ia: #a855f7;
    --ia-soft: rgba(168, 85, 247, 0.1);
    --text: #ffffff;
    --text-mute: #a3a3a3;
    --text-faint: #525252;
  }
  
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  input, textarea, select {
    color: #fff !important;
    -webkit-text-fill-color: #fff !important;
    caret-color: var(--brand);
  }
  input:-webkit-autofill, textarea:-webkit-autofill {
    -webkit-box-shadow: 0 0 0 1000px var(--bg-input) inset !important;
    -webkit-text-fill-color: #fff !important;
  }
  
  /* === HEADER === */
  .header {
    padding: 16px 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .header-skip {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mute);
    padding: 8px 14px;
    border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
  }
  
  .header-skip:active { background: var(--bg-card); }
  
  /* === PROGRESS BAR === */
  .progress-wrapper {
    flex: 1;
    height: 6px;
    background: var(--bg-card);
    border-radius: 100px;
    overflow: hidden;
  }
  
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--brand) 0%, var(--brand-hover) 100%);
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
  }
  
  .progress-num {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-mute);
    flex-shrink: 0;
  }
  
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px;
    padding-bottom: 120px;
  }
  
  /* === TATU BUBBLE === */
  .tatu-bubble {
    background: linear-gradient(135deg, var(--ia-soft) 0%, var(--bg-card) 100%);
    border: 1px solid rgba(168, 85, 247, 0.3);
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 20px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: fadeIn 0.4s ease;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .tatu-emoji {
    font-size: 36px;
    flex-shrink: 0;
    line-height: 1;
  }
  
  .tatu-content { flex: 1; min-width: 0; }
  
  .tatu-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--ia);
    margin-bottom: 4px;
  }
  
  .tatu-texto {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
  }
  
  .tatu-texto strong { color: var(--text); font-weight: 700; }
  
  /* === STEP CONTENT === */
  .step-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    line-height: 1.2;
  }
  
  .step-subtitulo {
    font-size: 14px;
    color: var(--text-mute);
    line-height: 1.5;
    margin-bottom: 24px;
  }
  
  /* === BANCOS GRID === */
  .bancos-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  
  .banco-card {
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 14px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  
  .banco-card:active { transform: scale(0.95); }
  
  .banco-card.active {
    background: var(--brand-soft);
    border-color: var(--brand);
  }
  
  .banco-logo {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
  }
  
  .banco-nome {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }
  
  /* === INSTRUCAO CARD (TATU ENSINA) === */
  .instrucao-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
  }
  
  .instrucao-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--brand);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .passo-lista {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  
  .passo-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }
  
  .passo-num {
    background: var(--brand-soft);
    color: var(--brand);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  
  /* === OPÇÕES (manual / IA) === */
  .opcoes-acao {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  
  .opcao-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-height: 90px;
    justify-content: center;
  }
  
  .opcao-btn:active { transform: scale(0.97); }
  
  .opcao-btn.ia {
    background: linear-gradient(135deg, var(--ia-soft) 0%, var(--bg-card) 100%);
    border-color: rgba(168, 85, 247, 0.3);
  }
  
  .opcao-btn-icon { font-size: 28px; }
  
  .opcao-btn-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
  }
  
  .opcao-btn.ia .opcao-btn-titulo { color: var(--ia); }
  
  .opcao-btn-sub {
    font-size: 10px;
    color: var(--text-mute);
    line-height: 1.2;
  }
  
  /* === ITENS JÁ CADASTRADOS === */
  .item-cadastrado {
    background: var(--bg-card);
    border: 1px solid var(--brand);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .item-icone-mini {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  
  .item-info-mini { flex: 1; min-width: 0; }
  
  .item-nome-mini {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .item-valor-mini {
    font-size: 11px;
    color: var(--text-mute);
  }
  
  .item-valor-mini.positivo { color: var(--brand); }
  .item-valor-mini.danger { color: var(--danger); }
  
  .item-check {
    color: var(--brand);
    font-size: 18px;
    font-weight: 700;
  }
  
  /* === FORM CARD === */
  .form-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
  }
  
  .field { margin-bottom: 14px; }
  
  .field:last-child { margin-bottom: 0; }
  
  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-mute);
    margin-bottom: 6px;
    font-weight: 500;
  }
  
  .field input, .field select {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    color: var(--text);
    font-size: 16px;
    font-family: 'Inter', sans-serif;
    min-height: 48px;
  }
  
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--brand);
  }
  
  .valor-input-wrapper {
    display: flex;
    align-items: center;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }
  
  .valor-input-wrapper:focus-within { border-color: var(--brand); }
  
  .valor-prefix {
    color: var(--text-mute);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
    margin-right: 6px;
  }
  
  .valor-input-wrapper input {
    background: transparent;
    border: none;
    flex: 1;
    text-align: right;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 22px;
    padding: 0;
    min-height: 0;
  }
  
  /* === TIPO TABS === */
  .tipo-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 14px;
    background: var(--bg-input);
    padding: 4px;
    border-radius: 12px;
  }
  
  .tipo-tab {
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mute);
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .tipo-tab.active.entrada { background: var(--brand); color: #001a0e; }
  .tipo-tab.active.saida { background: var(--danger); color: white; }
  
  /* === CHOICE BOX (sim/não) === */
  .choice-box {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  
  .choice-btn {
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    color: var(--text);
    min-height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  
  .choice-btn:active { transform: scale(0.96); }
  
  .choice-btn-emoji { font-size: 36px; }
  
  .choice-btn-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
  }
  
  /* === FOOTER BOTÕES === */
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    z-index: 80;
  }
  
  .footer-content {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
  }
  
  .btn {
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 56px;
    flex: 1;
  }
  
  .btn-primary { background: var(--brand); color: #001a0e; }
  .btn-primary:active { background: var(--brand-hover); transform: scale(0.985); }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    background: var(--bg-elev);
    color: var(--text-faint);
  }
  
  .btn-back {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    flex: 0 0 56px;
    min-width: 56px;
  }
  
  .btn-back:active { background: var(--bg-elev); }
  
  /* === MENSAGENS === */
  .msg {
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
    font-weight: 500;
    line-height: 1.4;
  }
  
  .msg.show { display: block; }
  .msg-error { background: var(--danger-soft); border: 1px solid rgba(255, 71, 87, 0.3); color: #ff6b78; }
  .msg-ia { background: var(--ia-soft); border: 1px solid rgba(168, 85, 247, 0.3); color: var(--ia); }
  
  /* === ANÁLISE IA (PASSO FINAL) === */
  .analise-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }
  
  .analise-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }
  
  .situacao-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  
  .situacao-item {
    background: var(--bg-input);
    border-radius: 10px;
    padding: 10px;
  }
  
  .situacao-label {
    font-size: 10px;
    color: var(--text-mute);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  .situacao-valor {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
  }
  
  .nivel-card {
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-hover) 100%);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    color: #001a0e;
    margin-bottom: 16px;
  }
  
  .nivel-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    opacity: 0.8;
    margin-bottom: 4px;
  }
  
  .nivel-numero {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 2px;
  }
  
  .nivel-nome {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }
  
  .diagnostico-texto {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-line;
  }
  
  .alerta-item {
    background: var(--warning-soft);
    border: 1px solid rgba(255, 184, 0, 0.3);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--warning);
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  
  .meta-card {
    background: linear-gradient(135deg, var(--brand-soft) 0%, var(--bg-card) 100%);
    border: 1px solid var(--brand);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
  }
  
  .meta-titulo-card {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--brand);
    margin-bottom: 6px;
  }
  
  .meta-info-row {
    display: flex;
    gap: 10px;
    margin: 10px 0;
  }
  
  .meta-pill {
    background: var(--bg-elev);
    border-radius: 100px;
    padding: 4px 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
  }
  
  .meta-explicacao {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-mute);
  }
  
  /* === LOADING IA === */
  .ia-loading {
    text-align: center;
    padding: 60px 20px;
  }
  
  .ia-spinner {
    width: 60px;
    height: 60px;
    border: 4px solid var(--ia-soft);
    border-top-color: var(--ia);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .ia-loading-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--ia);
    margin-bottom: 6px;
  }
  
  .ia-loading-sub {
    font-size: 13px;
    color: var(--text-mute);
    line-height: 1.5;
  }
  
  .ia-loading-passo {
    font-size: 12px;
    color: var(--text-faint);
    margin-top: 16px;
    font-style: italic;
  }
  
  /* === UPLOAD AREA === */
  .upload-hidden { display: none; }
  
  .loader-circle {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-radius: 50%;
    border-top-color: var(--brand);
    animation: spin 0.8s linear infinite;
    margin: 40px auto;
  }
  
  /* === XP TOAST === */
  .xp-toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--brand);
    color: #001a0e;
    padding: 12px 20px;
    border-radius: 100px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    z-index: 200;
    box-shadow: 0 8px 32px rgba(0, 217, 126, 0.4);
    display: none;
    animation: toastIn 0.4s cubic-bezier(0.34, 1.5, 0.64, 1);
    max-width: 90%;
    text-align: center;
  }
  
  @keyframes toastIn {
    0% { transform: translateX(-50%) translateY(-20px); opacity: 0; }
    100% { transform: translateX(-50%) translateY(0); opacity: 1; }
  }
  
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <button class="header-skip" id="btn-skip" onclick="pularSetup()">Pular agora</button>
  <div class="progress-wrapper">
    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
  </div>
  <div class="progress-num" id="progress-num">1/8</div>
</div>

<div class="container" id="container">
  <div class="loader-circle"></div>
</div>

<div class="footer" id="footer">
  <div class="footer-content" id="footer-content"></div>
</div>

<input type="file" id="input-foto" class="upload-hidden" accept="image/*" onchange="processarFoto(event)">

<div class="xp-toast" id="xp-toast">+10 XP</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  
  const SUPABASE_URL = 'https://gmbsxrxqrxpbgyyvifcd.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_NSOgcu93sTiSreGYi-Ha3g_bqYsAK22';
  const IA_FUNCTION_URL = 'https://gmbsxrxqrxpbgyyvifcd.supabase.co/functions/v1/claude-chat';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
  
  const TOTAL_PASSOS = 8;
  
  // === BANCOS BRASILEIROS ===
  const BANCOS = [
    { id: 'nubank', nome: 'Nubank', cor: '#820AD1', sigla: 'NU' },
    { id: 'itau', nome: 'Itaú', cor: '#EC7000', sigla: 'IT' },
    { id: 'bradesco', nome: 'Bradesco', cor: '#CC092F', sigla: 'BR' },
    { id: 'santander', nome: 'Santander', cor: '#EC0000', sigla: 'SA' },
    { id: 'bb', nome: 'BB', cor: '#FFEF38', sigla: 'BB' },

  window.salvarCartaoManual = async function() {

    const limite = valorParaNumero(document.getElementById('m-cart-limite').value);

    if (!nome) { alert('Digite o nome'); return; }

    const banco = BANCOS.find(b => b.id === bancoId);

    const { data, error } = await supabase.from('contas').insert({

    }).select().single();

      dataVenc.setDate(10);

        descricao: `Fatura do cartão ${nome}`,
        valor_original: fatura,

        data_vencimento: dataVencStr,
        data_inicio: new Date().toISOString().split('T')[0],
        status: 'ativa',
        prioridade: 1,
        conta_id: data.id

          valor: fatura,
          descricao: `Fatura ${nome}`,
          data: dataVencStr,
          tipo: 'saida',
          conta_id: data.id,
          divida_id: divida.id,
          status: 'prevista'
        });
      }

    dividasAdicionadas.push(data);
    await darXP(15, 'divida_setup', 'Setup dívida: ' + credor);
    mostrarToast(`+15 XP 💸 Dívida salva!`);
    
    setTimeout(() => renderPasso7(), 800);
  };
  
  // ============ PASSO 8: ANÁLISE IA ============
  async function renderPasso8() {
    document.getElementById('container').innerHTML = `
      <div class="ia-loading">
        <div class="ia-spinner"></div>
        <div class="ia-loading-titulo">🦔 Tatu está analisando...</div>
        <div class="ia-loading-sub">Olhando todos os seus dados pra montar um plano personalizado</div>
        <div class="ia-loading-passo" id="ia-passo">Calculando situação financeira...</div>
      </div>
    `;
    document.getElementById('footer-content').innerHTML = '';
    
    // Pequenos delays pra dar sensação de processo
    setTimeout(() => { 
      const el = document.getElementById('ia-passo');
      if (el) el.textContent = 'Identificando seu nível financeiro...';
    }, 1500);
    setTimeout(() => { 
      const el = document.getElementById('ia-passo');
      if (el) el.textContent = 'Definindo primeira meta...';
    }, 3500);
    setTimeout(() => { 
      const el = document.getElementById('ia-passo');
      if (el) el.textContent = 'Montando plano de 12 meses...';
    }, 5500);
    
    // Coleta TODOS os dados pra IA analisar
    const dados = {
      contas: contasAdicionadas.map(c => ({ nome: c.nome, tipo: c.tipo, saldo: c.saldo_inicial })),
      cartoes: cartoesAdicionados.map(c => ({ nome: c.nome, limite: c.limite })),
      rendas: rendasAdicionadas.map(r => ({ nome: r.nome, categoria: r.categoria, valor: r.valor })),
      despesas: despesasAdicionadas.map(d => ({ nome: d.nome, categoria: d.categoria, valor: d.valor })),
      dividas: dividasAdicionadas.map(d => ({ credor: d.credor, tipo: d.tipo, valor: d.valor_atual }))
    };
    
    try {
      const resp = await fetch(IA_FUNCTION_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY
        },
        body: JSON.stringify({
          tipo: 'analisar_situacao_financeira',
          dados_financeiros: dados,
          max_tokens: 2500
        })
      });
      
      const data = await resp.json();
      
      if (data.resultado && !data.resultado.erro) {
        analiseIA = data.resultado;
        await salvarAnaliseEFinalizar();
        renderResultadoAnalise();
      } else {
        // Erro: ainda salva o setup mas sem análise IA
        await salvarSetupSemAnalise();
        renderErroAnalise();
      }
    } catch (e) {
      console.error('Erro IA:', e);
      await salvarSetupSemAnalise();
      renderErroAnalise();
    }
  }
  
  async function salvarAnaliseEFinalizar() {
    await supabase.from('perfis').update({
      setup_concluido: true,
      setup_concluido_em: new Date().toISOString(),
      analise_setup: analiseIA
    }).eq('id', usuario.id);
    
    await darXP(100, 'setup_concluido', 'Modo Setup completo!');
  }
  
  async function salvarSetupSemAnalise() {
    await supabase.from('perfis').update({
      setup_concluido: true,
      setup_concluido_em: new Date().toISOString()
    }).eq('id', usuario.id);
    
    await darXP(50, 'setup_concluido_parcial', 'Setup sem análise IA');
  }
  
  function renderResultadoAnalise() {
    const a = analiseIA;
    const s = a.situacao;
    
    let html = `
      <div class="tatu-bubble">
        <div class="tatu-emoji">🎉</div>
        <div class="tatu-content">
          <div class="tatu-titulo">Tatu</div>
          <div class="tatu-texto">
            Analisei tudo! Aqui vai sua <strong>análise personalizada</strong>:
          </div>
        </div>
      </div>
      
      <div class="nivel-card">
        <div class="nivel-label">Seu nível</div>
        <div class="nivel-numero">${s.nivel_recomendado}</div>
        <div class="nivel-nome">${s.nivel_nome}</div>
      </div>
      
      <div class="analise-card">
        <div class="analise-titulo">📊 Sua situação</div>
        <div class="situacao-grid">
          <div class="situacao-item">
            <div class="situacao-label">Renda mensal</div>
            <div class="situacao-valor" style="color:var(--brand);">R$ ${formatarMoeda(s.renda_mensal)}</div>
          </div>
          <div class="situacao-item">
            <div class="situacao-label">Despesa fixa</div>
            <div class="situacao-valor" style="color:var(--warning);">R$ ${formatarMoeda(s.despesa_fixa_mensal)}</div>
          </div>
          <div class="situacao-item">
            <div class="situacao-label">Patrimônio</div>
            <div class="situacao-valor" style="color:${s.patrimonio_liquido >= 0 ? 'var(--brand)' : 'var(--danger)'};">R$ ${formatarMoeda(s.patrimonio_liquido)}</div>
          </div>
          <div class="situacao-item">
            <div class="situacao-label">Total dívidas</div>
            <div class="situacao-valor" style="color:${s.total_dividas > 0 ? 'var(--danger)' : 'var(--brand)'};">R$ ${formatarMoeda(s.total_dividas)}</div>
          </div>
        </div>
      </div>
      
      <div class="analise-card">
        <div class="analise-titulo">🦔 Diagnóstico do Tatu</div>
        <div class="diagnostico-texto">${a.diagnostico}</div>
      </div>
      
      ${a.alertas && a.alertas.length > 0 ? `
        <div class="analise-card">
          <div class="analise-titulo">⚠️ Pontos de atenção</div>
          ${a.alertas.map(alerta => `
            <div class="alerta-item">
              <span style="flex-shrink:0;">⚠️</span>
              <span>${alerta}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
      
      ${a.primeira_meta ? `
        <div class="meta-card">
          <div class="meta-titulo-card">🎯 Sua primeira meta</div>
          <div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px;">${a.primeira_meta.titulo}</div>
          <div class="meta-info-row">
            <span class="meta-pill">💰 R$ ${formatarMoeda(a.primeira_meta.valor_alvo)}</span>
            <span class="meta-pill">📅 ${a.primeira_meta.prazo_meses} meses</span>
          </div>
          <div class="meta-explicacao">${a.primeira_meta.explicacao}</div>
        </div>
      ` : ''}
      
      ${a.mensagem_motivacional ? `
        <div class="tatu-bubble">
          <div class="tatu-emoji">💚</div>
          <div class="tatu-content">
            <div class="tatu-titulo">Mensagem do Tatu</div>
            <div class="tatu-texto">${a.mensagem_motivacional}</div>
          </div>
        </div>
      ` : ''}
    `;
    
    document.getElementById('container').innerHTML = html;
    document.getElementById('footer-content').innerHTML = `
      <button class="btn btn-primary" onclick="irParaHome()">🚀 Bora começar minha jornada!</button>
    `;
    
    mostrarToast('+100 XP 🎉 Setup completo!');
  }
  
  function renderErroAnalise() {
    document.getElementById('container').innerHTML = `
      <div class="tatu-bubble">
        <div class="tatu-emoji">🦔</div>
        <div class="tatu-content">
          <div class="tatu-titulo">Tatu</div>
          <div class="tatu-texto">
            Setup completo! Tive um problema gerando a análise agora, mas teus dados estão salvos. Você pode fazer a análise depois pelo chat.
          </div>
        </div>
      </div>
      
      <div class="form-card" style="text-align:center;padding:30px 20px;">
        <div style="font-size:48px;margin-bottom:12px;">✅</div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px;">Tudo cadastrado!</div>
        <div style="font-size:13px;color:var(--text-mute);">${contasAdicionadas.length} contas, ${cartoesAdicionados.length} cartões, ${rendasAdicionadas.length} rendas, ${despesasAdicionadas.length} despesas, ${dividasAdicionadas.length} dívidas</div>
      </div>
    `;
    
    document.getElementById('footer-content').innerHTML = `
      <button class="btn btn-primary" onclick="irParaHome()">🚀 Ir para o app</button>
    `;
  }
  
  window.irParaHome = function() {
    window.location.href = 'home.html?v=3';
  };
  
  // ============ FOTO IA ============
  window.processarFoto = async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    document.getElementById('container').innerHTML = `
      <div class="ia-loading">
        <div class="ia-spinner"></div>
        <div class="ia-loading-titulo">🤖 IA lendo a foto...</div>
        <div class="ia-loading-sub">Aguarda uns segundos</div>
      </div>
    `;
    
    const base64 = await fileToBase64(file);
    
    try {
      const tipoFn = modoFoto === 'conta' ? 'analisar_conta' : modoFoto === 'cartao' ? 'analisar_conta' : 'analisar_compromisso';
      const hint = modoFoto === 'cartao' ? 'cartao_credito' : (alvoFotoAtual ? 'conta_corrente' : null);
      
      const resp = await fetch(IA_FUNCTION_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY
        },
        body: JSON.stringify({
          tipo: tipoFn,
          imagem_base64: base64,
          hint_tipo: hint,
          max_tokens: 1500
        })
      });
      
      const data = await resp.json();
      
      if (data.resultado && !data.resultado.erro) {
        if (modoFoto === 'conta') await processarResultadoContaIA(data.resultado);
        else if (modoFoto === 'cartao') await processarResultadoCartaoIA(data.resultado);
      } else {
        alert('⚠️ IA não conseguiu processar: ' + (data.resultado?.erro || 'erro desconhecido'));
        // Volta pro passo
        if (modoFoto === 'conta') renderPasso3();
        else if (modoFoto === 'cartao') renderPasso4();
      }
    } catch (err) {
      console.error(err);
      alert('Erro: ' + err.message);
      if (modoFoto === 'conta') renderPasso3();
      else if (modoFoto === 'cartao') renderPasso4();
    }
  };
  
  async function processarResultadoContaIA(r) {
    const banco = BANCOS.find(b => b.id === alvoFotoAtual);
    
    const dados = {
      user_id: usuario.id,
      nome: r.nome_sugerido || banco.nome,
      tipo: r.tipo_conta || 'conta_corrente',
      banco: banco.nome,
      cor: banco.cor,
      icone: r.tipo_conta === 'poupanca' ? '🐷' : r.tipo_conta === 'investimento' ? '📈' : '🏦',
      saldo_inicial: r.saldo_atual || 0,
      padrao: contasAdicionadas.length === 0
    };
    
    const { data, error } = await supabase.from('contas').insert(dados).select().single();
    
    if (error) {
      alert('Erro salvando: ' + error.message);
      renderPasso3();
      return;
    }
    
    contasAdicionadas.push(data);
    await darXP(25, 'conta_via_ia_setup', 'Setup IA: ' + banco.nome);
    mostrarToast('+25 XP ✨ IA cadastrou!');
    
    setTimeout(() => {
      bancoIndexAtual++;
      if (bancoIndexAtual >= bancosSelecionados.length) {
        bancoIndexAtual = 0;
        proximoPasso();
      } else {
        renderPasso3();
      }
    }, 1000);
  }
  
  async function processarResultadoCartaoIA(r) {
    const nome = r.nome_sugerido || (r.banco_detectado ? r.banco_detectado + ' Cartão' : 'Cartão');
    const banco = BANCOS.find(b => b.nome.toLowerCase() === (r.banco_detectado || '').toLowerCase());
    const cor = banco ? banco.cor : (r.cor_sugerida || '#820AD1');
    
    const { data, error } = await supabase.from('contas').insert({
      user_id: usuario.id,
      nome,
      tipo: 'cartao_credito',
      banco: banco ? banco.nome : r.banco_detectado,
      cor,
      icone: '💳',
      limite: r.limite_total || 0,
      saldo_inicial: 0,
      dia_fechamento: r.dia_fechamento,
      dia_vencimento: r.dia_vencimento
    }).select().single();
    
    if (error) {
      alert('Erro: ' + error.message);
      renderPasso4();
      return;
    }
    
    cartoesAdicionados.push(data);
    
    // Se tem fatura, cria dívida + prevista
    if (r.tem_divida && r.valor_divida > 0) {
      const dataVenc = r.dia_vencimento ? calcularProxVenc(r.dia_vencimento) : (new Date(Date.now() + 30*24*60*60*1000)).toISOString().split('T')[0];
      
      const { data: divida } = await supabase.from('dividas').insert({
        user_id: usuario.id,
        credor: banco ? banco.nome : nome,
        tipo: 'cartao',
        descricao: `Fatura do cartão ${nome}`,
        valor_original: r.valor_divida,
        valor_atual: r.valor_divida,
        data_vencimento: dataVenc,
        data_inicio: new Date().toISOString().split('T')[0],
        status: 'ativa',
        prioridade: 1,
        conta_id: data.id
      }).select().single();
      
      if (divida) {
        await supabase.from('transacoes').insert({
          user_id: usuario.id,
          valor: r.valor_divida,
          descricao: `Fatura ${nome}`,
          data: dataVenc,
          tipo: 'saida',
          conta_id: data.id,
          divida_id: divida.id,
          status: 'prevista'
        });
      }
    }
    
    await darXP(30, 'cartao_via_ia_setup', 'Setup IA cartão: ' + nome);
    mostrarToast('+30 XP ✨ Cartão + fatura!');
    
    setTimeout(() => renderPasso4(), 1000);
  }
  
  function calcularProxVenc(dia) {
    const hoje = new Date();
    let d = new Date(hoje.getFullYear(), hoje.getMonth(), dia);
    if (d < hoje) d = new Date(hoje.getFullYear(), hoje.getMonth() + 1, dia);
    return d.toISOString().split('T')[0];
  }
  
  // ============ HELPERS ============
  function renderFooterPadrao(temVoltar, podeAvancar) {
    let html = '';
    if (temVoltar) {
      html += `<button class="btn btn-back" onclick="voltarPasso()">‹</button>`;
    }
    html += `<button class="btn btn-primary" ${podeAvancar ? '' : 'disabled'} onclick="proximoPasso()">Continuar →</button>`;
    document.getElementById('footer-content').innerHTML = html;
  }
  
  window.formatarValor = function(input) {
    let v = input.value.replace(/\D/g, '');
    if (!v) { input.value = ''; return; }
    v = (parseInt(v) / 100).toFixed(2);
    input.value = Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
  };
  
  function valorParaNumero(str) {
    if (!str) return 0;
    return Number(str.replace(/\./g, '').replace(',', '.')) || 0;
  }
  
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  
  function formatarMoeda(v) {
    return (Number(v) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  
  async function darXP(xp, acao, descricao) {
    await supabase.from('historico_xp').insert({ user_id: usuario.id, acao, xp_ganho: xp, descricao });
    const { data: g } = await supabase.from('gamificacao').select('xp_total').eq('user_id', usuario.id).maybeSingle();
    await supabase.from('gamificacao').update({
      xp_total: (g?.xp_total || 0) + xp,
      ultima_atividade: new Date().toISOString().split('T')[0]
    }).eq('user_id', usuario.id);
  }
  
  function mostrarToast(texto) {
    const t = document.getElementById('xp-toast');
    t.textContent = texto;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 2500);
  }
</script>
