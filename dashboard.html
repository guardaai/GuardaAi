<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00d97e">
<title>Dashboard • guardaí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{--bg:#0a0a0a;--bg-card:#141414;--bg-elev:#1c1c1c;--bg-input:#181818;--border:#252525;--brand:#00d97e;--brand-hover:#00ba6b;--brand-soft:rgba(0,217,126,0.1);--danger:#ff4757;--danger-soft:rgba(255,71,87,0.1);--warning:#ffb800;--warning-soft:rgba(255,184,0,0.1);--info:#38bdf8;--info-soft:rgba(56,189,248,0.1);--ia:#a855f7;--ia-soft:rgba(168,85,247,0.1);--text:#fff;--text-mute:#a3a3a3;--text-faint:#525252}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
body{padding-bottom:30px;padding-top:env(safe-area-inset-top)}
input,textarea,select{color:#fff!important;-webkit-text-fill-color:#fff!important}

.header{padding:16px 20px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px}
.header-back{width:36px;height:36px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.header-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;flex:1}
.header-icon{font-size:22px;flex-shrink:0;margin-right:4px}

.container{max-width:480px;margin:0 auto;padding:16px 20px}

.periodo-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.periodo-tabs::-webkit-scrollbar{display:none}
.periodo-pill{background:var(--bg-card);border:1px solid var(--border);border-radius:100px;padding:8px 14px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;color:var(--text-mute);white-space:nowrap}
.periodo-pill.active{background:var(--brand-soft);border-color:var(--brand);color:var(--brand)}

/* CARD DESTAQUE */
.card-destaque{background:linear-gradient(135deg,var(--brand) 0%,var(--brand-hover) 100%);border-radius:20px;padding:20px;margin-bottom:16px;color:#001a0e;position:relative;overflow:hidden}
.card-destaque::before{content:'';position:absolute;top:-50%;right:-10%;width:200px;height:200px;background:radial-gradient(circle,rgba(255,255,255,0.15) 0%,transparent 70%);pointer-events:none}
.destaque-label{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;opacity:0.7;margin-bottom:4px;position:relative}
.destaque-valor{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;letter-spacing:-0.02em;margin-bottom:8px;position:relative}
.destaque-trend{display:flex;align-items:center;gap:6px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;position:relative}
.destaque-trend.up{color:#001a0e}
.destaque-trend.down{color:#7d0d0d}

/* GRID DE CARDS */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.mini-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px}
.mini-card-label{font-size:10px;color:var(--text-mute);text-transform:uppercase;letter-spacing:0.05em;font-weight:600;margin-bottom:4px}
.mini-card-valor{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700}
.mini-card-valor.brand{color:var(--brand)}
.mini-card-valor.danger{color:var(--danger)}
.mini-card-valor.warning{color:var(--warning)}
.mini-card-sub{font-size:10px;color:var(--text-faint);margin-top:2px}

/* GRÁFICOS */
.grafico-card{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:16px}
.grafico-titulo{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.grafico-titulo-txt{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700}
.grafico-titulo-sub{font-size:11px;color:var(--text-mute)}
.grafico-canvas-wrap{position:relative;height:220px}
.grafico-canvas-wrap.pizza{height:240px}
.grafico-canvas-wrap.compacto{height:180px}

/* CATEGORIAS */
.cats-lista{display:flex;flex-direction:column;gap:10px}
.cat-row{display:flex;align-items:center;gap:12px}
.cat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cat-info{flex:1;min-width:0}
.cat-nome{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.cat-valor{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--danger)}
.cat-bar{height:6px;background:var(--bg-input);border-radius:100px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:100px;transition:width 0.6s cubic-bezier(0.34,1.2,0.64,1)}

/* SAÚDE FINANCEIRA */
.saude-card{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:16px}
.saude-titulo{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.saude-medidor{position:relative;height:140px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.saude-info{text-align:center}
.saude-status{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px}
.saude-status.bom{color:var(--brand)}
.saude-status.atencao{color:var(--warning)}
.saude-status.critico{color:var(--danger)}
.saude-desc{font-size:12px;color:var(--text-mute);line-height:1.5}

/* TATU INSIGHT */
.tatu-card{background:linear-gradient(135deg,var(--ia-soft) 0%,var(--bg-card) 100%);border:1px solid rgba(168,85,247,0.3);border-radius:16px;padding:16px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start}
.tatu-emoji{font-size:32px;flex-shrink:0}
.tatu-content{flex:1}
.tatu-titulo{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--ia);margin-bottom:6px}
.tatu-texto{font-size:13px;line-height:1.5;color:var(--text)}
.tatu-texto strong{color:var(--brand)}

/* EMPTY STATE */
.empty{text-align:center;padding:30px 20px;color:var(--text-mute);font-size:13px}
.empty-emoji{font-size:36px;margin-bottom:8px;opacity:0.5}

.loader-circle{width:32px;height:32px;border:3px solid var(--border);border-radius:50%;border-top-color:var(--brand);animation:spin 0.8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

.secao-titulo{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--text-mute);font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin:18px 4px 10px}
</style>
</head>
<body>

<div class="header">
<button class="header-back" onclick="window.location.href='home.html?v='+Date.now()">‹</button>
<div class="header-title">Dashboard</div>
<div class="header-icon">📊</div>
</div>

<div class="container" id="container">
<div class="loader-circle"></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL='https://gmbsxrxqrxpbgyyvifcd.supabase.co';
const SUPABASE_KEY='sb_publishable_NSOgcu93sTiSreGYi-Ha3g_bqYsAK22';
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);

const CATEGORIAS={alimentacao:{e:'🍔',n:'Alimentação',c:'#ff6b35'},transporte:{e:'🚗',n:'Transporte',c:'#3b82f6'},moradia:{e:'🏠',n:'Moradia',c:'#00d97e'},lazer:{e:'🎮',n:'Lazer',c:'#8b5cf6'},saude:{e:'🏥',n:'Saúde',c:'#ef4444'},educacao:{e:'🎓',n:'Educação',c:'#06b6d4'},vestuario:{e:'👕',n:'Vestuário',c:'#ec4899'},compras:{e:'🛒',n:'Compras',c:'#f59e0b'},servicos:{e:'🛠️',n:'Serviços',c:'#14b8a6'},salario:{e:'💼',n:'Salário',c:'#00d97e'},transferencia:{e:'🔁',n:'Transferência',c:'#a855f7'},outro:{e:'📌',n:'Outro',c:'#94a3b8'},aluguel:{e:'🏠',n:'Aluguel',c:'#00d97e'},condominio:{e:'🏢',n:'Condomínio',c:'#14b8a6'},luz:{e:'💡',n:'Luz',c:'#ffb800'},agua:{e:'💧',n:'Água',c:'#38bdf8'},gas:{e:'🔥',n:'Gás',c:'#ff6b35'},internet:{e:'🌐',n:'Internet',c:'#a855f7'},telefone:{e:'📱',n:'Telefone',c:'#a855f7'},streaming:{e:'🎬',n:'Streaming',c:'#8b5cf6'},academia:{e:'💪',n:'Academia',c:'#f59e0b'},plano_saude:{e:'🏥',n:'Plano saúde',c:'#ef4444'},escola:{e:'🎓',n:'Escola',c:'#3b82f6'},seguro:{e:'🛡️',n:'Seguro',c:'#6366f1'},iptu:{e:'🏛',n:'IPTU',c:'#f59e0b'},ipva:{e:'🚗',n:'IPVA',c:'#f59e0b'},combustivel:{e:'⛽',n:'Combustível',c:'#ff6b35'},assinatura:{e:'📺',n:'Assinatura',c:'#8b5cf6'}};

let usuario;
let periodoAtual='mes';
let dadosCache={};

(async()=>{
  const{data:{session}}=await supabase.auth.getSession();
  if(!session){window.location.href='index.html?v='+Date.now();return}
  usuario=session.user;
  await renderDashboard();
})();

function calcularPeriodo(p){
  const hoje=new Date();
  const fim=hoje.toISOString().split('T')[0];
  let inicio;
  if(p==='mes'){
    inicio=new Date(hoje.getFullYear(),hoje.getMonth(),1).toISOString().split('T')[0];
  }else if(p==='mes_passado'){
    inicio=new Date(hoje.getFullYear(),hoje.getMonth()-1,1).toISOString().split('T')[0];
    return{inicio,fim:new Date(hoje.getFullYear(),hoje.getMonth(),0).toISOString().split('T')[0]};
  }else if(p==='3m'){
    inicio=new Date(hoje.getFullYear(),hoje.getMonth()-3,1).toISOString().split('T')[0];
  }else if(p==='6m'){
    inicio=new Date(hoje.getFullYear(),hoje.getMonth()-6,1).toISOString().split('T')[0];
  }else if(p==='ano'){
    inicio=new Date(hoje.getFullYear(),0,1).toISOString().split('T')[0];
  }else{
    inicio='2020-01-01';
  }
  return{inicio,fim};
}

async function carregarDados(){
  const{inicio,fim}=calcularPeriodo(periodoAtual);
  
  const[contas,rendas,despesas,dividas,trans,trans6m]=await Promise.all([
    supabase.from('contas').select('*').eq('user_id',usuario.id).eq('ativa',true),
    supabase.from('rendas').select('*').eq('user_id',usuario.id),
    supabase.from('compromissos').select('*').eq('user_id',usuario.id),
    supabase.from('dividas').select('*').eq('user_id',usuario.id).eq('status','ativa'),
    supabase.from('transacoes').select('*').eq('user_id',usuario.id).gte('data',inicio).lte('data',fim).order('data'),
    supabase.from('transacoes').select('valor,tipo,data,status').eq('user_id',usuario.id).gte('data',new Date(new Date().getFullYear(),new Date().getMonth()-5,1).toISOString().split('T')[0]).eq('status','realizada')
  ]);
  
  return{
    contas:contas.data||[],
    rendas:rendas.data||[],
    despesas:despesas.data||[],
    dividas:dividas.data||[],
    trans:trans.data||[],
    trans6m:trans6m.data||[]
  };
}

async function renderDashboard(){
  const d=await carregarDados();
  
  // Calculos
  const realizadas=d.trans.filter(t=>(t.status||'realizada')==='realizada');
  const entradasReal=realizadas.filter(t=>t.tipo==='entrada').reduce((a,t)=>a+Number(t.valor),0);
  const saidasReal=realizadas.filter(t=>t.tipo==='saida').reduce((a,t)=>a+Number(t.valor),0);
  const saldoReal=entradasReal-saidasReal;
  
  // Patrimônio total (contas + cartões debt)
  const contasReais=d.contas.filter(c=>c.tipo!=='cartao_credito');
  let patrimonio=contasReais.reduce((a,c)=>a+Number(c.saldo_inicial||0),0);
  // Aplica transacoes nas contas
  const allTrans=d.trans6m.filter(t=>t.conta_id);
  allTrans.forEach(t=>{
    if(t.tipo==='entrada')patrimonio+=Number(t.valor);
    else patrimonio-=Number(t.valor);
  });
  const totalDividas=d.dividas.reduce((a,x)=>a+Number(x.valor_atual||0),0);
  const patrimonioLiquido=patrimonio-totalDividas;
  
  // Receitas mensais
  const rendaMensal=d.rendas.reduce((a,r)=>a+Number(r.valor||0),0);
  const despesaFixa=d.despesas.reduce((a,r)=>a+Number(r.valor||0),0);
  const sobraMes=rendaMensal-despesaFixa;
  
  // Mês passado pra comparação
  const{inicio:iniMP,fim:fimMP}=calcularPeriodo('mes_passado');
  const transMP=await supabase.from('transacoes').select('valor,tipo,status').eq('user_id',usuario.id).gte('data',iniMP).lte('data',fimMP);
  const transMPReal=(transMP.data||[]).filter(t=>(t.status||'realizada')==='realizada');
  const entradasMP=transMPReal.filter(t=>t.tipo==='entrada').reduce((a,t)=>a+Number(t.valor),0);
  const saidasMP=transMPReal.filter(t=>t.tipo==='saida').reduce((a,t)=>a+Number(t.valor),0);
  
  // % comprometido com fixas+dívidas
  const pctComprometido=rendaMensal>0?Math.min(100,Math.round(((despesaFixa+(totalDividas/12))/rendaMensal)*100)):0;
  
  // Gastos por categoria
  const gastosPorCat={};
  realizadas.filter(t=>t.tipo==='saida').forEach(t=>{
    const c=t.categoria||'outro';
    if(!gastosPorCat[c])gastosPorCat[c]={valor:0,n:0};
    gastosPorCat[c].valor+=Number(t.valor);
    gastosPorCat[c].n++;
  });
  const topCats=Object.entries(gastosPorCat).map(([k,v])=>({k,...v})).sort((a,b)=>b.valor-a.valor).slice(0,5);
  
  // Evolução 6 meses
  const meses6=[];
  for(let i=5;i>=0;i--){
    const d=new Date();
    d.setMonth(d.getMonth()-i);
    const mIni=new Date(d.getFullYear(),d.getMonth(),1).toISOString().split('T')[0];
    const mFim=new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().split('T')[0];
    const mTrans=d.trans6m?.filter(t=>t.data>=mIni&&t.data<=mFim)||[];
    meses6.push({
      label:d.toLocaleDateString('pt-BR',{month:'short'}),
      mIni,mFim,
      entradas:mTrans.filter(t=>t.tipo==='entrada').reduce((a,t)=>a+Number(t.valor),0),
      saidas:mTrans.filter(t=>t.tipo==='saida').reduce((a,t)=>a+Number(t.valor),0)
    });
  }
  // Refaz com dados reais 6m
  meses6.forEach(m=>{
    const mTrans=d.trans6m.filter(t=>t.data>=m.mIni&&t.data<=m.mFim);
    m.entradas=mTrans.filter(t=>t.tipo==='entrada').reduce((a,t)=>a+Number(t.valor),0);
    m.saidas=mTrans.filter(t=>t.tipo==='saida').reduce((a,t)=>a+Number(t.valor),0);
    m.saldo=m.entradas-m.saidas;
  });
  
  // Patrimônio evolução (saldo acumulado)
  let patrimAcum=patrimonio-meses6.reduce((a,m)=>a+m.saldo,0);
  const patrimEvol=meses6.map(m=>{
    patrimAcum+=m.saldo;
    return patrimAcum;
  });
  
  // Trends
  const trendEntrada=entradasMP>0?((entradasReal-entradasMP)/entradasMP)*100:0;
  const trendSaida=saidasMP>0?((saidasReal-saidasMP)/saidasMP)*100:0;
  
  // Saúde financeira
  let saudeStatus,saudeDesc,saudeCor;
  if(pctComprometido<=50&&totalDividas===0){saudeStatus='Excelente';saudeDesc='Você tem folga. Hora de investir!';saudeCor='bom';}
  else if(pctComprometido<=70&&totalDividas<rendaMensal*3){saudeStatus='Boa';saudeDesc='Equilíbrio razoável. Cuide das dívidas.';saudeCor='bom';}
  else if(pctComprometido<=90){saudeStatus='Atenção';saudeDesc='Compromissos altos. Revise gastos fixos.';saudeCor='atencao';}
  else{saudeStatus='Crítico';saudeDesc='Comprometido demais. Negocie dívidas urgente!';saudeCor='critico';}
  
  const periodoLabels={mes:'Esse mês',mes_passado:'Mês passado','3m':'3 meses','6m':'6 meses',ano:'Esse ano',tudo:'Todo período'};
  
  // Insight Tatu
  let insight='';
  if(totalDividas>rendaMensal*6)insight=`Suas dívidas (<strong>R$ ${fm(totalDividas)}</strong>) são <strong>${(totalDividas/rendaMensal).toFixed(1)}x</strong> sua renda. Foco em negociar!`;
  else if(saldoReal<0)insight=`<strong>Negativo de R$ ${fm(Math.abs(saldoReal))}</strong> nesse período. Vamos revisar onde tá indo o dinheiro?`;
  else if(topCats[0]&&topCats[0].valor>rendaMensal*0.3)insight=`Maior gasto: <strong>${CATEGORIAS[topCats[0].k]?.n||topCats[0].k}</strong> (R$ ${fm(topCats[0].valor)}). Será que dá pra reduzir?`;
  else if(patrimonioLiquido>0&&totalDividas===0)insight=`Você tá com <strong>+R$ ${fm(patrimonioLiquido)}</strong> de patrimônio líquido. Tá no caminho! 🚀`;
  else insight=`Mantém o ritmo! Seus números tão sob controle.`;
  
  const html=`
    <div class="periodo-tabs">
      <div class="periodo-pill ${periodoAtual==='mes'?'active':''}" onclick="trocarPeriodo('mes')">Mês atual</div>
      <div class="periodo-pill ${periodoAtual==='mes_passado'?'active':''}" onclick="trocarPeriodo('mes_passado')">Mês passado</div>
      <div class="periodo-pill ${periodoAtual==='3m'?'active':''}" onclick="trocarPeriodo('3m')">3 meses</div>
      <div class="periodo-pill ${periodoAtual==='6m'?'active':''}" onclick="trocarPeriodo('6m')">6 meses</div>
      <div class="periodo-pill ${periodoAtual==='ano'?'active':''}" onclick="trocarPeriodo('ano')">Esse ano</div>
    </div>
    
    <div class="card-destaque">
      <div class="destaque-label">💎 Patrimônio Líquido</div>
      <div class="destaque-valor">R$ ${fm(patrimonioLiquido)}</div>
      <div class="destaque-trend ${patrimonioLiquido>=0?'up':'down'}">
        ${totalDividas>0?`📊 R$ ${fm(patrimonio)} bruto • R$ ${fm(totalDividas)} dívidas`:'✨ Sem dívidas!'}
      </div>
    </div>
    
    <div class="cards-grid">
      <div class="mini-card">
        <div class="mini-card-label">↓ Entradas (${periodoLabels[periodoAtual]})</div>
        <div class="mini-card-valor brand">R$ ${fm(entradasReal)}</div>
        ${periodoAtual==='mes'&&entradasMP>0?`<div class="mini-card-sub" style="color:${trendEntrada>=0?'var(--brand)':'var(--danger)'}">${trendEntrada>=0?'▲':'▼'} ${Math.abs(trendEntrada).toFixed(0)}% vs mês passado</div>`:''}
      </div>
      <div class="mini-card">
        <div class="mini-card-label">↑ Saídas (${periodoLabels[periodoAtual]})</div>
        <div class="mini-card-valor danger">R$ ${fm(saidasReal)}</div>
        ${periodoAtual==='mes'&&saidasMP>0?`<div class="mini-card-sub" style="color:${trendSaida<=0?'var(--brand)':'var(--danger)'}">${trendSaida>=0?'▲':'▼'} ${Math.abs(trendSaida).toFixed(0)}% vs mês passado</div>`:''}
      </div>
      <div class="mini-card">
        <div class="mini-card-label">📥 Renda fixa/mês</div>
        <div class="mini-card-valor brand">R$ ${fm(rendaMensal)}</div>
        <div class="mini-card-sub">${d.rendas.length} renda${d.rendas.length===1?'':'s'}</div>
      </div>
      <div class="mini-card">
        <div class="mini-card-label">📤 Fixas/mês</div>
        <div class="mini-card-valor warning">R$ ${fm(despesaFixa)}</div>
        <div class="mini-card-sub">${d.despesas.length} despesa${d.despesas.length===1?'':'s'}</div>
      </div>
    </div>
    
    <div class="saude-card">
      <div class="saude-titulo">🩺 Saúde Financeira</div>
      <div class="saude-medidor">
        <canvas id="gauge-saude"></canvas>
      </div>
      <div class="saude-info">
        <div class="saude-status ${saudeCor}">${saudeStatus}</div>
        <div class="saude-desc">${saudeDesc}</div>
      </div>
    </div>
    
    <div class="tatu-card">
      <div class="tatu-emoji">🦔</div>
      <div class="tatu-content">
        <div class="tatu-titulo">Tatu observou...</div>
        <div class="tatu-texto">${insight}</div>
      </div>
    </div>
    
    <div class="grafico-card">
      <div class="grafico-titulo">
        <div>
          <div class="grafico-titulo-txt">📈 Evolução do Patrimônio</div>
          <div class="grafico-titulo-sub">Últimos 6 meses</div>
        </div>
      </div>
      <div class="grafico-canvas-wrap">
        <canvas id="g-patrimonio"></canvas>
      </div>
    </div>
    
    <div class="grafico-card">
      <div class="grafico-titulo">
        <div>
          <div class="grafico-titulo-txt">📊 Receita vs Despesa</div>
          <div class="grafico-titulo-sub">Comparativo 6 meses</div>
        </div>
      </div>
      <div class="grafico-canvas-wrap">
        <canvas id="g-receita-despesa"></canvas>
      </div>
    </div>
    
    ${topCats.length>0?`
    <div class="grafico-card">
      <div class="grafico-titulo">
        <div>
          <div class="grafico-titulo-txt">🥧 Onde tá indo seu dinheiro</div>
          <div class="grafico-titulo-sub">${periodoLabels[periodoAtual]}</div>
        </div>
      </div>
      <div class="grafico-canvas-wrap pizza">
        <canvas id="g-pizza"></canvas>
      </div>
    </div>
    
    <div class="grafico-card">
      <div class="grafico-titulo">
        <div>
          <div class="grafico-titulo-txt">🏆 Top 5 Categorias</div>
          <div class="grafico-titulo-sub">${periodoLabels[periodoAtual]}</div>
        </div>
      </div>
      <div class="cats-lista">
        ${topCats.map(c=>{
          const cat=CATEGORIAS[c.k]||{e:'📌',n:c.k,c:'#94a3b8'};
          const pct=saidasReal>0?(c.valor/saidasReal)*100:0;
          return`<div class="cat-row">
            <div class="cat-icon" style="background:${cat.c}25;color:${cat.c}">${cat.e}</div>
            <div class="cat-info">
              <div class="cat-nome">
                <span>${cat.n} <span style="color:var(--text-faint);font-size:11px;">• ${c.n} ${c.n===1?'transação':'transações'}</span></span>
                <span class="cat-valor">R$ ${fm(c.valor)}</span>
              </div>
              <div class="cat-bar">
                <div class="cat-bar-fill" style="width:${pct}%;background:${cat.c}"></div>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
    `:`<div class="grafico-card"><div class="empty"><div class="empty-emoji">📊</div>Sem gastos no período pra mostrar.<br>Cadastre transações na tela "Transações".</div></div>`}
  `;
  
  document.getElementById('container').innerHTML=html;
  
  // Desenha gráficos
  setTimeout(()=>{
    desenharGaugeSaude(pctComprometido,saudeCor);
    desenharPatrimonio(meses6,patrimEvol);
    desenharReceitaDespesa(meses6);
    if(topCats.length>0)desenharPizza(topCats);
  },100);
}

window.trocarPeriodo=function(p){
  periodoAtual=p;
  document.getElementById('container').innerHTML='<div class="loader-circle"></div>';
  renderDashboard();
};

function desenharGaugeSaude(pct,cor){
  const ctx=document.getElementById('gauge-saude');
  if(!ctx)return;
  const cores={bom:'#00d97e',atencao:'#ffb800',critico:'#ff4757'};
  new Chart(ctx,{
    type:'doughnut',
    data:{
      datasets:[{
        data:[pct,100-pct],
        backgroundColor:[cores[cor]||'#00d97e','#252525'],
        borderWidth:0,
        circumference:180,
        rotation:270
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      cutout:'75%',
      plugins:{legend:{display:false},tooltip:{enabled:false}}
    },
    plugins:[{
      id:'centerText',
      afterDraw(chart){
        const{ctx,chartArea:{width,height}}=chart;
        ctx.save();
        ctx.font='bold 32px Space Grotesk';
        ctx.fillStyle=cores[cor]||'#00d97e';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText(`${pct}%`,width/2,height*0.75);
        ctx.font='600 10px Inter';
        ctx.fillStyle='#a3a3a3';
        ctx.fillText('COMPROMETIDO',width/2,height*0.95);
        ctx.restore();
      }
    }]
  });
}

function desenharPatrimonio(meses,evol){
  const ctx=document.getElementById('g-patrimonio');
  if(!ctx)return;
  const labels=meses.map(m=>m.label);
  new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[{
        label:'Patrimônio',
        data:evol,
        borderColor:'#00d97e',
        backgroundColor:(ctx)=>{
          const chart=ctx.chart;
          const{ctx:c,chartArea}=chart;
          if(!chartArea)return null;
          const grad=c.createLinearGradient(0,chartArea.top,0,chartArea.bottom);
          grad.addColorStop(0,'rgba(0,217,126,0.4)');
          grad.addColorStop(1,'rgba(0,217,126,0)');
          return grad;
        },
        borderWidth:3,
        tension:0.4,
        fill:true,
        pointBackgroundColor:'#00d97e',
        pointBorderColor:'#0a0a0a',
        pointBorderWidth:2,
        pointRadius:5,
        pointHoverRadius:7
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#141414',
          titleColor:'#fff',
          bodyColor:'#00d97e',
          padding:12,
          borderColor:'#252525',
          borderWidth:1,
          callbacks:{label:(c)=>'R$ '+fm(c.parsed.y)}
        }
      },
      scales:{
        y:{
          ticks:{color:'#525252',font:{size:10},callback:(v)=>'R$ '+(v/1000).toFixed(0)+'k'},
          grid:{color:'#252525',drawBorder:false}
        },
        x:{
          ticks:{color:'#a3a3a3',font:{size:11,weight:'600'}},
          grid:{display:false}
        }
      }
    }
  });
}

function desenharReceitaDespesa(meses){
  const ctx=document.getElementById('g-receita-despesa');
  if(!ctx)return;
  new Chart(ctx,{
    type:'bar',
    data:{
      labels:meses.map(m=>m.label),
      datasets:[
        {label:'Entradas',data:meses.map(m=>m.entradas),backgroundColor:'#00d97e',borderRadius:6,borderSkipped:false},
        {label:'Saídas',data:meses.map(m=>m.saidas),backgroundColor:'#ff4757',borderRadius:6,borderSkipped:false}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#a3a3a3',font:{size:11,weight:'600'},padding:10,usePointStyle:true,pointStyle:'circle'}},
        tooltip:{
          backgroundColor:'#141414',titleColor:'#fff',bodyColor:'#fff',padding:12,
          borderColor:'#252525',borderWidth:1,
          callbacks:{label:(c)=>c.dataset.label+': R$ '+fm(c.parsed.y)}
        }
      },
      scales:{
        y:{ticks:{color:'#525252',font:{size:10},callback:(v)=>'R$ '+(v/1000).toFixed(0)+'k'},grid:{color:'#252525'}},
        x:{ticks:{color:'#a3a3a3',font:{size:11,weight:'600'}},grid:{display:false}}
      }
    }
  });
}

function desenharPizza(topCats){
  const ctx=document.getElementById('g-pizza');
  if(!ctx)return;
  const labels=topCats.map(c=>CATEGORIAS[c.k]?.n||c.k);
  const data=topCats.map(c=>c.valor);
  const cores=topCats.map(c=>CATEGORIAS[c.k]?.c||'#94a3b8');
  new Chart(ctx,{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:cores,borderColor:'#141414',borderWidth:3,hoverOffset:8}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      cutout:'60%',
      plugins:{
        legend:{
          position:'bottom',
          labels:{color:'#a3a3a3',font:{size:11,weight:'600'},padding:8,usePointStyle:true,pointStyle:'circle',boxWidth:8}
        },
        tooltip:{
          backgroundColor:'#141414',titleColor:'#fff',bodyColor:'#fff',padding:12,
          borderColor:'#252525',borderWidth:1,
          callbacks:{label:(c)=>c.label+': R$ '+fm(c.parsed)+' ('+((c.parsed/data.reduce((a,b)=>a+b,0))*100).toFixed(0)+'%)'}
        }
      }
    }
  });
}

function fm(v){return(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
</script>
