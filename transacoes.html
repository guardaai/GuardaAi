<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>Transações • guardaí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{--bg:#0a0a0a;--bg-card:#141414;--bg-elev:#1c1c1c;--bg-input:#181818;--border:#252525;--border-strong:#353535;--brand:#00d97e;--brand-hover:#00ba6b;--brand-soft:rgba(0,217,126,0.1);--danger:#ff4757;--danger-soft:rgba(255,71,87,0.1);--warning:#ffb800;--warning-soft:rgba(255,184,0,0.1);--info:#38bdf8;--info-soft:rgba(56,189,248,0.1);--ia:#a855f7;--ia-soft:rgba(168,85,247,0.1);--text:#fff;--text-mute:#a3a3a3;--text-faint:#525252}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
body{padding-bottom:120px}
input,textarea,select{color:#fff!important;-webkit-text-fill-color:#fff!important;caret-color:var(--brand)}
input:-webkit-autofill,textarea:-webkit-autofill{-webkit-box-shadow:0 0 0 1000px var(--bg-input) inset!important;-webkit-text-fill-color:#fff!important}
.header{padding:16px 20px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px}
.header-back{width:36px;height:36px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.header-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;flex:1}
.container{max-width:480px;margin:0 auto;padding:16px 20px}
.mes-nav{display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:8px 4px;margin-bottom:16px}
.mes-nav-btn{width:36px;height:36px;border-radius:8px;background:transparent;border:none;color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.mes-nav-btn:active{background:var(--bg-elev)}
.mes-atual{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;text-transform:capitalize}
.resumo-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.resumo-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:12px}
.resumo-label{font-size:10px;color:var(--text-mute);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;font-weight:500}
.resumo-valor{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700}
.resumo-valor.brand{color:var(--brand)}
.resumo-valor.danger{color:var(--danger)}
.resumo-valor.warning{color:var(--warning)}
.resumo-valor.info{color:var(--info)}
.painel-mes{background:linear-gradient(135deg,var(--bg-elev) 0%,var(--bg-card) 100%);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:16px}
.painel-linha{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.painel-linha+.painel-linha{border-top:1px solid var(--border)}
.painel-label{font-size:12px;color:var(--text-mute);display:flex;align-items:center;gap:6px}
.painel-val{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700}
.painel-val.danger{color:var(--danger)}
.painel-val.warning{color:var(--warning)}
.painel-val.brand{color:var(--brand)}
.painel-val.info{color:var(--info)}
.painel-saldo{margin-top:8px;padding-top:10px;border-top:2px solid var(--border-strong);display:flex;align-items:center;justify-content:space-between}
.painel-saldo-label{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.painel-saldo-val{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700}
.painel-nota{font-size:10px;color:var(--text-faint);margin-top:8px;line-height:1.4;text-align:center}
.tatu-cutuca{background:var(--warning-soft);border:1px solid rgba(255,184,0,0.4);border-radius:14px;padding:12px 14px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
.tatu-cutuca-emoji{font-size:22px;flex-shrink:0}
.tatu-cutuca-txt{font-size:12px;line-height:1.5;color:var(--text);flex:1}
.tatu-cutuca-txt strong{color:var(--warning)}
.tatu-cutuca-btn{background:var(--warning);color:#1a1400;border:none;border-radius:8px;padding:6px 12px;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;cursor:pointer;margin-top:8px}
.filtros{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filtros::-webkit-scrollbar{display:none}
.filtro-pill{background:var(--bg-card);border:1px solid var(--border);border-radius:100px;padding:8px 14px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;color:var(--text-mute)}
.filtro-pill.active{background:var(--brand-soft);border-color:var(--brand);color:var(--brand)}
.secao-titulo{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--text-mute);font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin:16px 4px 8px}
.trans-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.3s}
.trans-card:active{transform:scale(0.99)}
.trans-card.vencida{border-left:3px solid var(--danger)}
.trans-card.hoje{border-left:3px solid var(--warning)}
.trans-card.parcelada{border-left:3px solid var(--ia)}
.trans-card.nocartao{border-left:3px solid var(--info)}
.trans-card.novo{animation:piscaItem 3.5s ease-out;background:var(--brand-soft);border-color:var(--brand);box-shadow:0 0 24px rgba(0,217,126,0.3)}
@keyframes piscaItem{0%{transform:scale(0.95);opacity:0;background:var(--brand);border-color:var(--brand)}10%{transform:scale(1.02);opacity:1}30%{background:var(--brand-soft);transform:scale(1)}70%{background:var(--brand-soft);box-shadow:0 0 30px rgba(0,217,126,0.5)}100%{background:var(--bg-card);box-shadow:none}}
.trans-icone{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.trans-icone.entrada{background:var(--brand-soft);color:var(--brand)}
.trans-icone.saida{background:var(--danger-soft);color:var(--danger)}
.trans-info{flex:1;min-width:0}
.trans-desc{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trans-data{font-size:11px;color:var(--text-mute);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.trans-badge{font-size:9px;padding:2px 5px;border-radius:4px;font-weight:700;text-transform:uppercase}
.trans-badge.prevista{background:var(--info-soft);color:var(--info)}
.trans-badge.vencida{background:var(--danger-soft);color:var(--danger)}
.trans-badge.hoje{background:var(--warning-soft);color:var(--warning)}
.trans-badge.parcela{background:var(--ia-soft);color:var(--ia)}
.trans-badge.nocartao{background:var(--info-soft);color:var(--info)}
.trans-valor{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;white-space:nowrap}
.trans-valor.entrada{color:var(--brand)}
.trans-valor.saida{color:var(--danger)}
.trans-valor.nocartao{color:var(--text-mute)}
.cartao-card{background:linear-gradient(135deg,var(--info-soft) 0%,var(--bg-card) 100%);border:1px solid rgba(56,189,248,0.3);border-radius:16px;margin-bottom:10px;overflow:hidden}
.cartao-head{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer}
.cartao-head:active{background:rgba(56,189,248,0.05)}
.cartao-icone{width:44px;height:44px;border-radius:12px;background:var(--info-soft);color:var(--info);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.cartao-info{flex:1;min-width:0}
.cartao-nome{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
.cartao-ciclo{font-size:11px;color:var(--text-mute);margin-top:2px}
.cartao-valor-wrap{text-align:right;flex-shrink:0}
.cartao-previa-label{font-size:9px;color:var(--info);text-transform:uppercase;letter-spacing:0.05em;font-weight:700}
.cartao-previa-valor{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--info)}
.cartao-seta{font-size:14px;color:var(--text-mute);margin-left:8px;transition:transform 0.3s}
.cartao-card.aberto .cartao-seta{transform:rotate(180deg)}
.cartao-body{display:none;border-top:1px solid rgba(56,189,248,0.2);padding:6px 14px 12px}
.cartao-card.aberto .cartao-body{display:block}
.cartao-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.cartao-item:last-child{border-bottom:none}
.cartao-item:active{opacity:0.7}
.cartao-item-icone{width:34px;height:34px;border-radius:9px;background:var(--bg-elev);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.cartao-item-info{flex:1;min-width:0}
.cartao-item-desc{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cartao-item-meta{font-size:10px;color:var(--text-mute);display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:1px}
.cartao-item-valor{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--text);white-space:nowrap}
.cartao-vazio{font-size:12px;color:var(--text-faint);text-align:center;padding:12px;font-style:italic}
.cartao-nota{font-size:10px;color:var(--text-faint);text-align:center;padding:8px 0 2px;line-height:1.4}
.empty-state{background:var(--bg-card);border:1px dashed var(--border-strong);border-radius:14px;padding:40px 20px;text-align:center;margin-top:20px}
.empty-emoji{font-size:48px;margin-bottom:12px}
.empty-titulo{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px}
.empty-sub{font-size:13px;color:var(--text-mute)}
.loader-circle{width:32px;height:32px;border:3px solid var(--border);border-radius:50%;border-top-color:var(--brand);animation:spin 0.8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.fabs-container{position:fixed;bottom:24px;right:20px;z-index:50;display:flex;flex-direction:column;gap:12px;align-items:flex-end}
.fab{border-radius:50%;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;transition:transform 0.2s}
.fab:active{transform:scale(0.95)}
.fab-audio{width:64px;height:64px;background:linear-gradient(135deg,var(--ia) 0%,#9333ea 100%);color:#fff;font-size:28px;box-shadow:0 8px 24px rgba(168,85,247,0.5)}
.fab-add{width:56px;height:56px;background:var(--brand);color:#001a0e;font-size:26px;font-weight:700}
.audio-overlay{position:fixed;inset:0;background:rgba(10,10,10,0.95);z-index:9000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.audio-overlay.show{display:flex}
.audio-modal{background:var(--bg-card);border:1px solid var(--border);border-radius:24px;padding:24px;max-width:380px;width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.audio-titulo{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px}
.audio-sub{font-size:13px;color:var(--text-mute);margin-bottom:20px;line-height:1.5}
.mic-btn{width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,var(--ia) 0%,#9333ea 100%);border:none;color:#fff;font-size:56px;cursor:pointer;box-shadow:0 12px 40px rgba(168,85,247,0.5);margin:0 auto 20px;display:block;transition:transform 0.2s}
.mic-btn:active{transform:scale(0.95)}
.mic-btn.recording{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 12px 40px rgba(168,85,247,0.5)}50%{box-shadow:0 12px 60px rgba(168,85,247,0.9);transform:scale(1.05)}}
.mic-status{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--ia);margin-bottom:14px;min-height:22px;text-align:center}
.mic-status.recording{color:var(--danger)}
.transcricao-box{background:var(--bg-input);border:1px solid var(--border);border-radius:14px;padding:14px;min-height:80px;margin-bottom:16px;font-size:14px;line-height:1.5;text-align:left}
.transcricao-box.placeholder{color:var(--text-faint);font-style:italic;text-align:center}
.exemplos{background:var(--bg-input);border-radius:12px;padding:12px;margin-bottom:16px;text-align:left}
.exemplos-titulo{font-family:'Space Grotesk',sans-serif;font-size:10px;color:var(--text-mute);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;font-weight:700}
.exemplo-item{font-size:12px;color:var(--text-mute);padding:3px 0;font-style:italic}
.exemplo-item::before{content:'"'}
.exemplo-item::after{content:'"'}
.audio-acoes{display:flex;gap:10px}
.btn{padding:14px;border-radius:12px;border:none;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;flex:1;min-height:50px}
.btn-primary{background:var(--brand);color:#001a0e}
.btn-primary:active{background:var(--brand-hover)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;background:var(--bg-elev);color:var(--text-faint)}
.btn-secondary{background:var(--bg-elev);color:var(--text);border:1px solid var(--border)}
.btn-secondary:active{background:var(--border)}
.btn-ia{background:var(--ia);color:#fff}
.conf-tatu-box{background:var(--ia-soft);border:1px solid rgba(168,85,247,0.3);border-radius:14px;padding:14px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start;text-align:left}
.conf-tatu-emoji{font-size:28px}
.conf-tatu-texto{font-size:13px;line-height:1.5;color:var(--text)}
.conf-row{display:grid;grid-template-columns:100px 1fr;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.conf-label{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--text-mute);text-transform:uppercase;letter-spacing:0.05em;font-weight:600}
.conf-valor{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;text-align:left}
.conf-valor.entrada{color:var(--brand)}
.conf-valor.saida{color:var(--danger)}
.conf-conta-edit{margin:10px 0 4px;padding:10px;background:var(--bg-input);border:1px solid var(--border);border-radius:12px}
.conf-conta-edit label{display:block;font-size:10px;color:var(--text-mute);text-transform:uppercase;letter-spacing:0.05em;font-weight:700;margin-bottom:6px}
.conf-conta-edit select{width:100%;background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;padding:12px;color:#fff;font-size:15px;font-family:'Inter',sans-serif;min-height:46px}
.parcelas-preview{background:var(--bg-input);border-radius:12px;padding:12px;margin-top:14px;max-height:200px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.parcelas-titulo{font-family:'Space Grotesk',sans-serif;font-size:10px;color:var(--text-mute);font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px}
.parcela-mini{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.parcela-mini:last-child{border-bottom:none}
.parcela-mini-data{color:var(--text-mute)}
.parcela-mini-valor{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--danger)}
.alerta-fin{background:var(--warning-soft);border:1px solid rgba(255,184,0,0.3);border-radius:12px;padding:12px;margin-top:14px;font-size:12px;line-height:1.5}
.alerta-fin strong{color:var(--warning)}
.forma-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.forma-tab{background:var(--bg-input);border:2px solid var(--border);border-radius:12px;padding:10px;text-align:center;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:var(--text-mute)}
.forma-tab.active{background:var(--info-soft);border-color:var(--info);color:var(--info)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);border-top:1px solid var(--border);border-radius:24px 24px 0 0;padding:20px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-titulo{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{width:32px;height:32px;border-radius:10px;background:var(--bg-elev);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text-mute);margin-bottom:6px;font-weight:500}
.field input,.field select,.field textarea{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--text);font-size:16px;font-family:'Inter',sans-serif;min-height:48px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tipo-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.tipo-tab{background:var(--bg-input);border:2px solid var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--text-mute)}
.tipo-tab.active.entrada{background:var(--brand-soft);border-color:var(--brand);color:var(--brand)}
.tipo-tab.active.saida{background:var(--danger-soft);border-color:var(--danger);color:var(--danger)}
.valor-input-wrapper{display:flex;align-items:center;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;padding:14px}
.valor-input-wrapper:focus-within{border-color:var(--brand)}
.valor-prefix{color:var(--text-mute);font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;margin-right:6px}
.valor-input-wrapper input{background:transparent;border:none;flex:1;text-align:right;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;padding:0;min-height:0;color:#fff!important;-webkit-text-fill-color:#fff!important}
.opc-foto{background:linear-gradient(135deg,var(--ia-soft) 0%,var(--bg-card) 100%);border:1px solid rgba(168,85,247,0.3);border-radius:12px;padding:14px;text-align:center;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.opc-foto:active{transform:scale(0.98)}
.opc-foto-icon{font-size:28px}
.opc-foto-content{flex:1;text-align:left}
.opc-foto-titulo{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--ia);margin-bottom:2px}
.opc-foto-sub{font-size:11px;color:var(--text-mute)}
.upload-hidden{display:none}
.ia-spinner{width:40px;height:40px;border:3px solid var(--ia-soft);border-top-color:var(--ia);border-radius:50%;animation:spin 0.8s linear infinite;margin:30px auto 16px}
.revisao-card{background:linear-gradient(135deg,var(--ia-soft) 0%,var(--bg-card) 100%);border:1px solid var(--ia);border-radius:14px;padding:14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.revisao-emoji{font-size:24px}
.revisao-texto{font-size:13px;line-height:1.5;color:var(--text)}
.revisao-texto strong{color:var(--ia)}
.acoes-modal{background:var(--bg-card);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:20px;max-width:480px;width:100%}
.acoes-titulo{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px}
.acoes-sub{font-size:11px;color:var(--text-mute);margin-bottom:16px}
.acao-btn{display:flex;align-items:center;gap:14px;padding:14px;border-radius:12px;cursor:pointer}
.acao-btn:active{background:var(--bg-elev)}
.acao-icon{width:40px;height:40px;border-radius:10px;background:var(--bg-input);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL='https://gmbsxrxqrxpbgyyvifcd.supabase.co';
const SUPABASE_KEY='sb_publishable_NSOgcu93sTiSreGYi-Ha3g_bqYsAK22';
const IA_URL='https://gmbsxrxqrxpbgyyvifcd.supabase.co/functions/v1/claude-chat';
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);

const CATEGORIAS={alimentacao:{e:'🍔',n:'Alimentação',c:'#ff6b35'},transporte:{e:'🚗',n:'Transporte',c:'#3b82f6'},moradia:{e:'🏠',n:'Moradia',c:'#00d97e'},lazer:{e:'🎮',n:'Lazer',c:'#8b5cf6'},saude:{e:'🏥',n:'Saúde',c:'#ef4444'},educacao:{e:'🎓',n:'Educação',c:'#3b82f6'},vestuario:{e:'👕',n:'Vestuário',c:'#ec4899'},compras:{e:'🛒',n:'Compras',c:'#f59e0b'},servicos:{e:'🛠️',n:'Serviços',c:'#14b8a6'},salario:{e:'💼',n:'Salário',c:'#00d97e'},transferencia:{e:'🔁',n:'Transferência',c:'#a855f7'},outro:{e:'📌',n:'Outro',c:'#94a3b8'}};

let usuario,perfil;
let contas=[];
let cartoesCreditoIds=new Set();
let transacoes=[];
let mesRef=new Date();
let filtroAtual='todas';
let recognition=null,isRecording=false,textoTranscrito='',propostaAudio=null;
let ultimoItemNovoId=null;
let parcelasPreview=[];
let cartoesAbertos=new Set();
let contaResolvidaId=''; // 🆕 conta escolhida na confirmação do áudio (editável)

(async()=>{
  const{data:{session}}=await supabase.auth.getSession();
  if(!session){window.location.href='index.html?v='+Date.now();return}
  usuario=session.user;
  const{data:p}=await supabase.from('perfis').select('*').eq('id',usuario.id).maybeSingle();
  perfil=p||{};
  await carregarContas();
  await carregar();
})();

async function carregarContas(){
  const{data}=await supabase.from('contas').select('*').eq('user_id',usuario.id).eq('ativa',true);
  contas=data||[];
  cartoesCreditoIds=new Set(contas.filter(c=>c.tipo==='cartao_credito').map(c=>c.id));
}

function noCartaoCredito(t){
  return t.tipo==='saida' && t.conta_id && cartoesCreditoIds.has(t.conta_id);
}

// 🆕 resolve a conta certa a partir do que a IA entendeu, respeitando crédito x débito.
// Regra: se o texto/IA indica CRÉDITO -> prioriza contas tipo cartao_credito.
//        se indica DÉBITO -> prioriza contas que NÃO são cartao_credito.
//        senão -> primeira que casar o nome.
function resolverConta(p){
  const nomeMencionado=(p.cartao_mencionado||p.conta_mencionada||'').toLowerCase().trim();
  const textoTudo=((p.texto_original||'')+' '+nomeMencionado).toLowerCase();
  if(!nomeMencionado)return null;

  // detecta intenção de crédito/débito pelo texto falado
  const querCredito=/cr[ée]dito|cart[ãa]o de cr[ée]dito|no cr[ée]dito/.test(textoTudo) || !!p.cartao_mencionado || p.parcelado;
  const querDebito=/d[ée]bito|na conta|conta corrente|no d[ée]bito/.test(textoTudo);

  const casaNome=(c)=>{
    const cn=(c.nome||'').toLowerCase();
    const cb=(c.banco||'').toLowerCase();
    return cn.includes(nomeMencionado)||cb.includes(nomeMencionado)||nomeMencionado.includes(cn.split(' ')[0])||(cb&&nomeMencionado.includes(cb.split(' ')[0]));
  };

  const candidatos=contas.filter(casaNome);
  if(candidatos.length===0)return null;
  if(candidatos.length===1)return candidatos[0];

  // mais de um candidato (ex: Nubank débito + Nubank crédito) -> usa a intenção
  if(querCredito){
    const cred=candidatos.find(c=>c.tipo==='cartao_credito');
    if(cred)return cred;
  }
  if(querDebito){
    const deb=candidatos.find(c=>c.tipo!=='cartao_credito');
    if(deb)return deb;
  }
  // sem intenção clara: devolve o primeiro
  return candidatos[0];
}

async function carregar(){
  const ini=new Date(mesRef.getFullYear(),mesRef.getMonth(),1).toISOString().split('T')[0];
  const fim=new Date(mesRef.getFullYear(),mesRef.getMonth()+1,0).toISOString().split('T')[0];
  const{data}=await supabase.from('transacoes').select('*').eq('user_id',usuario.id).gte('data',ini).lte('data',fim).order('data',{ascending:false});
  transacoes=data||[];
  render();
}

function render(){
  const meses=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const mesNome=`${meses[mesRef.getMonth()]} de ${mesRef.getFullYear()}`;
  const hoje=new Date().toISOString().split('T')[0];

  let lista=transacoes;
  if(filtroAtual==='entradas')lista=lista.filter(t=>t.tipo==='entrada');
  else if(filtroAtual==='saidas')lista=lista.filter(t=>t.tipo==='saida');
  else if(filtroAtual==='realizadas')lista=lista.filter(t=>(t.status||'realizada')==='realizada');
  else if(filtroAtual==='previstas')lista=lista.filter(t=>t.status==='prevista');
  else if(filtroAtual==='vencidas')lista=lista.filter(t=>t.status==='prevista'&&t.data<hoje);

  const realiz=transacoes.filter(t=>(t.status||'realizada')==='realizada');
  const entradasReal=realiz.filter(t=>t.tipo==='entrada').reduce((a,t)=>a+Number(t.valor),0);
  const saidasReal=realiz.filter(t=>t.tipo==='saida'&&!noCartaoCredito(t)).reduce((a,t)=>a+Number(t.valor),0);
  const previstas=transacoes.filter(t=>t.status==='prevista');
  const aPagar=previstas.filter(t=>t.tipo==='saida'&&!noCartaoCredito(t)).reduce((a,t)=>a+Number(t.valor),0);
  const aReceber=previstas.filter(t=>t.tipo==='entrada').reduce((a,t)=>a+Number(t.valor),0);
  const noCartao=transacoes.filter(t=>noCartaoCredito(t)).reduce((a,t)=>a+Number(t.valor),0);
  const saldoPrevisto=(entradasReal+aReceber)-(saidasReal+aPagar);
  const vencidasArr=previstas.filter(t=>t.data<hoje&&t.tipo==='saida'&&!noCartaoCredito(t));
  const vencidas=vencidasArr.length;
  const totalVencido=vencidasArr.reduce((a,t)=>a+Number(t.valor),0);

  const transCredito=lista.filter(t=>noCartaoCredito(t));
  const transNormais=lista.filter(t=>!noCartaoCredito(t));

  const porCartao={};
  transCredito.forEach(t=>{
    if(!porCartao[t.conta_id])porCartao[t.conta_id]=[];
    porCartao[t.conta_id].push(t);
  });

  document.getElementById('container').innerHTML=`
    <div class="mes-nav">
      <button class="mes-nav-btn" onclick="mudarMes(-1)">‹</button>
      <div class="mes-atual">${mesNome}</div>
      <button class="mes-nav-btn" onclick="mudarMes(1)">›</button>
    </div>
    <div class="resumo-cards">
      <div class="resumo-card"><div class="resumo-label">↓ Entradas (real)</div><div class="resumo-valor brand">R$ ${fm(entradasReal)}</div></div>
      <div class="resumo-card"><div class="resumo-label">↑ Saídas (real)</div><div class="resumo-valor danger">R$ ${fm(saidasReal)}</div></div>
    </div>
    ${(aPagar>0||aReceber>0||noCartao>0)?`
    <div class="painel-mes">
      ${aReceber>0?`<div class="painel-linha"><div class="painel-label">📥 A receber ainda</div><div class="painel-val brand">+R$ ${fm(aReceber)}</div></div>`:''}
      <div class="painel-linha"><div class="painel-label">📤 A pagar ainda (conta/boleto/pix)</div><div class="painel-val warning">-R$ ${fm(aPagar)}</div></div>
      ${noCartao>0?`<div class="painel-linha"><div class="painel-label">💳 No cartão de crédito</div><div class="painel-val info">R$ ${fm(noCartao)}</div></div>`:''}
      <div class="painel-saldo">
        <div class="painel-saldo-label">${saldoPrevisto>=0?'🟢':'🔴'} Saldo previsto do mês</div>
        <div class="painel-saldo-val ${saldoPrevisto>=0?'brand':'danger'}">${saldoPrevisto<0?'-':''}R$ ${fm(Math.abs(saldoPrevisto))}</div>
      </div>
      ${noCartao>0?`<div class="painel-nota">💳 O que está no cartão não soma aqui — já está na fatura. Toque no cartão abaixo pra ver a prévia.</div>`:''}
    </div>
    `:''}
    ${vencidas>0?`
    <div class="tatu-cutuca">
      <div class="tatu-cutuca-emoji">🦔</div>
      <div class="tatu-cutuca-txt">
        <strong>Tatu:</strong> Você tem <strong>${vencidas} conta${vencidas>1?'s':''}</strong> que passou do vencimento (R$ ${fm(totalVencido)}) e não foi marcada como paga. Já pagou?
        <br><button class="tatu-cutuca-btn" onclick="setFiltro('vencidas')">Ver vencidas →</button>
      </div>
    </div>
    `:''}
    <div class="filtros">
      <div class="filtro-pill ${filtroAtual==='todas'?'active':''}" onclick="setFiltro('todas')">Todas (${transacoes.length})</div>
      <div class="filtro-pill ${filtroAtual==='entradas'?'active':''}" onclick="setFiltro('entradas')">Entradas</div>
      <div class="filtro-pill ${filtroAtual==='saidas'?'active':''}" onclick="setFiltro('saidas')">Saídas</div>
      <div class="filtro-pill ${filtroAtual==='realizadas'?'active':''}" onclick="setFiltro('realizadas')">Realizadas</div>
      <div class="filtro-pill ${filtroAtual==='previstas'?'active':''}" onclick="setFiltro('previstas')">Previstas</div>
      ${vencidas>0?`<div class="filtro-pill ${filtroAtual==='vencidas'?'active':''}" onclick="setFiltro('vencidas')" style="color:var(--danger);">⚠️ Vencidas (${vencidas})</div>`:''}
    </div>
    ${renderCartoes(porCartao,hoje)}
    ${transNormais.length===0&&Object.keys(porCartao).length===0?`<div class="empty-state"><div class="empty-emoji">🦔</div><div class="empty-titulo">Nada por aqui ainda</div><div class="empty-sub">Toque no 🎤 pra falar ou no + pra adicionar</div></div>`:renderLista(transNormais,hoje)}
  `;

  if(ultimoItemNovoId){
    setTimeout(()=>{
      const el=document.querySelector(`[data-item-id="${ultimoItemNovoId}"]`);
      if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
      setTimeout(()=>{ultimoItemNovoId=null},3800);
    },200);
  }
}

function renderCartoes(porCartao,hoje){
  const ids=Object.keys(porCartao);
  if(ids.length===0)return '';
  let html=`<div class="secao-titulo">💳 Faturas em formação (prévia)</div>`;
  ids.forEach(contaId=>{
    const cartao=contas.find(c=>c.id===contaId);
    if(!cartao)return;
    const itens=porCartao[contaId].slice().sort((a,b)=>b.data.localeCompare(a.data));
    const total=itens.reduce((a,t)=>a+Number(t.valor),0);
    const aberto=cartoesAbertos.has(contaId);
    const ciclo=cartao.dia_fechamento?`Fecha dia ${cartao.dia_fechamento}${cartao.dia_vencimento?` · vence dia ${cartao.dia_vencimento}`:''}`:'Sem ciclo definido';

    let itensHTML='';
    itens.forEach(t=>{
      const cat=t.categoria?CATEGORIAS[t.categoria]:null;
      const emoji=cat?.e||'💸';
      const eParc=t.parcelado||t.total_parcelas>1;
      const dFmt=new Date(t.data+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
      let metaHTML=`<span>${dFmt}</span>`;
      if(eParc&&t.numero_parcela&&t.total_parcelas)metaHTML+=`<span class="trans-badge parcela">${t.numero_parcela}/${t.total_parcelas}</span>`;
      if(cat)metaHTML+=`<span>${cat.n}</span>`;
      itensHTML+=`
        <div class="cartao-item" onclick="abrirAcoes('${t.id}')">
          <div class="cartao-item-icone">${emoji}</div>
          <div class="cartao-item-info">
            <div class="cartao-item-desc">${t.descricao}</div>
            <div class="cartao-item-meta">${metaHTML}</div>
          </div>
          <div class="cartao-item-valor">R$ ${fm(t.valor)}</div>
        </div>`;
    });

    html+=`
      <div class="cartao-card ${aberto?'aberto':''}">
        <div class="cartao-head" onclick="toggleCartao('${contaId}')">
          <div class="cartao-icone">${cartao.icone||'💳'}</div>
          <div class="cartao-info">
            <div class="cartao-nome">${cartao.nome}</div>
            <div class="cartao-ciclo">${ciclo} · ${itens.length} lançamento${itens.length>1?'s':''}</div>
          </div>
          <div class="cartao-valor-wrap">
            <div class="cartao-previa-label">Prévia</div>
            <div class="cartao-previa-valor">R$ ${fm(total)}</div>
          </div>
          <div class="cartao-seta">▼</div>
        </div>
        <div class="cartao-body">
          ${itensHTML||'<div class="cartao-vazio">Nada lançado nesse cartão ainda</div>'}
          <div class="cartao-nota">Prévia da fatura — não soma no saldo do mês. A fatura oficial confirma o valor real.</div>
        </div>
      </div>`;
  });
  return html;
}

window.toggleCartao=function(contaId){
  if(cartoesAbertos.has(contaId))cartoesAbertos.delete(contaId);
  else cartoesAbertos.add(contaId);
  render();
};

function renderLista(lista,hoje){
  if(lista.length===0)return '';
  const porData={};
  lista.forEach(t=>{const d=t.data;if(!porData[d])porData[d]=[];porData[d].push(t)});
  const datas=Object.keys(porData).sort().reverse();
  let html='';
  datas.forEach(d=>{
    const data=new Date(d+'T12:00:00');
    const hojeD=new Date(hoje+'T12:00:00');
    const ontem=new Date(hojeD);ontem.setDate(ontem.getDate()-1);
    let label=data.toLocaleDateString('pt-BR',{day:'numeric',month:'short',weekday:'short'});
    if(d===hoje)label='HOJE';
    else if(d===ontem.toISOString().split('T')[0])label='ONTEM';
    else if(d>hoje)label=`EM ${Math.ceil((data-hojeD)/86400000)} DIA${Math.ceil((data-hojeD)/86400000)>1?'S':''} • ${label}`;
    html+=`<div class="secao-titulo">${label}</div>`;
    porData[d].forEach(t=>{
      const eEnt=t.tipo==='entrada';
      const ePrev=t.status==='prevista';
      const eVenc=ePrev&&t.data<hoje;
      const eHoje=t.data===hoje;
      const cat=t.categoria?CATEGORIAS[t.categoria]:null;
      const emoji=cat?.e||(eEnt?'💰':'💸');
      const ehNovo=t.id===ultimoItemNovoId;
      const eParc=t.parcelado||t.total_parcelas>1;
      let bClass='';
      let bdgHTML='';
      if(eVenc){bClass='vencida';bdgHTML=`<span class="trans-badge vencida">VENCIDA</span>`}
      else if(eHoje&&ePrev){bClass='hoje';bdgHTML=`<span class="trans-badge hoje">HOJE</span>`}
      else if(ePrev)bdgHTML=`<span class="trans-badge prevista">PREVISTA</span>`;
      if(eParc&&t.numero_parcela&&t.total_parcelas){bdgHTML+=`<span class="trans-badge parcela">${t.numero_parcela}/${t.total_parcelas}</span>`;bClass+=' parcelada'}
      if(ehNovo)bClass+=' novo';
      html+=`<div class="trans-card ${bClass}" data-item-id="${t.id}" onclick="abrirAcoes('${t.id}')">
        <div class="trans-icone ${t.tipo}">${emoji}</div>
        <div class="trans-info">
          <div class="trans-desc">${t.descricao}</div>
          <div class="trans-data">${bdgHTML}${cat?.n||''}</div>
        </div>
        <div class="trans-valor ${t.tipo}">${eEnt?'+':'-'}R$ ${fm(t.valor)}</div>
      </div>`;
    });
  });
  return html;
}

window.mudarMes=function(dir){mesRef.setMonth(mesRef.getMonth()+dir);carregar()};
window.setFiltro=function(f){filtroAtual=f;render()};

window.abrirAudio=function(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){alert('🦔 Seu navegador não suporta áudio.\n\nUse Safari (iPhone) ou Chrome.');return}
  textoTranscrito='';isRecording=false;renderAudio();
  document.getElementById('audio-overlay').classList.add('show');
};

function renderAudio(){
  document.getElementById('audio-modal-content').innerHTML=`
    <div class="audio-titulo" style="text-align:center;">🎤 Falar transação</div>
    <div class="audio-sub" style="text-align:center;">Toque no microfone e fale. Toque de novo pra parar.</div>
    <button class="mic-btn ${isRecording?'recording':''}" id="mic-btn" onclick="toggleRec()">${isRecording?'⏹️':'🎤'}</button>
    <div class="mic-status ${isRecording?'recording':''}">${isRecording?'🔴 Ouvindo... fale agora':(textoTranscrito?'✅ Pronto!':'Toque pra falar')}</div>
    <div class="transcricao-box ${textoTranscrito?'':'placeholder'}" id="transcricao-box">${textoTranscrito||'O que você falar vai aparecer aqui...'}</div>
    ${!textoTranscrito?`<div class="exemplos"><div class="exemplos-titulo">💡 Exemplos</div><div class="exemplo-item">paguei 15 reais no espetinho no débito Santander</div><div class="exemplo-item">churrasco 30 reais no crédito Nubank</div><div class="exemplo-item">bolsa 600 em 6x no crédito Nubank</div><div class="exemplo-item">pagamento 200 reais dia 17 de junho</div></div>`:''}
    <div class="audio-acoes">
      <button class="btn btn-secondary" onclick="fecharAudio()">Cancelar</button>
      <button class="btn btn-ia" onclick="processarAudio()" ${!textoTranscrito||isRecording?'disabled':''}>🦔 IA interpretar</button>
    </div>`;
}

window.toggleRec=function(){if(isRecording)pararGravacao();else iniciarGravacao()};

function iniciarGravacao(){
  const SR=window.webkitSpeechRecognition||window.SpeechRecognition;
  recognition=new SR();
  recognition.lang='pt-BR';recognition.continuous=true;recognition.interimResults=true;
  let tF='',tI='';
  recognition.onresult=(e)=>{
    tI='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)tF+=e.results[i][0].transcript+' ';
      else tI+=e.results[i][0].transcript;
    }
    textoTranscrito=(tF+tI).trim();
    const box=document.getElementById('transcricao-box');
    if(box){box.textContent=textoTranscrito||'Ouvindo...';box.classList.remove('placeholder')}
  };
  recognition.onerror=(e)=>{
    if(e.error==='no-speech')return;
    if(e.error==='not-allowed')alert('🎤 Permissão negada. Libera nas configurações.');
    else alert('Erro: '+e.error);
    pararGravacao();
  };
  recognition.onend=()=>{if(isRecording){try{recognition.start()}catch(e){}}};
  try{recognition.start();isRecording=true;renderAudio()}catch(e){alert('Erro: '+e.message)}
}

function pararGravacao(){
  if(recognition){isRecording=false;try{recognition.stop()}catch(e){}recognition=null}
  renderAudio();
}

window.processarAudio=async function(){
  if(!textoTranscrito)return;
  if(isRecording)pararGravacao();
  document.getElementById('audio-modal-content').innerHTML=`<div class="ia-spinner"></div><div class="audio-titulo" style="text-align:center;">🦔 Tatu interpretando...</div><div class="audio-sub" style="text-align:center;">"${textoTranscrito}"</div>`;
  try{
    const r=await fetch(IA_URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},body:JSON.stringify({tipo:'interpretar_audio_transacao',texto:textoTranscrito,max_tokens:1000})});
    const d=await r.json();
    if(d.resultado&&!d.resultado.erro){
      propostaAudio=d.resultado;
      propostaAudio.texto_original=textoTranscrito;
      calcularParcelasPreview();
      renderConfirmacao();
    }else{alert('🦔 '+(d.resultado?.erro||'Não entendi'));renderAudio()}
  }catch(e){alert('Erro: '+e.message);renderAudio()}
};

function calcularParcelasPreview(){
  parcelasPreview=[];
  const p=propostaAudio;
  if(!p.parcelado||!p.num_parcelas)return;

  const numParc=Number(p.num_parcelas);
  const valorParc=Number(p.valor_parcela)||(Number(p.valor)/numParc);

  // 🆕 usa o resolverConta pra achar o cartão certo (crédito)
  const cartao=resolverConta(p);
  const ehCartaoCred=cartao&&cartao.tipo==='cartao_credito';

  const hoje=new Date();
  let primeiraData;

  if(ehCartaoCred&&cartao.dia_fechamento&&cartao.dia_vencimento){
    const diaHoje=hoje.getDate();
    const diaFec=Number(cartao.dia_fechamento);
    const diaVen=Number(cartao.dia_vencimento);
    primeiraData=new Date(hoje.getFullYear(),hoje.getMonth(),diaVen);
    if(diaHoje>diaFec){
      primeiraData.setMonth(primeiraData.getMonth()+1);
    }
    if(diaVen<=diaFec&&primeiraData<hoje){
      primeiraData.setMonth(primeiraData.getMonth()+1);
    }
  }else{
    if(p.data_mencionada){
      primeiraData=new Date(p.data_mencionada+'T12:00:00');
    }else{
      primeiraData=new Date(hoje);
      primeiraData.setDate(primeiraData.getDate()+30);
    }
  }

  for(let i=0;i<numParc;i++){
    const dt=new Date(primeiraData);
    dt.setMonth(dt.getMonth()+i);
    parcelasPreview.push({numero:i+1,total:numParc,data:dt.toISOString().split('T')[0],valor:valorParc});
  }
}

        ${parcelasPreview.length>2?`<div class="parcela-mini"><span class="parcela-mini-data" style="font-style:italic;">... ${parcelasPreview.length-2} parcelas no meio ...</span><span></span></div>`:''}
        ${parcelasPreview.length>1?`<div class="parcela-mini"><span class="parcela-mini-data">${ultima.numero}ª última (${dFmt(ultima.data)})</span><span class="parcela-mini-valor">R$ ${fm(ultima.valor)}</span></div>`:''}

  }

  // 🆕 seletor de conta SEMPRE visível na confirmação, já com a conta resolvida selecionada.
  // Assim, se a IA errar crédito/débito, você corrige aqui antes de salvar.
  const opcoesConta=`<option value="">Nenhuma</option>`+contas.map(c=>`<option value="${c.id}" ${c.id===contaResolvidaId?'selected':''}>${c.icone||''} ${c.nome}${c.tipo==='cartao_credito'?' (crédito)':''}</option>`).join('');

  document.getElementById('audio-modal-content').innerHTML=`
    <div class="audio-titulo">Confirma essa transação?</div>
    <div class="audio-sub">Tatu entendeu o que você falou. Confere antes de salvar:</div>
    <div class="conf-tatu-box">
      <div class="conf-tatu-emoji">🦔</div>
      <div class="conf-tatu-texto">Você disse: <em>"${p.texto_original}"</em></div>
    </div>
    <div class="conf-row"><div class="conf-label">Tipo</div><div class="conf-valor ${p.tipo}">${p.tipo==='entrada'?'💰 Entrada':'💸 Saída'}</div></div>
    <div class="conf-row"><div class="conf-label">Valor total</div><div class="conf-valor ${p.tipo}">${p.tipo==='entrada'?'+':'-'}R$ ${fm(p.valor)}</div></div>

    ${p.data_mencionada?`<div class="conf-row"><div class="conf-label">Data</div><div class="conf-valor" style="font-size:14px;">${new Date(p.data_mencionada+'T12:00:00').toLocaleDateString('pt-BR')}</div></div>`:''}

window.salvarAudio=async function(contaId){
  const p=propostaAudio;
  try{
    const eParc=p.parcelado&&p.num_parcelas;
    const eFin=p.tipo_compra==='financiamento'&&p.tem_entrada;
    const grupoParc=eParc?crypto.randomUUID():null;
    const hojeISO=new Date().toISOString().split('T')[0];
    const dataPrimeira=p.data_mencionada||hojeISO;

    let primeiraId=null;

    if(eFin&&p.valor_entrada){
      const{data:tEntrada,error:e0}=await supabase.from('transacoes').insert({user_id:usuario.id,valor:p.valor_entrada,descricao:`${p.descricao} (entrada)`,tipo:'saida',categoria:p.categoria_sugerida||'compras',data:hojeISO,conta_id:contaId||null,status:'realizada'}).select().single();
      if(e0)throw e0;
      primeiraId=tEntrada.id;

      const valorDivida=Number(p.num_parcelas)*Number(p.valor_parcela||0);
      const dV=parcelasPreview[parcelasPreview.length-1]?.data||hojeISO;
      const{data:divida}=await supabase.from('dividas').insert({user_id:usuario.id,credor:p.descricao,tipo:p.descricao.toLowerCase().includes('carro')||p.descricao.toLowerCase().includes('veículo')?'financ_veiculo':p.descricao.toLowerCase().includes('imóvel')||p.descricao.toLowerCase().includes('casa')?'financ_imovel':'financiamento',descricao:`Financiamento ${p.descricao}`,valor_original:valorDivida,valor_atual:valorDivida,data_vencimento:dV,data_inicio:hojeISO,status:'ativa',prioridade:2}).select().single();

      const parcelasInsert=parcelasPreview.map(pp=>({user_id:usuario.id,valor:pp.valor,descricao:`${p.descricao} (${pp.numero}/${pp.total})`,tipo:'saida',categoria:p.categoria_sugerida||'compras',data:pp.data,conta_id:contaId||null,status:'prevista',parcelado:true,grupo_parcela:grupoParc,numero_parcela:pp.numero,total_parcelas:pp.total,divida_id:divida?.id}));
      await supabase.from('transacoes').insert(parcelasInsert);

      ultimoItemNovoId=primeiraId;
      await darXP(30,'audio_financiamento','Áudio com financiamento');
      toast(`✅ ${p.descricao} • Entrada + ${p.num_parcelas}x criados!`);
    }
    else if(eParc){
      const parcelasInsert=parcelasPreview.map(pp=>({user_id:usuario.id,valor:pp.valor,descricao:`${p.descricao} (${pp.numero}/${pp.total})`,tipo:p.tipo,categoria:p.categoria_sugerida||'outro',data:pp.data,conta_id:contaId||null,status:'prevista',parcelado:true,grupo_parcela:grupoParc,numero_parcela:pp.numero,total_parcelas:pp.total}));
      const{data:inseridas,error}=await supabase.from('transacoes').insert(parcelasInsert).select();
      if(error)throw error;
      primeiraId=inseridas[0]?.id;
      ultimoItemNovoId=primeiraId;
      await darXP(20,'audio_parcelado','Áudio parcelado');
      toast(`✅ ${p.descricao} • ${p.num_parcelas}x de R$ ${fm(p.valor_parcela)}`);
    }
    else{
      const hoje=hojeISO;
      const status=dataPrimeira>hoje?'prevista':'realizada';
      const{data,error}=await supabase.from('transacoes').insert({user_id:usuario.id,valor:p.valor,descricao:p.descricao,tipo:p.tipo,categoria:p.categoria_sugerida||'outro',data:dataPrimeira,conta_id:contaId||null,status}).select().single();
      if(error)throw error;
      primeiraId=data.id;
      ultimoItemNovoId=primeiraId;
      await darXP(15,'audio_transacao','Áudio');
      toast(`✅ ${p.descricao} • ${p.tipo==='entrada'?'+':'-'}R$ ${fm(p.valor)}`);
    }

    fecharAudio();
    const dTrans=new Date(dataPrimeira+'T12:00:00');
    if(dTrans.getMonth()!==mesRef.getMonth()||dTrans.getFullYear()!==mesRef.getFullYear()){
      mesRef=dTrans;
    }
    await carregar();
  }catch(e){alert('Erro: '+e.message)}
};

async function comprimirImg(file,maxW=1600,q=0.85){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxW){h=Math.round((h*maxW)/w);w=maxW}
        const c=document.createElement('canvas');
        c.width=w;c.height=h;
        const ctx=c.getContext('2d');
        ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
        ctx.drawImage(img,0,0,w,h);
        let b64=c.toDataURL('image/jpeg',q);
        const kb=Math.round((b64.length*0.75)/1024);
        if(kb>4000&&q>0.5)b64=c.toDataURL('image/jpeg',0.7);
        res(b64);
      };
      img.onerror=()=>rej(new Error('Erro'));
      img.src=e.target.result;
    };
    r.onerror=()=>rej(new Error('Erro'));
    r.readAsDataURL(file);
  });
}

    <div class="acao-btn" onclick="excluirTrans('${id}')"><div class="acao-icon danger">🗑️</div><div class="acao-info"><div class="acao-titulo" style="color:var(--danger);">Excluir ${eParc?'essa parcela':''}</div><div class="acao-info-sub">${eParc?'Só essa, mantém as outras':'Remove essa transação'}</div></div></div>
    ${eParc?`<div class="acao-btn" onclick="excluirGrupo('${t.grupo_parcela}')"><div class="acao-icon danger">🗑️</div><div class="acao-info"><div class="acao-titulo" style="color:var(--danger);">Excluir TODAS as ${t.total_parcelas} parcelas</div><div class="acao-info-sub">Remove o parcelamento inteiro</div></div></div>`:''}
    <button class="btn btn-secondary" onclick="fecharModal('modal-acoes')" style="width:100%;margin-top:14px;">Cancelar</button>`;
  document.getElementById('modal-acoes').classList.add('show');
};

window.marcarRealizada=async function(id){
  try{
    await supabase.from('transacoes').update({status:'realizada'}).eq('id',id);
    ultimoItemNovoId=id;
    toast('✅ Confirmada!');
    fecharModal('modal-acoes');
    await carregar();
  }catch(e){alert('Erro: '+e.message)}
};

window.editarTrans=function(id){
  const t=transacoes.find(x=>x.id===id);
  if(!t)return;
  fecharModal('modal-acoes');
  setTimeout(()=>{
    abrirAddManualComDados({tipo:t.tipo,valor:t.valor,descricao:t.descricao,categoria_sugerida:t.categoria,data_mencionada:t.data,conta_id:t.conta_id,_editando:t.id,texto_original:null});
  },300);
};

window.excluirTrans=async function(id){
  if(!confirm('Excluir essa transação?'))return;
  try{
    await supabase.from('transacoes').delete().eq('id',id);
    toast('🗑️ Excluída');
    fecharModal('modal-acoes');
    await carregar();
  }catch(e){alert('Erro: '+e.message)}
};

window.excluirGrupo=async function(grupoId){
  if(!confirm('Excluir TODAS as parcelas desse parcelamento?'))return;
  try{
    await supabase.from('transacoes').delete().eq('grupo_parcela',grupoId);
    toast('🗑️ Parcelamento excluído');
    fecharModal('modal-acoes');
    await carregar();
  }catch(e){alert('Erro: '+e.message)}
};

window.fecharModal=function(id){document.getElementById(id).classList.remove('show')};

window.formatarValor=function(input){
  let v=input.value.replace(/\D/g,'');
  if(!v){input.value='';return}
  v=(parseInt(v)/100).toFixed(2);
  input.value=Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2});
};

function valorParaNum(s){if(!s)return 0;return Number(s.replace(/\./g,'').replace(',','.'))||0}
function fm(v){return(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}

async function darXP(xp,acao,desc){
  try{
    await supabase.from('historico_xp').insert({user_id:usuario.id,acao,xp_ganho:xp,descricao:desc});
    const{data:g}=await supabase.from('gamificacao').select('xp_total').eq('user_id',usuario.id).maybeSingle();
    await supabase.from('gamificacao').update({xp_total:(g?.xp_total||0)+xp,ultima_atividade:new Date().toISOString().split('T')[0]}).eq('user_id',usuario.id);
  }catch(e){console.error(e)}
}

function toast(t){
  const e=document.getElementById('xp-toast');
  e.textContent=t;
  e.style.display='block';
  setTimeout(()=>{e.style.display='none'},3500);
}
</script>
<script src="polish.js?v=1"></script>
</body>
</html>
