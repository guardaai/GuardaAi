<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>transações • guardaí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
  
  :root {
    --bg: #0a0a0a;
    --bg-card: #141414;
    --bg-elev: #1c1c1c;
    --bg-input: #181818;
    --border: #252525;
    --border-strong: #353535;
    --brand: #00d97e;
    --brand-hover: #00ba6b;
    --brand-soft: rgba(0, 217, 126, 0.1);
    --danger: #ff4757;
    --danger-soft: rgba(255, 71, 87, 0.1);
    --warning: #ffb800;
    --warning-soft: rgba(255, 184, 0, 0.1);
    --text: #ffffff;
    --text-mute: #a3a3a3;
    --text-faint: #525252;
  }
  
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  body { padding-bottom: 100px; }
  
  /* HEADER */
  .header {
    padding: 16px 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .back-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
  }
  
  .header-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    flex: 1;
  }
  
  .brand-mark-mini {
    width: 28px;
    height: 28px;
    background: var(--brand);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  
  .brand-mark-mini::before {
    content: '';
    width: 10px;
    height: 10px;
    border: 2px solid var(--bg);
    border-radius: 3px;
    border-top: none;
    border-right: none;
  }
  
  /* CONTAINER */
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px;
  }
  
  /* RESUMO */
  .resumo {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 16px;
  }
  
  .resumo-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  
  .resumo-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  
  .resumo-mes {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
  }
  
  .resumo-saldo {
    margin-bottom: 14px;
  }
  
  .resumo-saldo-label {
    font-size: 12px;
    color: var(--text-mute);
    margin-bottom: 2px;
  }
  
  .resumo-saldo-valor {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  
  .resumo-saldo-valor.positivo { color: var(--brand); }
  .resumo-saldo-valor.negativo { color: var(--danger); }
  
  .resumo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  
  .resumo-item {
    background: var(--bg-elev);
    border-radius: 12px;
    padding: 12px;
  }
  
  .resumo-item-label {
    font-size: 11px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .resumo-item-label::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  
  .resumo-item-label.entrada::before { background: var(--brand); }
  .resumo-item-label.saida::before { background: var(--danger); }
  
  .resumo-item-valor {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }
  
  .resumo-item-valor.entrada { color: var(--brand); }
  .resumo-item-valor.saida { color: var(--danger); }
  
  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 16px;
  }
  
  .tab {
    flex: 1;
    padding: 10px 6px;
    text-align: center;
    background: transparent;
    border: none;
    color: var(--text-mute);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
  }
  
  .tab.active {
    background: var(--bg-elev);
    color: var(--text);
  }
  
  /* GRUPO DATA */
  .grupo-data {
    margin-bottom: 16px;
  }
  
  .grupo-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    padding: 0 4px;
    display: flex;
    justify-content: space-between;
  }
  
  /* TRANSAÇÃO */
  .transacao {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .transacao:active { transform: scale(0.99); }
  
  .transacao-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: var(--bg-elev);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  
  .transacao-info {
    flex: 1;
    min-width: 0;
  }
  
  .transacao-desc {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .transacao-meta {
    font-size: 12px;
    color: var(--text-mute);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .transacao-meta-tag {
    background: var(--bg-elev);
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  .transacao-valor {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    text-align: right;
    white-space: nowrap;
  }
  
  .transacao-valor.entrada { color: var(--brand); }
  .transacao-valor.saida { color: var(--danger); }
  
  /* RECORRENTE */
  .transacao-recorrente {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .transacao-recorrente:active { transform: scale(0.99); }
  
  .recorrente-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: var(--bg-elev);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    position: relative;
  }
  
  .recorrente-icon::after {
    content: '🔁';
    position: absolute;
    bottom: -4px;
    right: -4px;
    font-size: 11px;
    background: var(--bg);
    border-radius: 50%;
    padding: 2px;
  }
  
  .recorrente-dia {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--warning);
    background: var(--warning-soft);
    padding: 3px 8px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  /* EMPTY */
  .empty {
    background: var(--bg-card);
    border: 1px dashed var(--border-strong);
    border-radius: 16px;
    padding: 36px 20px;
    text-align: center;
  }
  
  .empty-emoji { font-size: 44px; margin-bottom: 10px; }
  
  .empty-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  
  .empty-desc {
    font-size: 13px;
    color: var(--text-mute);
    line-height: 1.5;
    max-width: 280px;
    margin: 0 auto;
  }
  
  /* FAB */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 50%;
    transform: translateX(50%);
    z-index: 90;
    width: calc(100% - 40px);
    max-width: 440px;
    background: var(--brand);
    color: #001a0e;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(0, 217, 126, 0.3);
  }
  
  .fab:active {
    transform: translateX(50%) scale(0.97);
    background: var(--brand-hover);
  }
  
  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 100;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(4px);
  }
  
  .modal-overlay.show { display: flex; }
  
  .modal {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
  }
  
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  
  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border-strong);
    border-radius: 100px;
    margin: 12px auto;
  }
  
  .modal-header {
    padding: 8px 24px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .modal-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  
  .modal-close {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
  }
  
  .modal-body {
    padding: 0 24px 24px;
  }
  
  /* TOGGLE TIPO */
  .toggle-tipo {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 16px;
  }
  
  .toggle-opt {
    padding: 12px;
    text-align: center;
    border-radius: 9px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-mute);
    transition: all 0.2s;
  }
  
  .toggle-opt.active.entrada {
    background: var(--brand-soft);
    color: var(--brand);
  }
  
  .toggle-opt.active.saida {
    background: var(--danger-soft);
    color: var(--danger);
  }
  
  /* TOGGLE RECORRENTE */
  .toggle-recorrente {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
    cursor: pointer;
  }
  
  .toggle-recorrente-info {
    flex: 1;
  }
  
  .toggle-recorrente-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  
  .toggle-recorrente-desc {
    font-size: 12px;
    color: var(--text-mute);
  }
  
  .switch {
    position: relative;
    width: 44px;
    height: 26px;
    background: var(--bg-elev);
    border-radius: 100px;
    transition: 0.2s;
    flex-shrink: 0;
  }
  
  .switch::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    background: var(--text);
    border-radius: 50%;
    transition: 0.2s;
  }
  
  .switch.on {
    background: var(--brand);
  }
  
  .switch.on::after {
    left: 21px;
    background: #001a0e;
  }
  
  /* FIELD */
  .field { margin-bottom: 14px; }
  
  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-mute);
    margin-bottom: 6px;
    font-weight: 500;
  }
  
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    color: var(--text);
    font-size: 16px;
    font-family: 'Inter', sans-serif;
  }
  
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--brand);
  }
  
  .field input::placeholder, .field textarea::placeholder {
    color: var(--text-faint);
  }
  
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  
  /* VALOR */
  .valor-input-wrapper {
    display: flex;
    align-items: center;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    transition: border 0.2s;
    margin-bottom: 4px;
  }
  
  .valor-input-wrapper:focus-within {
    border-color: var(--brand);
  }
  
  .valor-prefix {
    color: var(--text-mute);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 600;
    margin-right: 8px;
  }
  
  .valor-input-wrapper input {
    background: transparent;
    border: none;
    flex: 1;
    text-align: right;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 24px;
    padding: 0;
  }
  
  /* CATEGORIA GRID */
  .categoria-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
    max-height: 280px;
    overflow-y: auto;
    padding: 4px;
  }
  
  .categoria-opt {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 4px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  
  .categoria-opt.selected {
    background: var(--brand-soft);
    border-color: var(--brand);
  }
  
  .categoria-opt-icon {
    font-size: 22px;
    margin-bottom: 4px;
  }
  
  .categoria-opt-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-mute);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .categoria-opt.selected .categoria-opt-label { color: var(--text); }
  
  /* PAGAMENTO */
  .pagto-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  
  .pagto-opt {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 4px;
    cursor: pointer;
    text-align: center;
  }
  
  .pagto-opt.selected {
    background: var(--brand-soft);
    border-color: var(--brand);
  }
  
  .pagto-opt-icon { font-size: 18px; }
  .pagto-opt-label {
    font-size: 9px;
    font-weight: 600;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }
  .pagto-opt.selected .pagto-opt-label { color: var(--text); }
  
  /* BTN */
  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    margin-top: 8px;
  }
  
  .btn-primary { background: var(--brand); color: #001a0e; }
  .btn-primary:active { background: var(--brand-hover); transform: scale(0.985); }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    background: var(--bg-elev);
    color: var(--text-faint);
  }
  
  .btn-secondary {
    background: var(--bg-elev);
    color: var(--text);
    border: 1px solid var(--border);
  }
  
  .btn-danger {
    background: var(--danger-soft);
    color: var(--danger);
    border: 1px solid rgba(255, 71, 87, 0.3);
  }
  
  /* DETALHE */
  .detalhe-grid {
    background: var(--bg-input);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  
  .detalhe-linha {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  
  .detalhe-linha:last-child { border-bottom: none; }
  .detalhe-label { font-size: 13px; color: var(--text-mute); }
  .detalhe-valor {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    text-align: right;
  }
  
  .detalhe-valor-big {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 700;
    text-align: center;
    margin: 8px 0 16px;
    letter-spacing: -0.02em;
  }
  
  .detalhe-valor-big.entrada { color: var(--brand); }
  .detalhe-valor-big.saida { color: var(--danger); }
  
  /* MSG */
  .msg {
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
    font-weight: 500;
  }
  
  .msg.show { display: block; }
  
  .msg-error {
    background: var(--danger-soft);
    border: 1px solid rgba(255, 71, 87, 0.3);
    color: #ff6b78;
  }
  
  /* XP TOAST */
  .xp-toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--brand);
    color: #001a0e;
    padding: 12px 20px;
    border-radius: 100px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    z-index: 200;
    box-shadow: 0 8px 32px rgba(0, 217, 126, 0.4);
    display: none;
    animation: toastIn 0.4s cubic-bezier(0.34, 1.5, 0.64, 1);
  }
  
  @keyframes toastIn {
    0% { transform: translateX(-50%) translateY(-20px); opacity: 0; }
    100% { transform: translateX(-50%) translateY(0); opacity: 1; }
  }
  
  /* LOADER */
  .loader-circle {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-radius: 50%;
    border-top-color: var(--brand);
    animation: spin 0.8s linear infinite;
    margin: 40px auto;
  }
  
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="window.location.href='home.html?v=1'">‹</button>
  <div class="header-title">Transações</div>
  <div class="brand-mark-mini" onclick="window.location.href='home.html?v=1'"></div>
</div>

<div class="container">

  <!-- RESUMO -->
  <div class="resumo">
    <div class="resumo-header">
      <div class="resumo-label">Este mês</div>
      <div class="resumo-mes" id="resumo-mes">Maio</div>
    </div>
    <div class="resumo-saldo">
      <div class="resumo-saldo-label">Saldo do mês</div>
      <div class="resumo-saldo-valor positivo" id="resumo-saldo">R$ 0,00</div>
    </div>
    <div class="resumo-grid">
      <div class="resumo-item">
        <div class="resumo-item-label entrada">Entrou</div>
        <div class="resumo-item-valor entrada" id="resumo-entrou">R$ 0,00</div>
      </div>
      <div class="resumo-item">
        <div class="resumo-item-label saida">Saiu</div>
        <div class="resumo-item-valor saida" id="resumo-saiu">R$ 0,00</div>
      </div>
    </div>
  </div>
  
  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-filtro="tudo" onclick="trocarFiltro('tudo')">Tudo</button>
    <button class="tab" data-filtro="entradas" onclick="trocarFiltro('entradas')">Entradas</button>
    <button class="tab" data-filtro="saidas" onclick="trocarFiltro('saidas')">Saídas</button>
    <button class="tab" data-filtro="recorrentes" onclick="trocarFiltro('recorrentes')">🔁</button>
  </div>
  
  <!-- LISTA -->
  <div id="lista">
    <div class="loader-circle"></div>
  </div>

</div>

      <!-- ENTRADA / SAÍDA -->

      <div class="detalhe-valor-big" id="detalhe-valor-big">R$ 0,00</div>

          <div class="detalhe-label">Tipo</div>
          <div class="detalhe-valor" id="detalhe-tipo">—</div>

        <div class="detalhe-linha">
          <div class="detalhe-label">Categoria</div>
          <div class="detalhe-valor" id="detalhe-categoria">—</div>

<div class="xp-toast" id="xp-toast">+5 XP</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  
  const SUPABASE_URL = 'https://gmbsxrxqrxpbgyyvifcd.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_NSOgcu93sTiSreGYi-Ha3g_bqYsAK22';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
  window.supabase = supabase;
  
  let usuario;
  let categorias = [];
  let transacoes = [];
  let recorrentes = [];
  let tipoSelecionado = 'saida';
  let categoriaSelecionada = null;
  let isRecorrente = false;
  let filtroAtual = 'tudo';
  let transacaoDetalheAtual = null;
  let editandoId = null;
  let editandoRecorrente = false;
  
  // INIT
  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = 'index.html?v=1';
      return;
    }
    usuario = session.user;
    
    // Set data padrão = hoje
    document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
    
    await Promise.all([carregarCategorias(), carregarDados()]);
    renderCategorias();
    
    // Se URL tem ?nova=1, abre modal direto
    if (new URLSearchParams(window.location.search).get('nova') === '1') {
      abrirModalNova();
    }
  })();
  
  async function carregarCategorias() {
    const { data } = await supabase
      .from('categorias')
      .select('*')
      .or(`padrao.eq.true,user_id.eq.${usuario.id}`)
      .eq('ativa', true);
    categorias = data || [];
  }
  
  async function carregarDados() {
    const inicio = primeiroDiaMes();
    
    const [tRes, rRes] = await Promise.all([
      supabase.from('transacoes').select('*').eq('user_id', usuario.id).order('data', { ascending: false }).order('criado_em', { ascending: false }),
      supabase.from('transacoes_recorrentes').select('*').eq('user_id', usuario.id).eq('ativa', true).order('dia_mes')
    ]);
    
    transacoes = tRes.data || [];
    recorrentes = rRes.data || [];
    
    renderResumo();
    renderLista();
  }
  
  function primeiroDiaMes() {
    const h = new Date();
    return new Date(h.getFullYear(), h.getMonth(), 1).toISOString().split('T')[0];
  }
  
  function nomeMes() {
    const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    return meses[new Date().getMonth()];
  }
  
  function formatarMoeda(v) {
    return (Number(v) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  
  function formatarData(d) {
    if (!d) return '—';
    return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR');
  }
  
  function labelGrupoData(dataStr) {
    const hoje = new Date().toISOString().split('T')[0];
    const ontem = new Date(); ontem.setDate(ontem.getDate() - 1);
    const ontemStr = ontem.toISOString().split('T')[0];
    
    if (dataStr === hoje) return 'Hoje';
    if (dataStr === ontemStr) return 'Ontem';
    
    const d = new Date(dataStr + 'T00:00:00');
    const dias = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
    const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    return `${dias[d.getDay()]}, ${d.getDate()} ${meses[d.getMonth()]}`;
  }
  
  // RESUMO
  function renderResumo() {
    document.getElementById('resumo-mes').textContent = nomeMes();
    const inicio = primeiroDiaMes();
    const doMes = transacoes.filter(t => t.data >= inicio);
    
    const entrada = doMes.filter(t => t.tipo === 'entrada').reduce((a, t) => a + Number(t.valor), 0);
    const saida = doMes.filter(t => t.tipo === 'saida').reduce((a, t) => a + Number(t.valor), 0);
    const saldo = entrada - saida;
    
    document.getElementById('resumo-entrou').textContent = 'R$ ' + formatarMoeda(entrada);
    document.getElementById('resumo-saiu').textContent = 'R$ ' + formatarMoeda(saida);
    
    const saldoEl = document.getElementById('resumo-saldo');
    saldoEl.textContent = 'R$ ' + formatarMoeda(saldo);
    saldoEl.className = 'resumo-saldo-valor ' + (saldo >= 0 ? 'positivo' : 'negativo');
  }
  
  // RENDER LISTA
  function renderLista() {
    const lista = document.getElementById('lista');
    
    if (filtroAtual === 'recorrentes') {
      renderRecorrentes();
      return;
    }
    
    let filtradas = transacoes;
    if (filtroAtual === 'entradas') filtradas = transacoes.filter(t => t.tipo === 'entrada');
    if (filtroAtual === 'saidas') filtradas = transacoes.filter(t => t.tipo === 'saida');
    
    if (filtradas.length === 0) {
      lista.innerHTML = `
        <div class="empty">
          <div class="empty-emoji">💸</div>
          <div class="empty-title">Nada por aqui ainda</div>
          <div class="empty-desc">Toque em + Nova transação pra começar a registrar.</div>
        </div>
      `;
      return;
    }
    
    // Agrupa por data
    const grupos = {};
    filtradas.forEach(t => {
      if (!grupos[t.data]) grupos[t.data] = [];
      grupos[t.data].push(t);
    });
    
    const datasOrdenadas = Object.keys(grupos).sort().reverse();
    
    lista.innerHTML = datasOrdenadas.map(data => {
      const items = grupos[data];
      const totalDia = items.reduce((acc, t) => acc + (t.tipo === 'entrada' ? Number(t.valor) : -Number(t.valor)), 0);
      const sinal = totalDia >= 0 ? '+' : '−';
      const corDia = totalDia >= 0 ? 'var(--brand)' : 'var(--danger)';
      
      return `
        <div class="grupo-data">
          <div class="grupo-label">
            <span>${labelGrupoData(data)}</span>
            <span style="color:${corDia};">${sinal} R$ ${formatarMoeda(Math.abs(totalDia))}</span>
          </div>
          ${items.map(t => transacaoHTML(t)).join('')}
        </div>
      `;
    }).join('');
  }
  
  function transacaoHTML(t) {
    const cat = categorias.find(c => c.id === t.categoria_id);
    const icone = cat?.icone || (t.tipo === 'entrada' ? '💰' : '💸');
    const sinal = t.tipo === 'entrada' ? '+' : '−';
    const pagto = {pix:'PIX',debito:'DÉB',credito:'CRÉD',dinheiro:'DIN',boleto:'BOL',transferencia:'TED'}[t.forma_pagamento];
    
    return `
      <div class="transacao" onclick="abrirDetalhe('${t.id}')">
        <div class="transacao-icon">${icone}</div>
        <div class="transacao-info">
          <div class="transacao-desc">${t.descricao || cat?.nome || '—'}</div>
          <div class="transacao-meta">
            ${cat?.nome || ''}
            ${pagto ? `<span class="transacao-meta-tag">${pagto}</span>` : ''}
          </div>
        </div>
        <div class="transacao-valor ${t.tipo}">${sinal} R$ ${formatarMoeda(t.valor)}</div>
      </div>
    `;
  }
  
  function renderRecorrentes() {
    const lista = document.getElementById('lista');
    
    if (recorrentes.length === 0) {
      lista.innerHTML = `
        <div class="empty">
          <div class="empty-emoji">🔁</div>
          <div class="empty-title">Sem despesas fixas</div>
          <div class="empty-desc">Cadastre aluguel, pensão, plano de saúde, Netflix — tudo que repete todo mês.</div>
        </div>
      `;
      return;
    }
    
    lista.innerHTML = recorrentes.map(r => {
      const cat = categorias.find(c => c.id === r.categoria_id);
      const icone = cat?.icone || (r.tipo === 'entrada' ? '💰' : '💸');
      const sinal = r.tipo === 'entrada' ? '+' : '−';
      
      return `
        <div class="transacao-recorrente" onclick="abrirDetalheRecorrente('${r.id}')">
          <div class="recorrente-icon">${icone}</div>
          <div class="transacao-info">
            <div class="transacao-desc">${r.descricao}</div>
            <div class="transacao-meta">
              ${cat?.nome || ''}
              <span class="recorrente-dia">Dia ${r.dia_mes}</span>
            </div>
          </div>
          <div class="transacao-valor ${r.tipo}">${sinal} R$ ${formatarMoeda(r.valor)}</div>
        </div>
      `;
    }).join('');
  }
  
  // CATEGORIAS UI
  function renderCategorias() {
    const grid = document.getElementById('categoria-grid');
    const tipoFiltro = tipoSelecionado;
    const cats = categorias.filter(c => c.tipo === tipoFiltro);
    
    grid.innerHTML = cats.map(c => `
      <div class="categoria-opt" data-id="${c.id}" onclick="selecionarCategoria('${c.id}')">
        <div class="categoria-opt-icon">${c.icone}</div>
        <div class="categoria-opt-label">${c.nome}</div>
      </div>
    `).join('');
  }
  
  window.selecionarCategoria = function(id) {
    document.querySelectorAll('.categoria-opt').forEach(o => o.classList.remove('selected'));
    document.querySelector(`.categoria-opt[data-id="${id}"]`)?.classList.add('selected');
    categoriaSelecionada = id;
    validarForm();
  };
  
  window.selecionarTipo = function(tipo) {
    tipoSelecionado = tipo;
    document.querySelectorAll('.toggle-opt').forEach(o => o.classList.remove('active'));
    document.querySelector(`.toggle-opt[data-tipo="${tipo}"]`)?.classList.add('active');
    categoriaSelecionada = null;
    renderCategorias();
    validarForm();
  };
  
  window.toggleRecorrente = function() {
    isRecorrente = !isRecorrente;
    document.getElementById('switch-recorrente').classList.toggle('on', isRecorrente);
    document.getElementById('campo-dia-recorrente').classList.toggle('hidden', !isRecorrente);
    validarForm();
  };
  
  // VALOR
  window.formatarValor = function(input) {
    let v = input.value.replace(/\D/g, '');
    if (!v) { input.value = ''; validarForm(); return; }
    v = (parseInt(v) / 100).toFixed(2);
    input.value = Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
    validarForm();
  };
  
  function valorParaNumero(str) {
    if (!str) return 0;
    return Number(str.replace(/\./g, '').replace(',', '.')) || 0;
  }
  
  function validarForm() {
    const valor = valorParaNumero(document.getElementById('f-valor').value);
    const desc = document.getElementById('f-descricao').value.trim();
    const dia = isRecorrente ? parseInt(document.getElementById('f-dia-mes').value) : null;
    
    const valido = valor > 0 && desc && categoriaSelecionada && (!isRecorrente || (dia >= 1 && dia <= 31));
    document.getElementById('btn-salvar').disabled = !valido;
  }
  
  ['f-descricao', 'f-dia-mes'].forEach(id => {
    document.getElementById(id).addEventListener('input', validarForm);
  });
  
  // TABS
  window.trocarFiltro = function(f) {
    filtroAtual = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.filtro === f));
    renderLista();
  };
  
  // MODAL
  window.abrirModalNova = function() {
    editandoId = null;
    editandoRecorrente = false;
    tipoSelecionado = 'saida';
    categoriaSelecionada = null;
    isRecorrente = false;
    
    document.getElementById('modal-form-titulo').textContent = 'Nova transação';
    document.getElementById('btn-salvar').textContent = 'Cadastrar';
    document.getElementById('f-valor').value = '';
    document.getElementById('f-descricao').value = '';
    document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
    document.getElementById('f-pagamento').value = '';
    document.getElementById('f-dia-mes').value = '';
    document.getElementById('switch-recorrente').classList.remove('on');
    document.getElementById('campo-dia-recorrente').classList.add('hidden');
    document.getElementById('msg-form').className = 'msg';
    selecionarTipo('saida');
    document.getElementById('modal-form').classList.add('show');
  };
  
  window.fecharModal = function(id) {
    document.getElementById(id).classList.remove('show');
  };
  
  // SALVAR
  window.salvarTransacao = async function() {
    const valor = valorParaNumero(document.getElementById('f-valor').value);
    const descricao = document.getElementById('f-descricao').value.trim();
    const data = document.getElementById('f-data').value;
    const pagamento = document.getElementById('f-pagamento').value || null;
    const diaMes = isRecorrente ? parseInt(document.getElementById('f-dia-mes').value) : null;
    
    if (!valor || !descricao || !categoriaSelecionada) return;
    
    const btn = document.getElementById('btn-salvar');
    btn.disabled = true;
    btn.textContent = 'Salvando...';
    
    let result;
    
    if (editandoId) {
      if (editandoRecorrente) {
        result = await supabase.from('transacoes_recorrentes').update({
          tipo: tipoSelecionado,
          categoria_id: categoriaSelecionada,
          valor,
          descricao,
          dia_mes: diaMes
        }).eq('id', editandoId);
      } else {
        result = await supabase.from('transacoes').update({
          tipo: tipoSelecionado,
          categoria_id: categoriaSelecionada,
          valor,
          descricao,
          data,
          forma_pagamento: pagamento,
          atualizado_em: new Date().toISOString()
        }).eq('id', editandoId);
      }
    } else if (isRecorrente) {
      result = await supabase.from('transacoes_recorrentes').insert({
        user_id: usuario.id,
        tipo: tipoSelecionado,
        categoria_id: categoriaSelecionada,
        valor,
        descricao,
        dia_mes: diaMes,
        ativa: true
      });
    } else {
      result = await supabase.from('transacoes').insert({
        user_id: usuario.id,
        tipo: tipoSelecionado,
        categoria_id: categoriaSelecionada,
        valor,
        descricao,
        data,
        forma_pagamento: pagamento,
        origem: 'manual'
      });
    }
    
    if (result.error) {
      document.getElementById('msg-form').className = 'msg show msg-error';
      document.getElementById('msg-form').textContent = 'Erro: ' + result.error.message;
      btn.disabled = false;
      btn.textContent = editandoId ? 'Salvar alterações' : 'Cadastrar';
      return;
    }
    
    if (!editandoId) {
      await darXP(5, 'transacao_cadastrada', 'Transação cadastrada');
      mostrarToast('+5 XP 💰');
    }
    
    fecharModal('modal-form');
    await carregarDados();
  };
  
  async function darXP(xp, acao, descricao) {
    await supabase.from('historico_xp').insert({
      user_id: usuario.id, acao, xp_ganho: xp, descricao
    });
    const { data: g } = await supabase.from('gamificacao').select('xp_total, total_transacoes').eq('user_id', usuario.id).single();
    await supabase.from('gamificacao').update({
      xp_total: (g?.xp_total || 0) + xp,
      total_transacoes: (g?.total_transacoes || 0) + 1,
      ultima_atividade: new Date().toISOString().split('T')[0]
    }).eq('user_id', usuario.id);
  }
  
  function mostrarToast(texto) {
    const t = document.getElementById('xp-toast');
    t.textContent = texto;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 2500);
  }
  
  // DETALHE
  window.abrirDetalhe = function(id) {
    const t = transacoes.find(x => x.id === id);
    if (!t) return;
    transacaoDetalheAtual = t;
    editandoRecorrente = false;
    
    const cat = categorias.find(c => c.id === t.categoria_id);
    const sinal = t.tipo === 'entrada' ? '+' : '−';
    
    document.getElementById('detalhe-titulo').textContent = t.descricao || cat?.nome || 'Transação';
    document.getElementById('detalhe-valor-big').textContent = sinal + ' R$ ' + formatarMoeda(t.valor);
    document.getElementById('detalhe-valor-big').className = 'detalhe-valor-big ' + t.tipo;
    document.getElementById('detalhe-tipo').textContent = t.tipo === 'entrada' ? '+ Entrada' : '− Saída';
    document.getElementById('detalhe-categoria').textContent = cat ? `${cat.icone} ${cat.nome}` : '—';
    document.getElementById('detalhe-data').textContent = formatarData(t.data);
    document.getElementById('linha-data').style.display = 'flex';
    document.getElementById('linha-dia-mes').style.display = 'none';
    
    const pagtos = {pix:'Pix',debito:'Débito',credito:'Crédito',dinheiro:'Dinheiro',boleto:'Boleto',transferencia:'Transferência'};
    document.getElementById('detalhe-pagamento').textContent = pagtos[t.forma_pagamento] || '—';
    
    document.getElementById('modal-detalhe').classList.add('show');
  };
  
  window.abrirDetalheRecorrente = function(id) {
    const r = recorrentes.find(x => x.id === id);
    if (!r) return;
    transacaoDetalheAtual = r;
    editandoRecorrente = true;
    
    const cat = categorias.find(c => c.id === r.categoria_id);
    const sinal = r.tipo === 'entrada' ? '+' : '−';
    
    document.getElementById('detalhe-titulo').textContent = '🔁 ' + r.descricao;
    document.getElementById('detalhe-valor-big').textContent = sinal + ' R$ ' + formatarMoeda(r.valor);
    document.getElementById('detalhe-valor-big').className = 'detalhe-valor-big ' + r.tipo;
    document.getElementById('detalhe-tipo').textContent = (r.tipo === 'entrada' ? '+ Entrada' : '− Saída') + ' recorrente';
    document.getElementById('detalhe-categoria').textContent = cat ? `${cat.icone} ${cat.nome}` : '—';
    document.getElementById('linha-data').style.display = 'none';
    document.getElementById('linha-pagamento').style.display = 'none';
    document.getElementById('linha-dia-mes').style.display = 'flex';
    document.getElementById('detalhe-dia-mes').textContent = 'Dia ' + r.dia_mes;
    
    document.getElementById('modal-detalhe').classList.add('show');
  };
  
  window.editarTransacao = function() {
    if (!transacaoDetalheAtual) return;
    const t = transacaoDetalheAtual;
    
    editandoId = t.id;
    tipoSelecionado = t.tipo;
    categoriaSelecionada = t.categoria_id;
    
    document.getElementById('modal-form-titulo').textContent = 'Editar';
    document.getElementById('btn-salvar').textContent = 'Salvar alterações';
    document.getElementById('f-valor').value = formatarMoeda(t.valor);
    document.getElementById('f-descricao').value = t.descricao || '';
    
    selecionarTipo(t.tipo);
    setTimeout(() => selecionarCategoria(t.categoria_id), 50);
    
    if (editandoRecorrente) {
      isRecorrente = true;
      document.getElementById('switch-recorrente').classList.add('on');
      document.getElementById('campo-dia-recorrente').classList.remove('hidden');
      document.getElementById('f-dia-mes').value = t.dia_mes;
    } else {
      isRecorrente = false;
      document.getElementById('switch-recorrente').classList.remove('on');
      document.getElementById('campo-dia-recorrente').classList.add('hidden');
      document.getElementById('f-data').value = t.data;
      document.getElementById('f-pagamento').value = t.forma_pagamento || '';
    }
    
    fecharModal('modal-detalhe');
    document.getElementById('modal-form').classList.add('show');
  };
  
  window.excluirTransacao = async function() {
    if (!transacaoDetalheAtual) return;
    if (!confirm('Excluir essa transação? Não pode ser desfeito.')) return;
    
    const tabela = editandoRecorrente ? 'transacoes_recorrentes' : 'transacoes';
    const { error } = await supabase.from(tabela).delete().eq('id', transacaoDetalheAtual.id);
    
    if (error) {
      alert('Erro: ' + error.message);
      return;
    }
    
    fecharModal('modal-detalhe');
    await carregarDados();
  };
</script>
